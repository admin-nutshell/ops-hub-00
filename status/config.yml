baseURL: "https://status.inatechshell.ca/"
languageCode: "en"
title: "ITS Platform Status"

module:
  imports:
    - path: github.com/cstate/cstate

params:
  description: "Real-time service status for In a Tech-Shell platform"
  brand: "ITS Platform Status"
  startDate: "2026-06-28"
  alwaysShowTitle: true
  categorizeAffected: false
  enableMermaid: false
  dateFormat: "January 2, 2006 at 15:04 UTC"
  incidentPostsPerPage: 10

  # Status indicator colors (required by the cstate theme's meta partial —
  # without these, hex color parsing fails on empty strings and the build
  # errors with "unable to cast '0x' of type string to int64").
  ok: "#22c55e"
  disrupted: "#f59e0b"
  down: "#ef4444"
  notice: "#3b82f6"

  systems:
    - name: "Ops Hub Staging"
      description: "AI ticket triage and response pipeline"
      url: "https://ops-hub-staging.inatechshell.ca/health"
    - name: "LiteLLM Staging"
      description: "LLM model router (gpt-4o-mini via OpenAI)"
      url: "https://litellm-staging.inatechshell.ca/health"
    - name: "FreeScout Staging"
      description: "Ticket intake via IMAP"
      url: "https://freescout-staging.inatechshell.ca"
