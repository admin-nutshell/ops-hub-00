name: Enable FreeScout Api module (PT-2 fix)

# Attempts to enable the FreeScout Api module via available mechanisms.
# Falls back to printing exact docker exec commands if no API exec path exists.
# Run manually from GitHub Actions tab.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"
  FS_UUID: "sgnpza1r8jlq19f0dboqpzq6"
  FREESCOUT_URL: "https://freescout-staging.inatechshell.ca"

jobs:
  enable-api-module:
    name: Enable FreeScout Api module
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}

    steps:
      - name: Step 1 -- Verify current API status (expect 404 before fix)
        id: precheck
        run: |
          # Note: GitHub Actions IPs may be blocked by the VPS firewall.
          # Use || echo "000" so curl timeout (exit 28) does not abort the job.
          HTTP=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" \
            "$FREESCOUT_URL/api/conversations" 2>/dev/null || echo "000")
          echo "Pre-fix: GET /api/conversations -> HTTP $HTTP"
          echo "pre_http=$HTTP" >> "$GITHUB_OUTPUT"
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "401" ] || [ "$HTTP" = "403" ]; then
            echo "API routes ARE already responding (HTTP $HTTP) -- module may already be enabled"
            echo "already_up=true" >> "$GITHUB_OUTPUT"
          else
            echo "API routes returning $HTTP (000 = timeout/unreachable from GHA network)"
            echo "already_up=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Step 2 -- Probe Coolify for exec/command capability
        id: coolify_probe
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/app.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$FS_UUID")
          echo "GET /applications/$FS_UUID -> HTTP $HTTP"

          if [ "$HTTP" != "200" ]; then
            echo "WARN: Cannot reach Coolify API (HTTP $HTTP)"
            echo "exec_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "=== Coolify app config keys ==="
          jq 'keys' /tmp/app.json 2>/dev/null || echo "(jq failed)"

          # Check for exec-like fields in Coolify API response
          START_CMD=$(jq -r '.start_command // empty' /tmp/app.json 2>/dev/null)
          CUSTOM_OPTS=$(jq -r '.custom_docker_run_options // empty' /tmp/app.json 2>/dev/null)
          echo "start_command: ${START_CMD:-(not set)}"
          echo "custom_docker_run_options: ${CUSTOM_OPTS:-(not set)}"

          # Try Coolify exec endpoint (may not exist in all versions)
          EXEC_HTTP=$(curl -s --max-time 10 -o /tmp/exec_test.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$FS_UUID/execute" \
            -d '{"command": "echo test"}' 2>/dev/null || echo "000")
          echo "POST /applications/$FS_UUID/execute (test) -> HTTP $EXEC_HTTP"

          if [ "$EXEC_HTTP" = "200" ] || [ "$EXEC_HTTP" = "201" ]; then
            echo "exec_available=true" >> "$GITHUB_OUTPUT"
            echo "OK: Coolify exec endpoint available"
          else
            echo "exec_available=false" >> "$GITHUB_OUTPUT"
            echo "WARN: No exec endpoint (HTTP $EXEC_HTTP) -- will use start_command workaround or print manual steps"
          fi

      - name: Step 3a -- Enable Api module via Coolify exec (if available)
        if: steps.coolify_probe.outputs.exec_available == 'true' && steps.precheck.outputs.already_up == 'false'
        run: |
          echo "Using Coolify exec endpoint to run artisan commands..."
          CMDS="cd /www/html && php artisan module:enable Api && php artisan migrate --force && php artisan cache:clear && php artisan route:clear && echo DONE"

          HTTP=$(curl -s --max-time 60 -o /tmp/exec_out.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$FS_UUID/execute" \
            -d "{\"command\": \"$CMDS\"}")
          echo "POST /execute -> HTTP $HTTP"
          cat /tmp/exec_out.json 2>/dev/null || true

          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
            echo "OK: artisan commands ran via Coolify exec"
          else
            echo "FAIL: exec returned HTTP $HTTP"
            exit 1
          fi

      - name: Step 3b -- start_command workaround (if exec not available)
        if: steps.coolify_probe.outputs.exec_available == 'false' && steps.precheck.outputs.already_up == 'false'
        run: |
          # Coolify PATCH: set start_command to run module enable then start normally
          # Only works for Dockerfile/image apps that support custom start commands.
          # We set it to run artisan once, then start FreeScout's normal entrypoint.
          # IMPORTANT: we restore original start_command after the run in step 3c.

          ORIG_START=$(jq -r '.start_command // ""' /tmp/app.json 2>/dev/null)
          echo "Original start_command: ${ORIG_START:-(empty)}"
          echo "orig_start_cmd=${ORIG_START}" >> "$GITHUB_ENV"

          # The nfrastack image starts with its own entrypoint; we cannot override CMD
          # cleanly for a one-shot fix without knowing the original entrypoint.
          # This step documents the manual path instead.
          echo ""
          echo "============================================================"
          echo "MANUAL STEP REQUIRED -- Coolify exec not available"
          echo "============================================================"
          echo ""
          echo "No automated exec path found. Founder/admin needs to run the"
          echo "following commands on the Coolify VPS:"
          echo ""
          echo "  1. Find the container ID:"
          echo "     docker ps --filter name=freescout --format '{{.ID}} {{.Names}}'"
          echo ""
          echo "  2. Enable the Api module (one-time; persists in DB):"
          echo "     CONTAINER=<id-from-step-1>"
          echo "     docker exec \$CONTAINER php /www/html/artisan module:list"
          echo "     docker exec \$CONTAINER php /www/html/artisan module:enable Api"
          echo "     docker exec \$CONTAINER php /www/html/artisan migrate --force"
          echo "     docker exec \$CONTAINER php /www/html/artisan cache:clear"
          echo "     docker exec \$CONTAINER php /www/html/artisan route:clear"
          echo ""
          echo "  3. Verify:"
          echo "     curl -s -o /dev/null -w '%{http_code}' $FREESCOUT_URL/api/conversations"
          echo "     Expected: 401 (route exists, auth required) -- NOT 404"
          echo ""
          echo "The fix is durable -- module state is stored in the database"
          echo "(Supabase), so it survives container restarts."
          echo "============================================================"

      - name: Step 4 -- Verify API after fix attempt
        id: postcheck
        run: |
          sleep 5
          # Same network caveat as Step 1: || echo "000" prevents exit on timeout
          HTTP=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" \
            "$FREESCOUT_URL/api/conversations" 2>/dev/null || echo "000")
          echo "Post-fix: GET /api/conversations -> HTTP $HTTP"
          echo "post_http=$HTTP" >> "$GITHUB_OUTPUT"

          # 401 = route exists, token required (expected if using query param auth)
          # 200 = authenticated and working
          # 404 = still not fixed
          # 000 = GitHub Actions network can't reach the VPS (check manually)
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "401" ] || [ "$HTTP" = "403" ]; then
            echo "OK: API routes are now live (HTTP $HTTP)"
          elif [ "$HTTP" = "000" ]; then
            echo "WARN: GHA network cannot reach VPS -- verify manually:"
            echo "      curl -s -o /dev/null -w '%{http_code}' $FREESCOUT_URL/api/conversations"
          else
            echo "WARN: API still not responding (HTTP $HTTP)"
            echo "      Manual docker exec steps printed in Step 3b above"
          fi

      - name: Step 5 -- Summary
        if: always()
        run: |
          PRE="${{ steps.precheck.outputs.pre_http }}"
          POST="${{ steps.postcheck.outputs.post_http }}"
          EXEC="${{ steps.coolify_probe.outputs.exec_available }}"
          echo "============================================================"
          echo "FreeScout Api Module Enable -- Summary"
          echo "============================================================"
          echo "Pre-fix  GET /api/conversations: HTTP $PRE"
          echo "Post-fix GET /api/conversations: HTTP $POST"
          echo "Coolify exec available:          $EXEC"
          echo ""
          if [ "$POST" = "200" ] || [ "$POST" = "401" ] || [ "$POST" = "403" ]; then
            echo "RESULT: OK -- Api module is live"
            echo "        Next: founder sets FREESCOUT_API_KEY in ops-hub-app Coolify env"
            echo "        (if not already set) then T-21 polling cron can be built"
          else
            echo "RESULT: MANUAL FIX NEEDED -- see Step 3b output above for"
            echo "        exact docker exec commands to run on the Coolify VPS"
          fi
          echo "============================================================"
