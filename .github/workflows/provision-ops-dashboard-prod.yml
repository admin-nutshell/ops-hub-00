name: Provision Ops Dashboard — PRODUCTION Coolify app (T-70, founder-authorized go-live)

# Founder gave EXPLICIT authorization this session ("Deploy the dashboard to
# production.") after a confirmation checkpoint describing this as a
# prod-data dashboard behind a password gate, read-only and reversible. See
# DECISIONS.md 2026-07-07 T-70 for the exact wording and WORK.md T-70.
#
# Mirrors provision-ops-dashboard-staging.yml (T-68/FQ-60) + the FQ-59 Basic
# Auth gate from apply-dashboard-basic-auth.yml, but DELIBERATELY COLLAPSED
# INTO ONE WORKFLOW/DISPATCH. Staging ran these as two separate dispatches
# with a human-paced gap in between (acceptable for traffic-free staging
# data); prod carries real tenant/ticket data, and the task's hard guardrail
# is "gate BEFORE it's reachable." Coolify only generates Traefik routing
# labels (custom_labels) AFTER a deploy, so a zero-reachable-window gate
# isn't achievable on this platform -- the mitigation is to make the exposed
# window as short as machine-paced automation allows: build -> create -> set
# env vars -> deploy -> immediately (same job, no pause) patch basicauth
# labels in -> force-recreate -> verify 401 -- all in one continuous run, no
# waiting on a human/founder step in between.
#
# PRODUCTION ONLY. Targets the ops-hub-prod Coolify project and reuses
# ops-hub-prod's own OPS_HUB_APP_LOGIN_URL DSN (UUID sbke5gqru1n54rj7gssgca2y)
# -- never a newly generated credential, never printed.
#
# Basic Auth credential is DISTINCT from the T-57/FQ-59 staging credential on
# purpose (separate creds per environment, defense in depth) --
# DASHBOARD_BASIC_AUTH_USERHASH_PROD / DASHBOARD_BASIC_AUTH_PASSWORD_PROD,
# generated and set as repo secrets this session; plaintext+hash live only in
# a local scratchpad file, never printed/committed.
#
# Anchored by UUID once created -- never by display name. ops-hub-staging and
# ops-hub-prod BACKEND apps both show as "ops-hub-app (localhost)" in the
# Coolify UI (T-54 precedent); this workflow's own APP_NAME
# ("ops-hub-dashboard-prod") has no name collision, so a one-time name-based
# existence check here (idempotent re-run guard only) is safe, same
# reasoning as the staging workflow.
#
# What this does, in order, single job, no pauses (UPDATED for Phase 2 --
# see "PHASE 2 SECURITY HARDENING" below for why steps 5+ are now
# conditional):
#   1. Builds web/Dockerfile from the repo root (repo imports src/metrics/*
#      directly), pushes to GHCR.
#   2. Discovers the ops-hub-prod Coolify project/server/environment.
#   3. Creates a new "dockerimage" Coolify app with instant_deploy=false
#      (idempotent -- patches image tag and reuses the existing app if one
#      of this name already exists). Nothing is reachable yet at this point,
#      by construction -- no deploy has ever been triggered.
#   4. Sets env vars: OPS_HUB_APP_LOGIN_URL (copied byte-for-byte from
#      ops-hub-prod, never regenerated), POLLING_PROJECT_ID / POLLING_TENANT_ID
#      (prod scope: tts-prod / DNC-prod), and prod health-check URL overrides
#      (OPS_HUB_HEALTH_URL / LITELLM_HEALTH_URL point at ops-hub-prod's own
#      /health and /health/litellm; FREESCOUT_HEALTH_URL points at the
#      SHARED freescout-staging.inatechshell.ca instance, which per T-50 IS
#      the prod mailbox -- there is no separate freescout-prod host, and
#      inventing one would render a false "degraded" card).
#   5. Checks whether a real TLS domain (PROD_DOMAIN) is already attached. If
#      NOT, the job stops here (green, not an error) and prints the one
#      founder action needed -- it never calls /start, so the app is not
#      reachable on any address (no sslip.io fallback either).
#   6. Only once a real https domain is confirmed: starts a real deployment,
#      waits for it to finish.
#   7. Re-confirms the fqdn is unchanged, then immediately merges a
#      `dashauth-prod` Traefik basicauth middleware into EVERY router
#      Coolify generated for that domain (typically an http redirect router
#      + the https content router), force-recreates the container so
#      Traefik picks up the new labels.
#   8. BLOCKING verification: unauthenticated request must be 401;
#      authenticated request (prod Basic Auth credential) must be 200 with a
#      real rendered body -- both over https.
#
# Rollback: this app carries no write path and no cron of its own -- rollback
# is DELETE /applications/{uuid} via the Coolify API (or the UI), or
# re-running this workflow (idempotent: reuses the existing app, patches the
# image tag, re-applies the gate). Mean rollback time target < 15 minutes.
#
# POST-INCIDENT FIX (2026-07-07, T-70 first run): the gate step originally
# named its middleware `dashauth` -- the SAME literal name
# apply-dashboard-basic-auth.yml uses for the STAGING dashboard's gate.
# Traefik's Docker provider treats a middleware name as one global identity
# across every container it watches; two containers each defining
# `dashauth@docker` with different (env-specific) basicauth hashes makes the
# definition ambiguous, so Traefik drops it -- and every router referencing
# it 404s, on BOTH the prod AND staging dashboards, not just this app. See
# FOUNDER_QUEUE.md FQ-64 (correction) and DECISIONS.md 2026-07-07 T-70
# follow-up for the full evidence chain. Fixed: this workflow now uses
# `dashauth-prod`, a name that can never collide with staging's `dashauth`
# again. The cleanup regex in the gate step matches EITHER name so a
# re-dispatch also heals a prod app still carrying the old colliding
# definition from before this fix. **Live-verified 2026-07-07** (T-70 Phase 1
# restoration): deleting the colliding prod app immediately restored staging
# to 401/200 -- the collision theory is confirmed, not just plausible.
#
# PHASE 2 SECURITY HARDENING (2026-07-07, founder-approved plan: "restore
# staging now, redo prod the secure way as a clean follow-up" -- do NOT rush
# prod live on the insecure setup). Two gaps the founder flagged before any
# future prod go-live, both addressed below:
#
#   (a) HTTPS via a real domain, not plain-http sslip.io. Basic Auth
#       credentials must never travel in cleartext. This workflow now
#       REFUSES to deploy (never calls /start) until a real custom domain
#       (PROD_DOMAIN, "ops-dashboard-prod.inatechshell.ca") is already
#       attached to the app in Coolify with a working TLS cert -- see the
#       new "Check domain is ready" step. This is a genuinely different
#       property from the pre-Phase-2 version, which deployed onto whatever
#       sslip.io preview Coolify auto-assigned.
#
#   (b) Gate BEFORE reachable, with an honest accounting of what "before" can
#       mean on this platform. The app is created with instant_deploy=false
#       (Coolify doc'd default) and this workflow never calls /start until
#       the real-domain precondition above is met -- so before a real domain
#       exists, the app is 100% unreachable (not even via sslip.io), not
#       merely ungated. That closes the ORIGINAL exposure window entirely
#       (there is no fallback public address at all pre-domain). The
#       remaining, smaller window is the same structural one already
#       documented above (Coolify only generates a router's Traefik labels
#       AFTER a deploy, so the very first boot briefly has no basicauth
#       middleware attached until this job's immediate post-deploy PATCH +
#       force-recreate completes) -- typically single-digit seconds, fully
#       machine-paced, no human pause, same mitigation as before but now over
#       HTTPS instead of cleartext http. A true zero-window fix (pre-seeding
#       Traefik labels before the very first /start, using Coolify's
#       apparently-deterministic router naming) was investigated but NOT
#       validated live (forbidden by this task's own guardrail against
#       touching prod without the domain in place first) -- flagged as an
#       open follow-up, see "NOT YET VALIDATED" note near the gate step.
#       Do not claim a literal zero-window until that spike is run on
#       staging and confirmed.
#
#   Consolidated founder action needed (single item, FQ-63-style): attach
#   `ops-dashboard-prod.inatechshell.ca` to this app in the Coolify UI
#   (create the app first via a dispatch of this workflow with no domain yet
#   -- it will stop safely after creating/configuring the app and print the
#   UUID) + add the matching DNS record. See FOUNDER_QUEUE.md for the exact
#   ask. This workflow is idempotent -- re-dispatch after the domain is live
#   and it proceeds straight to deploy+gate+verify with no code changes.

on:
  workflow_dispatch: {}
  # Fallback trigger: this repo has a documented, unresolved GitHub-side quirk
  # where a freshly-added workflow's workflow_dispatch trigger sometimes can't
  # be invoked via API/CLI right after merge (HTTP 422 "Workflow does not have
  # 'workflow_dispatch' trigger") -- see FOUNDER_QUEUE.md FQ-48, and T-68 which
  # hit the same thing for apply-dashboard-basic-auth.yml. repository_dispatch
  # is a different API path, used here as the reliable on-demand trigger.
  repository_dispatch:
    types: [provision-dashboard-prod]

permissions:
  contents: read
  packages: write

concurrency:
  group: ops-hub-dashboard-prod-provision
  cancel-in-progress: false

env:
  COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"
  IMAGE: "ghcr.io/${{ github.repository }}-dashboard"
  APP_NAME: "ops-hub-dashboard-prod"
  # Stable Coolify app UUID for ops-hub-prod (the BACKEND app) -- the SOURCE
  # of the login DSN we copy (never regenerate). Do NOT resolve by name
  # (T-54 collision -- both ops-hub-staging and ops-hub-prod backend apps
  # display as "ops-hub-app (localhost)").
  OPS_HUB_PROD_UUID: "sbke5gqru1n54rj7gssgca2y"
  # Phase 2 hardening: the real TLS domain that must already be attached
  # (Coolify UI, founder action) before this workflow will ever call
  # /start. Never deploy onto an auto-assigned sslip.io preview in prod.
  PROD_DOMAIN: "ops-dashboard-prod.inatechshell.ca"
  PROD_PROJECT_ID: "00000000-0000-0000-0000-000000000003"
  PROD_TENANT_ID: "00000000-0000-0000-0000-000000000030"
  PROD_OPS_HUB_HEALTH_URL: "https://ops-hub-prod.inatechshell.ca/health"
  PROD_LITELLM_HEALTH_URL: "https://ops-hub-prod.inatechshell.ca/health/litellm"
  PROD_FREESCOUT_HEALTH_URL: "https://freescout-staging.inatechshell.ca/"

jobs:
  provision-and-gate:
    name: Build + create Coolify app + deploy + gate + verify (single pass, no pause)
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      USERHASH: ${{ secrets.DASHBOARD_BASIC_AUTH_USERHASH_PROD }}
      DASH_PASSWORD: ${{ secrets.DASHBOARD_BASIC_AUTH_PASSWORD_PROD }}
    steps:
      - name: Guard — required secrets present
        run: |
          [ -n "$TOKEN" ] || { echo "::error::COOLIFY_API_TOKEN not set"; exit 1; }
          [ -n "$USERHASH" ] || { echo "::error::DASHBOARD_BASIC_AUTH_USERHASH_PROD not set"; exit 1; }
          [ -n "$DASH_PASSWORD" ] || { echo "::error::DASHBOARD_BASIC_AUTH_PASSWORD_PROD not set"; exit 1; }

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # ── Build & push the dashboard image (repo-root context, web/Dockerfile, current main) ──
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build dashboard image (repo root context, per web/Dockerfile header)
        run: |
          docker build \
            -f web/Dockerfile \
            --tag "$IMAGE:latest" \
            --tag "$IMAGE:${{ github.sha }}" \
            .

      - name: Push dashboard image to GHCR
        run: |
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          echo "Pushed $IMAGE:latest and $IMAGE:${{ github.sha }}"

      # ── Discover ops-hub-prod's Coolify project/server/environment ──────────
      - name: Discover server UUID
        id: server
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/servers.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/servers")
          [ "$HTTP" = "200" ] || { echo "::error::/servers HTTP $HTTP"; cat /tmp/servers.json; exit 1; }
          UUID=$(jq -r '.[0].uuid' /tmp/servers.json)
          [ -n "$UUID" ] && [ "$UUID" != "null" ] || { echo "::error::no server found"; exit 1; }
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "Server UUID: $UUID"

      - name: Discover project UUID + environment name (ops-hub-prod)
        id: project
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/projects.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/projects")
          [ "$HTTP" = "200" ] || { echo "::error::/projects HTTP $HTTP"; cat /tmp/projects.json; exit 1; }
          UUID=$(jq -r '.[] | select(.name == "ops-hub-prod") | .uuid' /tmp/projects.json)
          if [ -z "$UUID" ] || [ "$UUID" = "null" ]; then
            echo "::error::ops-hub-prod project not found. Available:"
            jq -r '.[].name' /tmp/projects.json
            exit 1
          fi
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"

          HTTP2=$(curl -s --max-time 30 -o /tmp/proj_detail.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/projects/$UUID")
          if [ "$HTTP2" = "200" ]; then
            ENV_NAME=$(jq -r '.environments[0].name // "production"' /tmp/proj_detail.json)
          else
            ENV_NAME="production"
          fi
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"
          echo "Project UUID: $UUID | Environment: $ENV_NAME"

      # ── Create (or reuse) the dashboard app ──────────────────────────────────
      - name: Check for an existing app of this name (idempotent re-run guard)
        id: existing
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/apps.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications")
          [ "$HTTP" = "200" ] || { echo "::error::/applications HTTP $HTTP"; exit 1; }
          UUID=$(jq -r --arg n "$APP_NAME" '[.[] | select(.name == $n)] | .[0].uuid // empty' /tmp/apps.json)
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          if [ -n "$UUID" ]; then
            echo "Found existing '$APP_NAME' ($UUID) — will patch image tag + reuse, not recreate."
          else
            echo "No existing '$APP_NAME' app — will create."
          fi

      - name: Create dashboard app (dockerimage type)
        id: create
        if: steps.existing.outputs.uuid == ''
        run: |
          PAYLOAD=$(jq -n \
            --arg proj "${{ steps.project.outputs.uuid }}" \
            --arg srv  "${{ steps.server.outputs.uuid }}" \
            --arg env  "${{ steps.project.outputs.env_name }}" \
            --arg name "$APP_NAME" \
            --arg img  "$IMAGE" \
            --arg tag  "${{ github.sha }}" \
            '{
              project_uuid:               $proj,
              server_uuid:                $srv,
              environment_name:           $env,
              name:                       $name,
              docker_registry_image_name: $img,
              docker_registry_image_tag:  $tag,
              ports_exposes:              "3000",
              instant_deploy:             false
            }')
          HTTP=$(curl -s --max-time 30 -o /tmp/create.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/dockerimage" -d "$PAYLOAD")
          echo "Create HTTP $HTTP"
          jq . /tmp/create.json 2>/dev/null || cat /tmp/create.json
          [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ] || { echo "::error::create failed (HTTP $HTTP)"; exit 1; }
          UUID=$(jq -r '.uuid // .application_uuid // empty' /tmp/create.json)
          [ -n "$UUID" ] || { echo "::error::no UUID in create response"; exit 1; }
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "Created $APP_NAME: $UUID"

      - name: Resolve final app UUID
        id: app
        run: |
          UUID="${{ steps.existing.outputs.uuid }}"
          [ -z "$UUID" ] && UUID="${{ steps.create.outputs.uuid }}"
          [ -n "$UUID" ] || { echo "::error::no app UUID resolved"; exit 1; }
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "Dashboard PROD app UUID: $UUID"

      - name: Patch image tag on existing app (re-run path only)
        if: steps.existing.outputs.uuid != ''
        run: |
          UUID="${{ steps.app.outputs.uuid }}"
          PATCH_BODY=$(jq -n --arg img "$IMAGE" --arg tag "${{ github.sha }}" \
            '{docker_registry_image_name:$img, docker_registry_image_tag:$tag}')
          HTTP=$(curl -s --max-time 30 -o /tmp/patch.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            "$COOLIFY_BASE/applications/$UUID" -d "$PATCH_BODY")
          echo "PATCH image tag → HTTP $HTTP"
          jq . /tmp/patch.json 2>/dev/null || cat /tmp/patch.json

      # ── Env vars — reuse OPS_HUB_APP_LOGIN_URL, never regenerate ─────────────
      - name: Fetch OPS_HUB_APP_LOGIN_URL from ops-hub-prod (masked)
        id: login
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/prod_envs.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$OPS_HUB_PROD_UUID/envs")
          [ "$HTTP" = "200" ] || { echo "::error::cannot read ops-hub-prod envs (HTTP $HTTP)"; exit 1; }
          LOGIN=$(jq -r '.[] | select(.key=="OPS_HUB_APP_LOGIN_URL") | .value' /tmp/prod_envs.json | head -1)
          [ -n "$LOGIN" ] && [ "$LOGIN" != "null" ] || { echo "::error::OPS_HUB_APP_LOGIN_URL absent on ops-hub-prod"; exit 1; }
          echo "::add-mask::$LOGIN"
          echo "login=$LOGIN" >> "$GITHUB_OUTPUT"
          echo "Fetched OPS_HUB_APP_LOGIN_URL (masked): $(printf '%s' "$LOGIN" | sed -E 's#(://[^:]+):[^@]*@#\1:***@#')"

      - name: Set env vars on dashboard app (delete-then-set — Coolify Save appends rows, not upsert)
        run: |
          UUID="${{ steps.app.outputs.uuid }}"
          LOGIN="${{ steps.login.outputs.login }}"

          set_var() {
            key="$1"; val="$2"
            HTTP=$(curl -s --max-time 30 -o /tmp/envs_now.json -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
              "$COOLIFY_BASE/applications/$UUID/envs")
            [ "$HTTP" = "200" ] || { echo "::error::cannot list envs for $UUID (HTTP $HTTP)"; exit 1; }
            for eu in $(jq -r --arg k "$key" '.[] | select(.key==$k) | .uuid' /tmp/envs_now.json 2>/dev/null); do
              curl -s --max-time 30 -o /dev/null -X DELETE \
                -H "Authorization: Bearer $TOKEN" \
                "$COOLIFY_BASE/applications/$UUID/envs/$eu"
            done
            RC=$(curl -s --max-time 30 -o /tmp/set_resp.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -H "Accept: application/json" \
              "$COOLIFY_BASE/applications/$UUID/envs" \
              -d "$(jq -n --arg k "$key" --arg v "$val" '{key:$k,value:$v}')")
            echo "  $key → HTTP $RC"
            [ "$RC" = "200" ] || [ "$RC" = "201" ] || { echo "::error::failed to set $key"; cat /tmp/set_resp.json; exit 1; }
          }

          set_var "OPS_HUB_APP_LOGIN_URL" "$LOGIN"
          set_var "POLLING_PROJECT_ID" "$PROD_PROJECT_ID"
          set_var "POLLING_TENANT_ID" "$PROD_TENANT_ID"
          set_var "OPS_HUB_HEALTH_URL" "$PROD_OPS_HUB_HEALTH_URL"
          set_var "LITELLM_HEALTH_URL" "$PROD_LITELLM_HEALTH_URL"
          set_var "FREESCOUT_HEALTH_URL" "$PROD_FREESCOUT_HEALTH_URL"
          echo "All 6 env vars set (login DSN copied from ops-hub-prod, polling scope = tts-prod/DNC-prod, health URLs = prod FQDNs; FreeScout health points at the shared freescout-staging host, which per T-50 IS the prod mailbox)."

      # ── Phase 2 hardening: refuse to deploy onto anything but a real,
      #    TLS-covered domain. The app above was created with
      #    instant_deploy=false and nothing has called /start yet, so at
      #    this point the app is 100% unreachable -- not "ungated", not
      #    reachable at all, on any address. That is the actual fix for
      #    "gate before reachable": there is no fallback public URL to be
      #    ungated on. ──────────────────────────────────────────────────
      - name: Check domain is ready (real TLS domain attached, not sslip.io)
        id: domain
        run: |
          UUID="${{ steps.app.outputs.uuid }}"
          HTTP=$(curl -s --max-time 30 -o /tmp/app_domain.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID")
          [ "$HTTP" = "200" ] || { echo "::error::GET /applications/$UUID HTTP $HTTP"; exit 1; }
          FQDN=$(jq -r '.fqdn // empty' /tmp/app_domain.json | sed 's#,.*##; s#/$##')

          if [ -z "$FQDN" ] || echo "$FQDN" | grep -q "sslip.io"; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo ""
            echo "=========================================================="
            echo "PAUSED -- no deploy performed. App created/configured only."
            echo "=========================================================="
            echo "App UUID: $UUID (env vars set, image tag patched -- safe, nothing reachable)"
            echo ""
            echo "ONE founder action needed before this can go further:"
            echo "  1. Coolify UI -> ops-hub-prod project -> '$APP_NAME' -> Settings/General -> Domains"
            echo "  2. Enter: $PROD_DOMAIN"
            echo "  3. Save (do NOT click Deploy -- this workflow does that once re-dispatched)"
            echo "  4. Add the matching DNS record for $PROD_DOMAIN (same pattern as ops-hub-prod.inatechshell.ca)"
            echo "  5. Re-dispatch this workflow -- it will detect the real domain and proceed straight"
            echo "     through deploy -> gate -> verify, no code changes needed."
            echo ""
            echo "Current fqdn on the app record: '${FQDN:-<none>}'"
            exit 0
          fi

          if ! echo "$FQDN" | grep -q "^https://"; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Domain '$FQDN' is attached but not yet serving https -- Coolify may still be provisioning the Let's Encrypt cert. Re-run this workflow in a few minutes rather than deploying onto http."
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"
          echo "Real TLS domain confirmed: $FQDN -- proceeding to deploy."

      # ── Deploy for real (pull image, start container) -- ONLY when a real
      #    domain is confirmed above; every remaining step is gated on
      #    steps.domain.outputs.ready == 'true'. ─────────────────────────
      - name: Start dashboard app deployment
        id: start
        if: steps.domain.outputs.ready == 'true'
        run: |
          UUID="${{ steps.app.outputs.uuid }}"
          HTTP=$(curl -s --max-time 180 -o /tmp/start.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID/start")
          echo "Start HTTP $HTTP"
          jq . /tmp/start.json 2>/dev/null || cat /tmp/start.json
          DEPLOYMENT_UUID=$(jq -r '.deployment_uuid // empty' /tmp/start.json 2>/dev/null || true)
          echo "deployment_uuid=$DEPLOYMENT_UUID" >> "$GITHUB_OUTPUT"

      - name: Wait for Coolify deployment to complete
        if: steps.domain.outputs.ready == 'true' && steps.start.outputs.deployment_uuid != ''
        run: |
          DEPLOYMENT_UUID="${{ steps.start.outputs.deployment_uuid }}"
          UUID="${{ steps.app.outputs.uuid }}"
          for i in $(seq 1 30); do
            STATUS_HTTP=$(curl -s --max-time 15 -o /tmp/dep.json -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              "$COOLIFY_BASE/deployments/$DEPLOYMENT_UUID" 2>/dev/null || true)
            if [ "$STATUS_HTTP" = "200" ]; then
              STATUS=$(jq -r '.status // empty' /tmp/dep.json 2>/dev/null || true)
              echo "Attempt $i: deployment status=$STATUS"
              case "$STATUS" in
                finished) echo "Deployment finished."; exit 0 ;;
                failed|error)
                  echo "=== Deployment FAILED — container logs ==="
                  curl -s --max-time 30 -H "Authorization: Bearer $TOKEN" \
                    "$COOLIFY_BASE/applications/$UUID/logs" 2>/dev/null | tail -c 4000 || true
                  exit 1
                  ;;
              esac
            else
              echo "Attempt $i: deployment API HTTP $STATUS_HTTP — waiting 10s"
            fi
            sleep 10
          done
          echo "WARNING: deployment status poll timed out after 5 min — check Coolify UI"

      # ── Gate BEFORE treating as reachable — same job, no pause ───────────────
      # fqdn was already confirmed real+https by the "Check domain is ready"
      # step above, before /start was ever called -- re-use it rather than
      # re-discovering (Coolify does not change an app's fqdn mid-deploy).
      #
      # NOT YET VALIDATED (open follow-up, do not attempt on prod without a
      # staging spike first): it may be possible to PATCH custom_labels with
      # a hand-built dashauth-prod router BEFORE ever calling /start, using
      # Coolify's apparently-deterministic router-name pattern observed on
      # this codebase's decoded labels (roughly `http-0-<uuid>` /
      # `https-0-<uuid>`), so the very first container boot already carries
      # the gate and even the current single-digit-second window closes.
      # Left as future hardening, not implemented here, because it wasn't
      # safe to verify live under this task's own guardrails.
      - name: Re-confirm fqdn unchanged post-deploy
        id: fqdn
        if: steps.domain.outputs.ready == 'true'
        run: |
          UUID="${{ steps.app.outputs.uuid }}"
          HTTP=$(curl -s --max-time 30 -o /tmp/app_final.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID")
          [ "$HTTP" = "200" ] || { echo "::error::GET /applications/$UUID HTTP $HTTP"; cat /tmp/app_final.json; exit 1; }
          FQDN=$(jq -r '.fqdn // empty' /tmp/app_final.json | sed 's#,.*##; s#/$##')
          EXPECTED="${{ steps.domain.outputs.fqdn }}"
          if [ "$FQDN" != "$EXPECTED" ]; then
            echo "::error::fqdn changed between the pre-deploy check ($EXPECTED) and now ($FQDN) -- stopping rather than gating the wrong route."
            exit 1
          fi
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"
          echo "Domain confirmed unchanged: $FQDN — proceeding immediately to gate it (no pause)."

      - name: Get current custom_labels and merge basicauth into every router
        id: labels
        if: steps.domain.outputs.ready == 'true'
        run: |
          UUID="${{ steps.app.outputs.uuid }}"
          HTTP=$(curl -s --max-time 30 -o /tmp/app.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID")
          [ "$HTTP" = "200" ] || { echo "::error::GET HTTP $HTTP"; exit 1; }

          CURRENT_B64=$(jq -r '.custom_labels // ""' /tmp/app.json)
          if [ -z "$CURRENT_B64" ]; then
            echo "::error::custom_labels is empty -- Coolify has not generated routing labels yet even after a completed deploy. Re-run this workflow (idempotent) rather than leaving the app ungated."
            exit 1
          fi
          DECODED=$(echo "$CURRENT_B64" | base64 -d)
          echo "=== Current labels ==="
          echo "$DECODED"

          # Coolify emits one router per scheme (http-0-<uuid>, https-0-<uuid> --
          # typically an http->https redirect router PLUS the content-serving
          # https router). Gate ALL of them found, not just one.
          ROUTERS=$(echo "$DECODED" | grep -oE 'traefik\.http\.routers\.[a-zA-Z0-9_-]+\.rule=' \
            | sed -E 's/traefik\.http\.routers\.([a-zA-Z0-9_-]+)\.rule=/\1/' | sort -u)
          [ -n "$ROUTERS" ] || { echo "::error::no routers found in custom_labels"; exit 1; }
          echo "Routers found: $(echo "$ROUTERS" | tr '\n' ' ')"

          # T-70 incident fix (see FOUNDER_QUEUE.md FQ-64 correction, DECISIONS.md
          # 2026-07-07 T-70 follow-up): the original version of this workflow
          # named the middleware `dashauth` -- the EXACT SAME literal name
          # apply-dashboard-basic-auth.yml uses for the staging dashboard's
          # gate. Traefik's Docker provider treats a middleware name as one
          # global identity across all containers; two containers each
          # defining `dashauth@docker` with different (env-specific) basicauth
          # hashes makes it ambiguous, so Traefik drops it entirely -- and
          # every router referencing it 404s, on BOTH apps, not just this one.
          # Fix: this workflow now uses a per-environment-unique name,
          # `dashauth-prod`, so it can never collide with staging's `dashauth`
          # again. The cleanup below matches EITHER name (`dashauth` or
          # `dashauth-prod`) so a re-dispatch of this fixed workflow also
          # heals a prod app still carrying the old colliding definition from
          # before this fix, rather than leaving a dangling duplicate.
          WORK=$(echo "$DECODED" | grep -vE '^traefik\.http\.middlewares\.dashauth(-prod)?\.basicauth\.users=')
          NEW_MW_LINES=""
          for R in $ROUTERS; do
            EXISTING_LINE=$(echo "$WORK" | grep -E "^traefik\.http\.routers\.${R}\.middlewares=" || true)
            EXISTING_MW=$(echo "$EXISTING_LINE" | sed -E "s/^traefik\.http\.routers\.${R}\.middlewares=//" \
              | sed -E 's/(^|,)dashauth(-prod)?(,|$)/\1\3/' | sed -E 's/^,//; s/,$//')
            if [ -n "$EXISTING_MW" ]; then
              MW_VALUE="${EXISTING_MW},dashauth-prod"
            else
              MW_VALUE="dashauth-prod"
            fi
            WORK=$(echo "$WORK" | grep -vE "^traefik\.http\.routers\.${R}\.middlewares=")
            NEW_MW_LINES="${NEW_MW_LINES}$(printf 'traefik.http.routers.%s.middlewares=%s\n' "$R" "$MW_VALUE")"
          done

          NEW_LABELS=$(printf '%s\ntraefik.http.middlewares.dashauth-prod.basicauth.users=%s\n%s' "$WORK" "$USERHASH" "$NEW_MW_LINES")
          echo "=== New router/middleware wiring (basicauth.users value withheld) ==="
          echo "$NEW_LABELS" | grep -v "basicauth.users"
          NEW_B64=$(printf '%s' "$NEW_LABELS" | base64 -w 0)
          echo "new_b64=$NEW_B64" >> "$GITHUB_OUTPUT"

      - name: PATCH custom_labels (adds Basic Auth middleware to every router)
        if: steps.domain.outputs.ready == 'true'
        run: |
          UUID="${{ steps.app.outputs.uuid }}"
          PAYLOAD=$(jq -n --arg labels "${{ steps.labels.outputs.new_b64 }}" '{custom_labels:$labels}')
          HTTP=$(curl -s --max-time 30 -o /tmp/patch.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID" -d "$PAYLOAD")
          echo "PATCH custom_labels -> HTTP $HTTP"
          [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ] || { echo "::error::PATCH failed"; cat /tmp/patch.json; exit 1; }

      - name: Stop then start (force container recreation with new labels)
        if: steps.domain.outputs.ready == 'true'
        run: |
          UUID="${{ steps.app.outputs.uuid }}"
          curl -s --max-time 30 -o /dev/null -X POST \
            -H "Authorization: Bearer $TOKEN" "$COOLIFY_BASE/applications/$UUID/stop" || true
          sleep 10
          HTTP=$(curl -s --max-time 60 -o /tmp/start2.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" "$COOLIFY_BASE/applications/$UUID/start")
          echo "Start HTTP $HTTP"
          echo "Waiting 45s for container + Traefik route to come up..."
          sleep 45

      - name: BLOCKING verification -- unauthenticated request must be 401
        id: verify401
        if: steps.domain.outputs.ready == 'true'
        run: |
          FQDN="${{ steps.fqdn.outputs.fqdn }}"
          HTTP=000
          for i in $(seq 1 10); do
            HTTP=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "$FQDN/") || true
            echo "Attempt $i: $FQDN/ (no credentials) -> HTTP $HTTP"
            [ "$HTTP" = "401" ] && break
            sleep 15
          done
          echo "code=$HTTP" >> "$GITHUB_OUTPUT"
          if [ "$HTTP" != "401" ]; then
            echo "::error::Expected 401, got $HTTP. Label/hash is mis-applied or Traefik hasn't picked up the new labels yet -- the prod dashboard must NOT be treated as gated/live until this is 401. Do not share the URL."
            exit 1
          fi
          echo "401 confirmed -- PROD dashboard is NOT publicly reachable without credentials."

      - name: BLOCKING verification -- authenticated request must be 200 and render real data
        id: verify200
        if: steps.domain.outputs.ready == 'true'
        run: |
          FQDN="${{ steps.fqdn.outputs.fqdn }}"
          HTTP=$(curl -sS -o /tmp/authed.html -w '%{http_code}' --max-time 15 -u "opsadmin:$DASH_PASSWORD" "$FQDN/")
          echo "Authenticated $FQDN/ -> HTTP $HTTP"
          echo "code=$HTTP" >> "$GITHUB_OUTPUT"
          if [ "$HTTP" != "200" ]; then
            echo "::error::Expected 200 with credentials, got $HTTP."
            exit 1
          fi
          BYTES=$(wc -c < /tmp/authed.html)
          echo "bytes=$BYTES" >> "$GITHUB_OUTPUT"
          echo "Response body: $BYTES bytes"
          FAILCOUNT=$(grep -ic "failed to load" /tmp/authed.html || true)
          echo "failcount=$FAILCOUNT" >> "$GITHUB_OUTPUT"
          echo "--- First 40 lines (structure only, no secrets expected in dashboard HTML) ---"
          head -40 /tmp/authed.html || true
          echo ""
          echo "200 confirmed. 'failed to load' occurrences in body: $FAILCOUNT (expect 0)."
          echo "Manually re-check in a browser that all 4 pillars render real prod numbers."

      - name: Summary
        if: always()
        run: |
          echo "=== Ops Dashboard PRODUCTION app ==="
          echo "App name: $APP_NAME"
          echo "App UUID: ${{ steps.app.outputs.uuid }}"
          echo "Image:    $IMAGE:${{ github.sha }}"
          if [ "${{ steps.domain.outputs.ready }}" != "true" ]; then
            echo ""
            echo "STATUS: PAUSED -- app created/configured, NEVER deployed, NOT reachable on any"
            echo "address (no sslip.io fallback either). Waiting on the founder domain action"
            echo "printed above. Re-dispatch this workflow once $PROD_DOMAIN is attached and"
            echo "resolving -- it will proceed straight through deploy -> gate -> verify."
          else
            echo "fqdn:     ${{ steps.fqdn.outputs.fqdn }}"
            echo "401 (unauthenticated): ${{ steps.verify401.outputs.code }}"
            echo "200 (authenticated):   ${{ steps.verify200.outputs.code }} (${{ steps.verify200.outputs.bytes }} bytes, 'failed to load' count: ${{ steps.verify200.outputs.failcount }})"
            echo ""
            echo "STATUS: LIVE behind dashauth-prod on a real HTTPS domain. Basic Auth no longer"
            echo "travels in cleartext (Phase 2 gap (a) closed). The app was never reachable before"
            echo "this run's own deploy (Phase 2 gap (b): no pre-domain exposure window at all;"
            echo "the small post-deploy-to-gated window documented in this file's header remains,"
            echo "machine-paced, single-digit seconds, now over TLS)."
          fi
