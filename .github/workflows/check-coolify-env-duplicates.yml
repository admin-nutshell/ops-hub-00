name: Coolify — duplicate env-var guard (read-only)

# T-122 (Sprint 22, Phase 2 Track A): automated version of the manual
# "audit coolify-db for duplicate keys before touching any critical env var"
# discipline this repo has been doing by hand since T-104 (see DECISIONS.md
# "coolify-db"/"duplicate" entries, e.g. the LITELLM_URL dup-row incidents on
# ops-hub-prod and ops-hub-staging). Coolify's UI "Save" — and, per T-104, even
# a single API POST — appends a new env-var row instead of upserting an
# existing key; if two rows with the SAME key and the SAME `is_preview` scope
# exist, the runtime silently uses whichever row happens to win (empirically
# the last one), with no error anywhere. This workflow detects that condition
# before a redeploy proceeds. It is READ-ONLY: it never deletes, edits, or
# creates an env-var row — fixing a detected duplicate stays a human/manual
# action (or a separate, higher-risk future task), per T-122's explicit scope
# boundary.
#
# CORRECTION (2026-07-17): every Coolify application has TWO distinct,
# intentional env-var scopes per key -- "Production" (`is_preview:false`)
# and "Preview Deployments" (`is_preview:true`). These are not a stale-vs-
# live pair; Coolify's runtime uses the matching scope for the traffic type,
# with no ambiguity. An earlier version of this script grouped by `.key`
# alone and reported every key with both scopes populated as a "duplicate"
# -- a false positive, confirmed by direct schema inspection showing two
# different uuids/values with different `is_preview` values, not a real
# collision. This produced 19 false-positive "duplicate" findings on both
# ops-hub-staging and ops-hub-prod (DECISIONS.md 2026-07-16/17) before a user
# caught it by pointing out the Coolify UI clearly showed two SEPARATE,
# labeled sections rather than one list with 19 dupes in it. The real check
# groups by `(.key, .is_preview)` -- a genuine duplicate is two rows sharing
# BOTH the same key AND the same scope.
#
# Three ways to run this:
#   1. workflow_dispatch — manual, pick a known app or supply a custom UUID.
#   2. workflow_call — other workflows (main-deploy.yml, prod-deploy.yml) call
#      this as a pre-flight job; if it fails, the calling workflow's deploy
#      job (gated with `needs:`) does not run.
#   3. pull_request (scoped to this file only) — self-test: any PR that edits
#      this workflow automatically runs it for real against live ops-hub-
#      staging Coolify (safe, read-only target) as a check on that same PR.
#      This is also how T-122 was verified against live Coolify pre-merge —
#      GitHub cannot workflow_dispatch a brand-new workflow file until it
#      exists on the default branch, so this is the only pre-merge path to a
#      real run; see the PR body / DECISIONS.md for the run link.

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/check-coolify-env-duplicates.yml"

  workflow_dispatch:
    inputs:
      app:
        description: "Known Coolify app to check (pick 'custom' to use app_uuid below)"
        type: choice
        default: ops-hub-staging
        options:
          - ops-hub-staging
          - ops-hub-prod
          - litellm-staging
          - litellm-prod
          - freescout-staging
          - ops-dashboard-staging
          - custom
      app_uuid:
        description: "Coolify application UUID (required only when app=custom)"
        required: false

  workflow_call:
    inputs:
      app_uuid:
        description: "Coolify application UUID to check"
        required: true
        type: string
      app_label:
        description: "Human-readable label for logging only"
        required: false
        type: string
        default: ""
      mode:
        description: >-
          'report' (default): always exits 0, prints ::error:: annotations on
          duplicates so they're visible in the Actions UI, but never fails the
          calling workflow. 'block': exits 1 on duplicates, failing this job
          (callers should add `needs: guard` to actually gate on it). Default
          is 'report' because a caller job's `uses:` step cannot set
          `continue-on-error` (GitHub Actions does not support that key on a
          reusable-workflow call) — 'report' mode is the only way to run this
          non-blocking today. Flip a caller to `mode: block` + `needs: guard`
          once the target app's existing duplicates are cleaned up.
        required: false
        type: string
        default: "report"
    secrets:
      COOLIFY_API_TOKEN:
        required: true
    outputs:
      has_duplicates:
        description: "true/false — whether any duplicate env-var key was found"
        value: ${{ jobs.guard.outputs.has_duplicates }}
      duplicate_keys:
        description: "Comma-separated list of duplicated keys (empty if none)"
        value: ${{ jobs.guard.outputs.duplicate_keys }}

permissions:
  contents: read

env:
  COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"

jobs:
  guard:
    name: Detect duplicate env-var keys
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
    outputs:
      has_duplicates: ${{ steps.check.outputs.has_duplicates }}
      duplicate_keys: ${{ steps.check.outputs.duplicate_keys }}

    steps:
      # ── Resolve which app UUID to check ─────────────────────────────────────
      - name: Resolve target app UUID
        id: resolve
        env:
          INPUT_APP_UUID: ${{ inputs.app_uuid }}
          INPUT_APP_LABEL: ${{ inputs.app_label }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Self-test target: ops-hub-staging is a safe, low-blast-radius
            # real app to verify this guard's logic against on every PR that
            # touches this workflow file.
            APP_UUID="ajqplom2mghf5a8h6vf1q6xg"
            APP_LABEL="ops-hub-staging (PR self-test)"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            APP="${{ inputs.app }}"
            case "$APP" in
              ops-hub-staging)      APP_UUID="ajqplom2mghf5a8h6vf1q6xg" ;;
              ops-hub-prod)         APP_UUID="sbke5gqru1n54rj7gssgca2y" ;;
              litellm-staging)      APP_UUID="h12xz8887fxvbvjts2hac8if" ;;
              litellm-prod)         APP_UUID="hlik1d96uvkkjzpbxa3azhcv" ;;
              freescout-staging)    APP_UUID="sgnpza1r8jlq19f0dboqpzq6" ;;
              ops-dashboard-staging) APP_UUID="r14c3p7jzwo4wxyprd4yxyev" ;;
              custom)                APP_UUID="${{ inputs.app_uuid }}" ;;
              *) echo "::error::Unknown app '$APP'"; exit 1 ;;
            esac
            APP_LABEL="$APP"
          else
            # workflow_call path (main-deploy.yml, prod-deploy.yml calling this
            # via `uses:`). github.event_name here reflects the CALLER's own
            # triggering event (e.g. "push"), NOT literally "workflow_call" --
            # a real, confirmed GitHub Actions behavior (see DECISIONS.md entry
            # for this fix for the log evidence: a real failed run's log shows
            # the script evaluating `if [ "push" = "workflow_call" ]` as false
            # and falling through). This is why treating "workflow_call" as an
            # explicit branch condition never actually matched, and every
            # deploy since 2026-07-16 silently fell through to the old `else`
            # branch and failed on an undefined `app` input. Only the two
            # REAL, reliably-reported event names (`pull_request` for the
            # self-test, `workflow_dispatch` for manual runs) get their own
            # branch above; everything else — including every real
            # workflow_call invocation, regardless of what string
            # github.event_name reports for it — falls here and reads the
            # workflow_call inputs directly.
            APP_UUID="$INPUT_APP_UUID"
            APP_LABEL="$INPUT_APP_LABEL"
            [ -n "$APP_LABEL" ] || APP_LABEL="$APP_UUID"
          fi
          if [ -z "$APP_UUID" ] || [ "$APP_UUID" = "null" ]; then
            echo "::error::No app_uuid resolved — if app=custom, app_uuid is required."
            exit 1
          fi
          echo "app_uuid=$APP_UUID" >> "$GITHUB_OUTPUT"
          echo "app_label=$APP_LABEL" >> "$GITHUB_OUTPUT"
          # Same event-name-detection bug class as the APP_UUID/APP_LABEL fix
          # above: github.event_name is never literally "workflow_call" (see
          # the comment on the else-branch above), so a check for it here
          # never matches either -- MODE was silently hardcoding to "block"
          # for every real workflow_call caller, ignoring whatever `mode:`
          # value it actually passed. Only the two REAL, reliably-reported
          # event names (`pull_request` self-test, `workflow_dispatch` manual
          # runs) should force the strict "block" mode; everything else
          # (every real workflow_call invocation) must read the caller's
          # own `mode` input, honoring its "report" default.
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="block"
          else
            MODE="${{ inputs.mode }}"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Checking '$APP_LABEL' ($APP_UUID) for duplicate env-var keys... (mode=$MODE)"

      # ── Fetch env vars (read-only GET) ──────────────────────────────────────
      - name: Fetch env vars from Coolify
        id: fetch
        run: |
          set -euo pipefail
          APP_UUID="${{ steps.resolve.outputs.app_uuid }}"
          HTTP=$(curl -s --max-time 30 -o /tmp/envs.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$APP_UUID/envs")
          echo "GET /applications/$APP_UUID/envs -> HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "::error::Failed to fetch env vars (HTTP $HTTP). Check the app UUID and COOLIFY_API_TOKEN."
            cat /tmp/envs.json 2>/dev/null || true
            exit 1
          fi
          TOTAL=$(jq 'length' /tmp/envs.json)
          echo "Fetched $TOTAL env-var row(s)."

      # ── Detect duplicate keys ────────────────────────────────────────────────
      - name: Check for duplicate keys
        id: check
        run: |
          set -euo pipefail
          APP_LABEL="${{ steps.resolve.outputs.app_label }}"
          MODE="${{ steps.resolve.outputs.mode }}"

          # Group rows by (key, is_preview) -- NOT by key alone. Coolify keeps
          # a genuinely separate, intentional value per key for the
          # "Production" environment (is_preview:false) and "Preview
          # Deployments" (is_preview:true); these are two distinct, valid
          # scopes, not a stale-vs-live duplicate pair. An earlier version of
          # this script grouped by .key only and produced a false positive on
          # every key that has both scopes populated -- confirmed via a
          # direct schema inspection (2026-07-17) showing is_preview:false
          # and is_preview:true as two DIFFERENT uuids/values for the same
          # key, not a duplicate. A real duplicate is two rows with the SAME
          # key AND the SAME is_preview value (that's the actual Coolify
          # UI-Save-appends-a-row footgun this guard exists to catch).
          jq -r '
            group_by([.key, .is_preview])
            | map(select(length > 1))
            | map({key: .[0].key, is_preview: .[0].is_preview, count: length, uuids: [.[].uuid]})
          ' /tmp/envs.json > /tmp/dupes.json

          DUPE_COUNT=$(jq 'length' /tmp/dupes.json)

          if [ "$DUPE_COUNT" -eq 0 ]; then
            echo "has_duplicates=false" >> "$GITHUB_OUTPUT"
            echo "duplicate_keys=" >> "$GITHUB_OUTPUT"
            echo "✅ CLEAN — no duplicate env-var keys found on '$APP_LABEL'."
            exit 0
          fi

          KEYS=$(jq -r '[.[].key] | join(",")' /tmp/dupes.json)
          echo "has_duplicates=true" >> "$GITHUB_OUTPUT"
          echo "duplicate_keys=$KEYS" >> "$GITHUB_OUTPUT"

          echo "::error::Found $DUPE_COUNT duplicate env-var key(s) on '$APP_LABEL' — Coolify's runtime will silently pick one row (empirically the last), with no warning. Fix by hand in the Coolify UI: delete the stale row(s), keep exactly one per key."
          echo ""
          echo "=== Duplicate key(s) on '$APP_LABEL' ==="
          jq -r '.[] | "  key=\(.key)  is_preview=\(.is_preview)  rows=\(.count)  env_uuids=\(.uuids | join(", "))"' /tmp/dupes.json
          echo ""
          echo "This guard is READ-ONLY — it does not delete or fix rows. A human must"
          echo "resolve this in the Coolify UI (or via a scoped dedupe workflow, e.g."
          echo "t104-dedupe-and-restart-opshub-prod.yml, as prior precedent) before this"
          echo "app is safely redeployed."

          if [ "$MODE" = "block" ]; then
            exit 1
          fi
          echo ""
          echo "mode=report — not failing this job (duplicates are visible above via"
          echo "the ::error:: annotation, but the calling workflow is not gated on it)."
          exit 0

      - name: Summary
        if: always()
        run: |
          echo "======================================================="
          echo " Coolify duplicate env-var guard — ${{ steps.resolve.outputs.app_label }}"
          echo " app_uuid: ${{ steps.resolve.outputs.app_uuid }}"
          echo " has_duplicates: ${{ steps.check.outputs.has_duplicates }}"
          echo "======================================================="
