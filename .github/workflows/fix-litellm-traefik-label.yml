name: Fix LiteLLM Traefik label — force port 4000

# LiteLLM is confirmed running internally at port 4000 (returns 401 = auth required).
# Root cause: Traefik loadbalancer.server.port label is still 80 on the running container.
# The previous ports_exposes PATCH + API restart preserved old container labels.
#
# This workflow:
#   1. Dumps the full application config to find Traefik service name and current label state
#   2. Adds an explicit custom_labels override: traefik.*.loadbalancer.server.port=4000
#   3. Triggers a stop → start cycle (not restart) which forces container recreation
#   4. Polls health for up to 15 min
#   5. On success, dispatches configure-litellm-nvidia.yml
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"
  UUID: "h12xz8887fxvbvjts2hac8if"

jobs:
  fix-traefik-label:
    name: Override Traefik port label to 4000
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      LITELLM_KEY: ${{ secrets.LITELLM_MASTER_KEY }}

    steps:
      - name: Dump full application config
        id: config
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/app_full.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID")
          echo "GET /applications/$UUID → HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            cat /tmp/app_full.json; exit 1
          fi
          # Show key fields
          echo "=== Port/label/name fields ==="
          jq '{
            name,
            fqdn,
            ports_exposes,
            ports_mappings,
            custom_labels,
            status,
            image: .docker_registry_image_name,
            tag: .docker_registry_image_tag
          }' /tmp/app_full.json || true
          # Extract app name for service label construction
          APP_NAME=$(jq -r '.name' /tmp/app_full.json)
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo ""
          echo "=== Current custom_labels ==="
          jq -r '.custom_labels // "null"' /tmp/app_full.json || true

      - name: Build and set custom_labels with explicit Traefik port=4000
        run: |
          APP_NAME="${{ steps.config.outputs.app_name }}"
          # Coolify Traefik service label format: {app_name}-{uuid}
          SERVICE="${APP_NAME}-$UUID"
          echo "Traefik service name candidate: $SERVICE"

          # Build custom_labels override. We set both the UUID-based and name-based
          # service identifiers to cover all Coolify label name conventions.
          NEW_LABELS="traefik.http.services.${SERVICE}.loadbalancer.server.port=4000\ntraefik.http.services.${APP_NAME}.loadbalancer.server.port=4000"
          echo "Setting custom_labels:"
          printf "%b\n" "$NEW_LABELS"

          # PATCH to set custom_labels
          PAYLOAD=$(jq -n \
            --arg labels "$(printf "%b" "$NEW_LABELS")" \
            --arg ports "4000" \
            '{custom_labels: $labels, ports_exposes: $ports}')

          HTTP=$(curl -s --max-time 30 -o /tmp/patch2.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID" \
            -d "$PAYLOAD")
          echo "PATCH /applications/$UUID → HTTP $HTTP"
          cat /tmp/patch2.json | head -20 || true

          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
            echo "✅ custom_labels + ports_exposes=4000 saved"
          else
            echo "⚠️  PATCH HTTP $HTTP — proceeding anyway"
          fi

      - name: Verify custom_labels were saved
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/app2.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID")
          echo "GET /applications/$UUID → HTTP $HTTP"
          jq '{ports_exposes, custom_labels}' /tmp/app2.json 2>/dev/null || true

      - name: Stop container (to force full container recreation on next start)
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/stop.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID/stop") || true
          echo "POST /stop → HTTP $HTTP"
          cat /tmp/stop.json | head -5 || true
          # Brief pause to let the stop complete
          sleep 10

      - name: Start container (Coolify recreates with updated labels)
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/start.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID/start") || true
          echo "POST /start → HTTP $HTTP"
          cat /tmp/start.json | head -5 || true

      - name: Poll health via sslip.io (up to 15 min, every 20s)
        id: health
        run: |
          LITELLM_URL="http://${UUID}.187.124.76.235.sslip.io"
          echo "Polling $LITELLM_URL/health/readiness..."
          DEADLINE=$(( $(date +%s) + 900 ))
          HTTP=000
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            HTTP=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" \
              "$LITELLM_URL/health/readiness") || true
            echo "$(date -u +%H:%M:%S)  /health/readiness → HTTP $HTTP"
            [ "$HTTP" = "200" ] && break
            # 401 on the /health path would also mean Traefik is reaching LiteLLM
            # but LiteLLM requires auth on this endpoint — treat as healthy
            sleep 20
          done
          echo "health_code=$HTTP" >> "$GITHUB_OUTPUT"
          if [ "$HTTP" = "200" ]; then
            echo "✅ litellm-staging healthy — Traefik port label fixed"
          else
            echo "⚠️  Health: HTTP $HTTP after 15 min"
            # Also try the direct custom domain
            CDN_HTTP=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" \
              "https://litellm-staging.inatechshell.ca/health") || true
            echo "Custom domain /health → HTTP $CDN_HTTP"
            if [ "$CDN_HTTP" = "200" ] || [ "$CDN_HTTP" = "401" ]; then
              echo "✅ Custom domain reachable (HTTP $CDN_HTTP) — Traefik routing fixed"
              HTTP=$CDN_HTTP
            else
              echo "❌ Both sslip.io and custom domain failing — label may still be wrong"
              exit 1
            fi
          fi

      - name: Trigger configure-litellm-nvidia.yml to register NVIDIA NIM model
        if: always()
        run: |
          HEALTH="${{ steps.health.outputs.health_code }}"
          if [ "$HEALTH" = "200" ] || [ "$HEALTH" = "401" ]; then
            echo "LiteLLM reachable via Traefik — triggering NVIDIA NIM registration..."
            HTTP=$(curl -s --max-time 30 -o /tmp/dispatch.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/admin-nutshell/ops-hub-00/actions/workflows/configure-litellm-nvidia.yml/dispatches" \
              -d '{"ref": "main"}')
            echo "Dispatch → HTTP $HTTP"
            [ "$HTTP" = "204" ] && echo "✅ configure-litellm-nvidia.yml triggered"
          else
            echo "LiteLLM not healthy ($HEALTH) — skipping NIM dispatch"
          fi
