name: Configure LiteLLM — NVIDIA NIM provider

# Registers meta/llama-3.3-70b-instruct (NVIDIA NIM) as the default staging model
# in litellm-staging. Uses STORE_MODEL_IN_DB=True — config lives in the LiteLLM
# database, not in the image. Must be re-run if litellm-staging is fully redeployed
# from scratch (DB reset clears registered models).
#
# Prerequisites:
#   1. litellm-staging must be Running in Coolify (verify before triggering)
#   2. GitHub Actions secrets required:
#        COOLIFY_API_TOKEN   — Coolify admin API token
#        LITELLM_MASTER_KEY  — LiteLLM admin key (must match Coolify env var)
#        NVIDIA_API_KEY      — NVIDIA NIM API key (must be set in Coolify env vars)
#
# This workflow NEVER restarts litellm-staging. The Coolify API restart triggers
# a full redeploy (image pull + rebuild) which causes 10+ min outages. If
# litellm-staging is down, restart it from the Coolify dashboard, wait for
# it to show as Running, then re-trigger this workflow.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"
  LITELLM_BASE: "https://litellm-staging.inatechshell.ca"

jobs:
  configure-nvidia-nim:
    name: Wire NVIDIA NIM into litellm-staging
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      LITELLM_KEY: ${{ secrets.LITELLM_MASTER_KEY }}

    steps:
      - name: Find litellm-staging UUID and verify health
        id: app
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/apps.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications")
          [ "$HTTP" != "200" ] && { echo "ERROR: Coolify API /applications HTTP $HTTP"; cat /tmp/apps.json; exit 1; }
          UUID=$(jq -r '.[] | select(.name == "litellm-staging") | .uuid' /tmp/apps.json 2>/dev/null)
          [ -z "$UUID" ] || [ "$UUID" = "null" ] && { echo "ERROR: litellm-staging not found in Coolify"; exit 1; }
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "litellm-staging UUID: $UUID"
          # Override job-level LITELLM_BASE with the sslip.io URL (custom domain may not
          # have a DNS A record resolvable from GitHub Actions runners — sslip.io always works)
          LITELLM_URL="http://${UUID}.187.124.76.235.sslip.io"
          echo "LITELLM_BASE=$LITELLM_URL" >> "$GITHUB_ENV"
          echo "litellm-staging URL: $LITELLM_URL"

          # Verify health — this workflow never restarts the container. If not healthy,
          # go to https://coolify.inatechshell.ca, restart litellm-staging from the UI,
          # wait for Running status, then re-trigger this workflow.
          HEALTH=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" \
            "$LITELLM_URL/health/readiness") || true
          echo "Health check: HTTP $HEALTH"
          if [ "$HEALTH" != "200" ]; then
            echo ""
            echo "ERROR: litellm-staging is not healthy (HTTP $HEALTH)"
            echo ""
            echo "Action required:"
            echo "  1. Go to https://coolify.inatechshell.ca"
            echo "  2. Navigate to ops-hub-staging → litellm-staging"
            echo "  3. Restart the container from the Coolify UI (NOT via the Coolify API)"
            echo "  4. Wait until it shows as Running (usually 1-2 minutes)"
            echo "  5. Re-trigger this workflow: configure-litellm-nvidia.yml"
            echo ""
            echo "NOTE: If the container shows as Running but this check still fails,"
            echo "  wait 30 more seconds and try again — LiteLLM needs time to initialize."
            exit 1
          fi
          echo "✅ litellm-staging is healthy — proceeding to model registration"

      - name: Register NVIDIA NIM model in LiteLLM database
        id: register
        run: |
          if [ -z "$LITELLM_KEY" ]; then
            echo "ERROR: LITELLM_MASTER_KEY secret is empty"
            echo "Add LITELLM_MASTER_KEY to GitHub Actions secrets and re-run this workflow"
            echo "Value must match the LITELLM_MASTER_KEY env var in Coolify litellm-staging"
            exit 1
          fi
          echo "::add-mask::$LITELLM_KEY"

          PAYLOAD=$(jq -n '{
            model_name: "meta/llama-3.3-70b-instruct",
            litellm_params: {
              model: "openai/meta/llama-3.3-70b-instruct",
              api_base: "https://integrate.api.nvidia.com/v1",
              api_key: "os.environ/NVIDIA_API_KEY"
            },
            model_info: {
              description: "NVIDIA NIM — Llama 3.3 70B Instruct (staging default AI provider)"
            }
          }')

          HTTP=$(curl -s --max-time 30 -o /tmp/model_resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $LITELLM_KEY" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "$LITELLM_BASE/model/new" -d "$PAYLOAD")
          echo "POST /model/new → HTTP $HTTP"
          jq . /tmp/model_resp.json 2>/dev/null || cat /tmp/model_resp.json | head -10 || true

          if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
            echo "✅ Registered: meta/llama-3.3-70b-instruct → NVIDIA NIM"
          elif [ "$HTTP" = "400" ]; then
            # LiteLLM returns 400 when the model is already registered — not an error
            MSG=$(jq -r '.error // .detail // .message // empty' /tmp/model_resp.json 2>/dev/null || true)
            echo "ℹ️  POST /model/new HTTP 400 — model may already be registered: $MSG"
            echo "   Proceeding to verify..."
          else
            echo "⚠️  POST /model/new HTTP $HTTP — proceeding to verify"
          fi

      - name: Verify model appears in /model/info
        run: |
          echo "::add-mask::$LITELLM_KEY"
          HTTP=$(curl -s --max-time 30 -o /tmp/model_info.json -w "%{http_code}" \
            -H "Authorization: Bearer $LITELLM_KEY" \
            -H "Accept: application/json" \
            "$LITELLM_BASE/model/info")
          echo "GET /model/info → HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "ERROR: /model/info HTTP $HTTP — unexpected after a healthy pre-check"
            cat /tmp/model_info.json 2>/dev/null | head -5 || true
            exit 1
          fi

          COUNT=$(jq '[.data[] | select(.model_name == "meta/llama-3.3-70b-instruct")] | length' \
            /tmp/model_info.json 2>/dev/null || echo 0)
          jq '[.data[] | select(.model_name == "meta/llama-3.3-70b-instruct") | {model_name, litellm_params}]' \
            /tmp/model_info.json 2>/dev/null || true

          if [ "$COUNT" -gt "0" ]; then
            echo "✅ meta/llama-3.3-70b-instruct confirmed in LiteLLM registry ($COUNT entry/entries)"
            echo ""
            echo "=== litellm-staging NVIDIA NIM integration complete ==="
            echo "  Model:    meta/llama-3.3-70b-instruct"
            echo "  Provider: NVIDIA NIM (https://integrate.api.nvidia.com/v1)"
            echo "  Key ref:  os.environ/NVIDIA_API_KEY  (read from container env at request time)"
            echo "  Usage:    POST https://litellm-staging.inatechshell.ca/chat/completions"
            echo "            Authorization: Bearer <LITELLM_MASTER_KEY>"
            echo '            {"model": "meta/llama-3.3-70b-instruct", "messages": [...]}'
          else
            echo "ERROR: meta/llama-3.3-70b-instruct NOT found in /model/info after registration"
            echo "Models currently in registry:"
            jq '.data[] | .model_name' /tmp/model_info.json 2>/dev/null | head -20 || true
            exit 1
          fi
