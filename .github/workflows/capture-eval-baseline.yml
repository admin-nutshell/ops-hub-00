name: T-92 — capture green eval baseline (all 3 evals, live via LiteLLM)

# T-92 (ADR-0007 §5.5): capture the GREEN BASELINE the real LLM-rubric gate
# compares against. Runs ALL THREE product evals (ticket-triage, ticket-respond,
# kb-learn) live against their production target alias via the shared runner
# (scripts/eval/live-run.sh, T-89), normalizes the per-test results into a single
# baseline document (scripts/eval/compare-baseline.py capture, T-92), and uploads
# it as an artifact. "A gate with no baseline is just noise" (ADR §5.5).
#
# SCOPED KEY, NOT THE MASTER KEY (ADR C1 / T-90): this reads only
# LITELLM_EVAL_KEY — the budget-capped virtual key scoped to
# [triage-model, fallback-model] provisioned in T-90. The master key is NOT in
# this job's env. This is a MANUAL workflow_dispatch (a maintainer fires it to
# mint/refresh a baseline); it is NOT the auto `pull_request` gate (that is T-93,
# still gated on C1) and is NOT wired to auto-trigger.
#
# GRADER != TARGET (ADR §5.3, the gate's real config — default since FQ-70 cleared):
# all three evals route through `triage-model` in production today
# (src/config/model-allowlist.ts), so TARGET_ALIAS=triage-model for all three; the
# JUDGE defaults to `fallback-model` (a DISTINCT alias, so live-run.sh's exit-3
# grader!=target guard is satisfied). `fallback-model` is healthy again on
# litellm-staging as of 2026-07-12 (FQ-70 RESOLVED — Anthropic credit topped up).
# The baseline the gate compares against MUST be captured under this same grader!=
# target config as the gate itself uses — that is now the default here (T-94).
#
# PRODUCT-ONLY baseline (T-94 fix): the capture step below globs product
# *-results.json but EXCLUDES the T-91 *-canary-results.json harness-integrity probes
# (ADR §5.2: canaries are not part of the product pass-rate). Including them would put
# 6 canary entries in the baseline that the gate's product-only compare never supplies,
# so the 3 must-pass canaries would read as [REGRESSION: DROPPED] → a false GATE FAIL.
#
# DB WRITE IS DEFERRED (not done here): recording the baseline row into
# eval_gate_runs needs (a) the case_results column (migration 20260709020000,
# founder-applied via FQ-71) and (b) a scoped ops_hub_app DB credential in CI
# (T-93 / Finding 3). This job prints the exact recordEvalGateRun payload so that
# write is a copy-paste once both land. Recording to LangFuse is likewise deferred:
# no eval->LangFuse push mechanism exists today (the runner only prints results);
# the durable baseline evidence this job produces is the run permalink + artifact.
#
# READ-ONLY from an infra standpoint: no Coolify mutation, no schema change.
# It DOES make real (metered, ~$0.03) LLM calls against litellm-staging.

on:
  workflow_dispatch:
    inputs:
      target_alias:
        description: "LiteLLM alias under test (all 3 evals route through it today)"
        required: false
        default: "triage-model"
      judge_alias:
        description: "LiteLLM grader alias — MUST differ from target (grader != target, ADR §5.3). Default fallback-model (healthy since FQ-70 cleared)."
        required: false
        default: "fallback-model"

permissions:
  contents: read

jobs:
  capture:
    name: Run all 3 evals live and capture the green baseline
    runs-on: ubuntu-latest
    env:
      LITELLM_EVAL_KEY: ${{ secrets.LITELLM_EVAL_KEY }}
      TARGET_ALIAS: ${{ github.event.inputs.target_alias || 'triage-model' }}
      JUDGE_ALIAS: ${{ github.event.inputs.judge_alias || 'fallback-model' }}
      LITELLM_BASE: https://litellm-staging.inatechshell.ca/v1
      OUT_DIR: /tmp/eval-live
    steps:
      - name: Guard — scoped eval key present (NOT the master key)
        run: |
          [ -n "$LITELLM_EVAL_KEY" ] || { echo "::error::LITELLM_EVAL_KEY not set — provision T-90 first"; exit 1; }

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Sanity-check LITELLM_EVAL_KEY against /v1/models before spending eval calls
        # ADVISORY ONLY — must NEVER abort the job. The curl is deliberately
        # guarded with `|| true` and its exit code captured: a slow/timed-out
        # sanity probe (curl exit 28) is not evidence the eval will fail, and a
        # `set -e`-in-a-command-substitution abort here would kill the run before
        # a single eval executes (the exact `set -e`-on-a-probe trap T-83 hit).
        run: |
          set -uo pipefail
          echo "::add-mask::$LITELLM_EVAL_KEY"
          HTTP=$(curl -s -o /tmp/models.json -w "%{http_code}" --max-time 30 --retry 2 \
            -H "Authorization: Bearer $LITELLM_EVAL_KEY" \
            "$LITELLM_BASE/models" || true)
          echo "GET $LITELLM_BASE/models with LITELLM_EVAL_KEY -> HTTP ${HTTP:-<no response>}"
          if [ "${HTTP:-}" = "200" ]; then
            echo "Aliases visible to the scoped key:"; jq -r '.data[]?.id' /tmp/models.json 2>/dev/null || cat /tmp/models.json 2>/dev/null || true
          else
            echo "::warning::sanity probe did not return 200 (got '${HTTP:-<none>}') — could be transient latency or a scoped-key /models restriction. NOT aborting; the eval steps are the source of truth."
          fi

      - name: Run all three product evals via the shared runner (scripts/eval/live-run.sh)
        env:
          OPENAI_API_KEY: ${{ secrets.LITELLM_EVAL_KEY }}
        # continue-on-error PER EVAL: promptfoo `eval` exits nonzero on a failing
        # assertion, and a real red on one eval (e.g. ticket-triage, unverified
        # live) must NOT stop the other two from producing results.json. We want
        # ALL THREE normalized so compare-baseline sees the full per-test picture;
        # a genuinely-red eval is a finding to route, not a reason to capture nothing.
        run: |
          set -uo pipefail
          echo "::add-mask::$OPENAI_API_KEY"
          rc=0
          for EVAL in ticket-triage ticket-respond kb-learn; do
            echo "::group::Eval $EVAL (target=$TARGET_ALIAS judge=$JUDGE_ALIAS)"
            EVAL_FILE="evals/${EVAL}.yaml" \
            TARGET_ALIAS="$TARGET_ALIAS" \
            JUDGE_ALIAS="$JUDGE_ALIAS" \
            LITELLM_BASE="$LITELLM_BASE" \
            OUT_DIR="$OUT_DIR" \
            OPENAI_API_KEY="$OPENAI_API_KEY" \
            bash scripts/eval/live-run.sh || { echo "::warning::eval $EVAL returned nonzero (red test or run error) — continuing so all results are captured"; rc=1; }
            echo "::endgroup::"
          done
          echo "eval-loop rc=$rc (nonzero = at least one eval had a failure; the capture step reports which)"

      - name: Capture + normalize the green baseline (per-test identity, T-92)
        run: |
          set -uo pipefail
          shopt -s nullglob
          # PRODUCT results only — EXCLUDE the T-91 *-canary-results.json harness-integrity
          # probes (ADR §5.2: canaries are not part of the product pass-rate; live-run.sh
          # writes <eval>-canary-results.json into OUT_DIR). A canary in the baseline that
          # the gate's product-only compare never supplies reads as [REGRESSION: DROPPED]
          # → a false GATE FAIL. This must stay aligned with eval-gate-live.yml's compare
          # (STEP 5, explicit 3 product files) and persist (STEP 6, same exclusion). (T-94)
          RESULTS=()
          for f in "$OUT_DIR"/*-results.json; do
            case "$f" in *-canary-results.json) ;; *) RESULTS+=("$f") ;; esac
          done
          echo "Found ${#RESULTS[@]} product results file(s): ${RESULTS[*]:-<none>}"
          if [ "${#RESULTS[@]}" -eq 0 ]; then
            echo "::error::no product *-results.json produced by any eval — nothing to baseline (see the eval step log above for why)"
            exit 1
          fi
          python3 scripts/eval/compare-baseline.py capture \
            --results "${RESULTS[@]}" \
            --git-sha "$GITHUB_SHA" \
            --out "$OUT_DIR/baseline.json"

      - name: Upload baseline + raw results as an artifact (durable capture evidence)
        uses: actions/upload-artifact@v4
        with:
          name: eval-baseline-${{ github.sha }}
          path: |
            /tmp/eval-live/baseline.json
            /tmp/eval-live/*-results.json
          if-no-files-found: warn
          retention-days: 90
