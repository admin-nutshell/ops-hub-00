name: Deploy Staging Services — T-08 LiteLLM + T-10 FreeScout

# Triggered manually by Production Manager to deploy infrastructure services
# to ops-hub-staging on Coolify. Never deploys to prod — that is workflow_dispatch
# only via prod-promotion.yml (which does not exist yet; T-15 future scope).
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which services to deploy"
        type: choice
        options:
          - all
          - litellm-only
          - freescout-only
        default: all

# Read-only checkout; all deploy calls are outbound API calls to Coolify.
permissions:
  contents: read

env:
  COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"

jobs:
  # ─── Phase 1: Discover ──────────────────────────────────────────────────────
  discover:
    name: Discover — Coolify state
    runs-on: ubuntu-latest
    outputs:
      project_uuid: ${{ steps.project.outputs.uuid }}
      server_uuid: ${{ steps.server.outputs.uuid }}
      environment_name: ${{ steps.project.outputs.env_name }}

    steps:
      # ── Pre-flight: verify connectivity and identify proxy vs Coolify 403 ───
      - name: Pre-flight — connectivity + auth probe
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          echo "=== Target base URL: $COOLIFY_BASE ==="

          # 1. Unauthenticated probe — identifies if basic connectivity works
          #    and whether a proxy (not Coolify) is the 403 source.
          echo ""
          echo "--- Unauthenticated probe (expect 401 from Coolify or 403 from proxy) ---"
          curl -s -D /tmp/noauth_headers.txt -o /tmp/noauth_body.txt -w "HTTP %{http_code}\n" \
            --max-time 15 \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/servers" \
            || echo "curl failed (exit $?)"
          echo "Response headers:"
          cat /tmp/noauth_headers.txt 2>/dev/null || echo "(no headers)"
          echo "Response body:"
          jq . /tmp/noauth_body.txt 2>/dev/null || cat /tmp/noauth_body.txt 2>/dev/null || echo "(empty)"

          # 2. Authenticated probe — full header + body capture
          # set +e guards the curl inside $() so bash -e doesn't fire on curl exit 28 (timeout)
          # before we can capture CURL_EXIT. No || echo "000" inside $() — that would double
          # the "000" that %{http_code} already outputs on failure.
          echo ""
          echo "--- Authenticated probe (COOLIFY_API_TOKEN) ---"
          set +e
          AUTH_HTTP=$(curl -s -D /tmp/auth_headers.txt -o /tmp/auth_body.txt -w "%{http_code}" \
            --max-time 15 \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/servers" 2>/dev/null)
          CURL_EXIT=$?
          set -e
          AUTH_HTTP="${AUTH_HTTP:-000}"
          echo "HTTP status: $AUTH_HTTP (curl exit: $CURL_EXIT)"
          echo "Response headers:"
          cat /tmp/auth_headers.txt 2>/dev/null || echo "(no headers)"
          echo "Response body:"
          jq . /tmp/auth_body.txt 2>/dev/null || cat /tmp/auth_body.txt 2>/dev/null || echo "(empty)"

          # 3. Server header analysis — tells us if proxy (nginx/caddy) or Coolify is responding
          echo ""
          echo "--- Server identification ---"
          SERVER_HEADER=$(grep -i "^server:" /tmp/auth_headers.txt 2>/dev/null || echo "no Server header found")
          echo "Server header: $SERVER_HEADER"

          # 4. Fail with a meaningful message
          if [ "$AUTH_HTTP" = "200" ]; then
            echo "✅ /api/v1/servers returned 200 — proceeding"
          elif [ "$AUTH_HTTP" = "000" ] || [ "$CURL_EXIT" = "28" ]; then
            echo "❌ Connection timeout (curl exit $CURL_EXIT) — Coolify unreachable from GitHub Actions"
            echo "   Server may be restarting after a config change. Wait a minute and re-run."
            exit 1
          elif [ "$AUTH_HTTP" = "401" ]; then
            echo "❌ 401 Unauthorized — token not recognised. Check COOLIFY_API_TOKEN secret."
            exit 1
          elif [ "$AUTH_HTTP" = "403" ]; then
            echo "❌ 403 Forbidden — see response body above. Enable API: Coolify Settings → API."
            exit 1
          else
            echo "❌ Unexpected HTTP $AUTH_HTTP (curl exit $CURL_EXIT) — see above"
            exit 1
          fi

      # ── Step 1: Server UUID ─────────────────────────────────────────────────
      - name: Get server UUID
        id: server
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          HTTP_CODE=$(curl -s --max-time 30 -o /tmp/servers.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/servers")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: /api/v1/servers returned HTTP $HTTP_CODE"
            jq . /tmp/servers.json 2>/dev/null || cat /tmp/servers.json
            exit 1
          fi
          echo "=== Servers ==="
          jq -r '.[] | "  \(.name) — \(.uuid)"' /tmp/servers.json
          UUID=$(jq -r '.[0].uuid' /tmp/servers.json)
          if [ -z "$UUID" ] || [ "$UUID" = "null" ]; then
            echo "ERROR: no server found in response"
            exit 1
          fi
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"

      # ── Step 2: Project UUID + environment name ─────────────────────────────
      - name: Get project UUID and environment name
        id: project
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          HTTP_CODE=$(curl -s --max-time 30 -o /tmp/projects.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/projects")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: /api/v1/projects returned HTTP $HTTP_CODE"
            jq . /tmp/projects.json 2>/dev/null || cat /tmp/projects.json
            exit 1
          fi
          echo "=== Projects ==="
          jq -r '.[] | "  \(.name) — \(.uuid)"' /tmp/projects.json
          UUID=$(jq -r '.[] | select(.name == "ops-hub-staging") | .uuid' /tmp/projects.json)
          if [ -z "$UUID" ] || [ "$UUID" = "null" ]; then
            echo "ERROR: ops-hub-staging not found. Available projects:"
            jq -r '.[].name' /tmp/projects.json
            exit 1
          fi
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"

          # Get environment name from the project detail
          HTTP_CODE2=$(curl -s --max-time 30 -o /tmp/project_detail.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/projects/$UUID")
          if [ "$HTTP_CODE2" != "200" ]; then
            echo "WARNING: /api/v1/projects/$UUID returned HTTP $HTTP_CODE2 — using 'production'"
            echo "env_name=production" >> "$GITHUB_OUTPUT"
          else
            echo "=== Project environments ==="
            jq -r '.environments[] | "  \(.name) — \(.uuid)"' /tmp/project_detail.json 2>/dev/null || true
            ENV_NAME=$(jq -r '.environments[0].name // "production"' /tmp/project_detail.json)
            echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"
            echo "Using environment: $ENV_NAME"
          fi

      # ── Step 3: Inventory ───────────────────────────────────────────────────
      - name: List existing applications
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          echo "=== Existing Applications ==="
          HTTP_CODE=$(curl -s --max-time 30 -o /tmp/apps.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/applications")
          if [ "$HTTP_CODE" = "200" ]; then
            jq -r '.[] | "  \(.name) [\(.status // "unknown")] — \(.uuid) fqdn=\(.fqdn // "(none)")"' \
              /tmp/apps.json 2>/dev/null || echo "  (empty or unexpected format)"
          else
            echo "  (HTTP $HTTP_CODE listing applications)"
          fi

      - name: List existing databases
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          echo "=== Existing Databases ==="
          HTTP_CODE=$(curl -s --max-time 30 -o /tmp/dbs.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/databases")
          if [ "$HTTP_CODE" = "200" ]; then
            jq -r '.[] | "  \(.name) [\(.status // "unknown")] — \(.uuid)"' \
              /tmp/dbs.json 2>/dev/null || echo "  (empty or unexpected format)"
          else
            echo "  (HTTP $HTTP_CODE listing databases)"
          fi

  # ─── T-08: LiteLLM ──────────────────────────────────────────────────────────
  deploy-litellm:
    name: T-08 — LiteLLM staging
    needs: discover
    if: inputs.target == 'all' || inputs.target == 'litellm-only'
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      PROJECT_UUID: ${{ needs.discover.outputs.project_uuid }}
      SERVER_UUID: ${{ needs.discover.outputs.server_uuid }}
      ENV_NAME: ${{ needs.discover.outputs.environment_name }}

    steps:
      - name: Create or get LiteLLM application
        id: app
        run: |
          # Idempotent: return existing UUID if already created
          HTTP_CODE=$(curl -s --max-time 30 -o /tmp/apps.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/applications")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: /api/v1/applications returned HTTP $HTTP_CODE"
            jq . /tmp/apps.json 2>/dev/null || cat /tmp/apps.json
            exit 1
          fi
          EXISTING=$(jq -r '.[] | select(.name == "litellm-staging") | .uuid' /tmp/apps.json 2>/dev/null || true)

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "LiteLLM already exists: $EXISTING"
            echo "uuid=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            echo "Creating LiteLLM application..."
            PAYLOAD=$(jq -n \
              --arg proj "$PROJECT_UUID" \
              --arg srv "$SERVER_UUID" \
              --arg env "$ENV_NAME" \
              '{
                project_uuid: $proj,
                server_uuid: $srv,
                environment_name: $env,
                name: "litellm-staging",
                docker_registry_image_name: "ghcr.io/berriai/litellm:main-latest",
                ports_exposes: "4000",
                instant_deploy: false
              }')
            echo "Payload: $PAYLOAD"
            HTTP_CODE=$(curl -s --max-time 30 -o /tmp/create_resp.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              "$COOLIFY_BASE/applications/dockerimage" \
              -d "$PAYLOAD")
            echo "Create HTTP $HTTP_CODE"
            jq . /tmp/create_resp.json 2>/dev/null || cat /tmp/create_resp.json
            if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
              echo "ERROR: failed to create LiteLLM (HTTP $HTTP_CODE)"
              exit 1
            fi
            UUID=$(jq -r '.uuid // .application_uuid // empty' /tmp/create_resp.json 2>/dev/null)
            if [ -z "$UUID" ] || [ "$UUID" = "null" ]; then
              echo "ERROR: no UUID in create response"
              exit 1
            fi
            echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
            echo "Created LiteLLM: $UUID"
          fi

      - name: Deploy (start) LiteLLM
        run: |
          UUID="${{ steps.app.outputs.uuid }}"
          echo "Starting LiteLLM $UUID..."
          HTTP_CODE=$(curl -s --max-time 30 -o /tmp/start_resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID/start")
          echo "Start HTTP $HTTP_CODE"
          jq . /tmp/start_resp.json 2>/dev/null || cat /tmp/start_resp.json

      - name: Wait and verify LiteLLM health
        run: |
          echo "Waiting 90s for LiteLLM to initialize (Prisma migrations run on first boot)..."
          sleep 90
          UUID="${{ steps.app.outputs.uuid }}"
          HTTP_CODE=$(curl -s --max-time 30 -o /tmp/app_state.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID")
          echo "=== LiteLLM state (HTTP $HTTP_CODE) ==="
          jq '{name, status, fqdn}' /tmp/app_state.json 2>/dev/null || cat /tmp/app_state.json

          FQDN=$(jq -r '.fqdn // empty' /tmp/app_state.json 2>/dev/null)
          if [ -n "$FQDN" ] && [ "$FQDN" != "null" ]; then
            HOST="${FQDN#https://}"
            HOST="${HOST#http://}"
            HOST="${HOST%/}"
            echo "Checking readiness at https://$HOST/health/readiness"
            HTTP=$(curl -o /dev/null -s -w "%{http_code}" \
              --max-time 30 "https://$HOST/health/readiness" || echo "000")
            echo "HTTP status: $HTTP"
            [ "$HTTP" = "200" ] && echo "✅ LiteLLM healthy" \
              || echo "⚠️  Not yet 200 — service may still be starting (check Coolify logs)"
          else
            echo "⚠️  No FQDN assigned yet — Coolify may still be routing. Check the dashboard."
            echo "LiteLLM UUID for dashboard lookup: $UUID"
          fi

  # ─── T-10: FreeScout (Docker Compose: freescout + postgres on shared compose network) ─
  # DB approach: Docker Compose stack so both services share the same compose network.
  # Prior attempts:
  #   - Supabase (5432/6543): VPS firewall blocks ALL outbound PostgreSQL traffic
  #     (confirmed runs #27890237911 + #27890511141)
  #   - Coolify standalone DB + standalone app: different Docker networks —
  #     DB hostname (cbm2359em7f5aw5vqsb7vgtl) not resolvable from freescout container
  #     (confirmed run #27891164266: 75s of "Postgres Host ... is not accessible")
  # Fix: Docker Compose guarantees both services share a compose network.
  # DB_HOST=postgres resolves via Docker's built-in DNS. No external connectivity needed.
  deploy-freescout:
    name: T-10 — FreeScout staging
    needs: discover
    if: inputs.target == 'all' || inputs.target == 'freescout-only'
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      PROJECT_UUID: ${{ needs.discover.outputs.project_uuid }}
      SERVER_UUID: ${{ needs.discover.outputs.server_uuid }}
      ENV_NAME: ${{ needs.discover.outputs.environment_name }}
      FREESCOUT_ADMIN_PASS: ${{ secrets.FREESCOUT_STAGING_ADMIN_PASS }}

    steps:
      - name: Clean up existing FreeScout resources
        run: |
          # Delete any existing freescout-staging app (standalone dockerimage from prior runs).
          # Delete orphaned freescout-postgres standalone DB (created by PR #25, superseded here).
          # Best-effort — failures don't block the fresh compose create below.

          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -s --max-time 30 -o /tmp/apps.json -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/json" \
              "$COOLIFY_BASE/applications") || true
            [ "$HTTP_CODE" != "000" ] && break
            echo "Attempt $attempt/3: Coolify unreachable (timeout), waiting 20s..."
            sleep 20
          done
          if [ "$HTTP_CODE" = "200" ]; then
            EXISTING=$(jq -r '.[] | select(.name == "freescout-staging") | .uuid' \
              /tmp/apps.json 2>/dev/null || true)
            if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
              echo "Deleting existing freescout-staging ($EXISTING)..."
              DEL_HTTP=$(curl -s --max-time 30 -o /tmp/app_del_resp.json -w "%{http_code}" -X DELETE \
                -H "Authorization: Bearer $TOKEN" \
                "$COOLIFY_BASE/applications/$EXISTING") || true
              echo "Delete HTTP $DEL_HTTP"
              cat /tmp/app_del_resp.json 2>/dev/null || true
            else
              echo "No existing freescout-staging app found"
            fi
          else
            echo "Could not list apps (HTTP $HTTP_CODE) — skipping app cleanup"
          fi

          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -s --max-time 30 -o /tmp/dbs.json -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/json" \
              "$COOLIFY_BASE/databases") || true
            [ "$HTTP_CODE" != "000" ] && break
            echo "Attempt $attempt/3: Coolify unreachable (timeout), waiting 20s..."
            sleep 20
          done
          if [ "$HTTP_CODE" = "200" ]; then
            EXISTING_DB=$(jq -r '.[] | select(.name == "freescout-postgres") | .uuid' \
              /tmp/dbs.json 2>/dev/null || true)
            if [ -n "$EXISTING_DB" ] && [ "$EXISTING_DB" != "null" ]; then
              echo "Deleting orphaned standalone freescout-postgres DB ($EXISTING_DB)..."
              DEL_HTTP=$(curl -s --max-time 30 -o /tmp/db_del_resp.json -w "%{http_code}" -X DELETE \
                -H "Authorization: Bearer $TOKEN" \
                "$COOLIFY_BASE/databases/$EXISTING_DB") || true
              echo "Delete DB HTTP $DEL_HTTP"
              cat /tmp/db_del_resp.json 2>/dev/null || true
            else
              echo "No standalone freescout-postgres DB found"
            fi
          else
            echo "Could not list databases (HTTP $HTTP_CODE) — skipping DB cleanup"
          fi

      - name: Create FreeScout Docker Compose stack
        id: freescout
        run: |
          COMPOSE_YAML=$(cat << 'COMPOSE_EOF'
          services:
            freescout:
              image: tiredofit/freescout:latest
              ports:
                - "80"
              environment:
                - DB_HOST=postgres
                - DB_PORT=5432
                - DB_TYPE=pgsql
                - DB_NAME=freescout
                - DB_USER=freescout
                - DB_PASS=${FREESCOUT_DB_PASS}
                - SITE_URL=${SITE_URL}
                - APP_URL=${SITE_URL}
                - ADMIN_EMAIL=mai@leelaecospa.com
                - ADMIN_PASS=${ADMIN_PASS}
                - SETUP_TYPE=AUTO
                - DB_SSL=FALSE
              depends_on:
                postgres:
                  condition: service_healthy
              restart: unless-stopped
            postgres:
              image: postgres:16-alpine
              environment:
                - POSTGRES_DB=freescout
                - POSTGRES_USER=freescout
                - POSTGRES_PASSWORD=${FREESCOUT_DB_PASS}
              volumes:
                - postgres_data:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U freescout"]
                interval: 5s
                timeout: 5s
                retries: 10
              restart: unless-stopped
          volumes:
            postgres_data:
          COMPOSE_EOF
          )

          PAYLOAD=$(jq -n \
            --arg proj    "$PROJECT_UUID" \
            --arg srv     "$SERVER_UUID" \
            --arg env     "$ENV_NAME" \
            --arg compose "$COMPOSE_YAML" \
            '{
              project_uuid:       $proj,
              server_uuid:        $srv,
              environment_name:   $env,
              name:               "freescout-staging",
              docker_compose_raw: $compose,
              instant_deploy:     false
            }')
          for attempt in 1 2 3; do
            HTTP_CODE=$(curl -s --max-time 60 -o /tmp/fs_create_resp.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              "$COOLIFY_BASE/applications/dockercompose" \
              -d "$PAYLOAD") || true
            [ "$HTTP_CODE" != "000" ] && break
            echo "Attempt $attempt/3: Coolify unreachable (timeout), waiting 20s..."
            sleep 20
          done
          echo "FreeScout compose create HTTP $HTTP_CODE"
          jq . /tmp/fs_create_resp.json 2>/dev/null || cat /tmp/fs_create_resp.json
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: failed to create FreeScout compose stack (HTTP $HTTP_CODE)"
            exit 1
          fi
          UUID=$(jq -r '.uuid // .application_uuid // empty' /tmp/fs_create_resp.json 2>/dev/null)
          if [ -z "$UUID" ] || [ "$UUID" = "null" ]; then
            echo "ERROR: no UUID in create response"
            jq . /tmp/fs_create_resp.json 2>/dev/null || cat /tmp/fs_create_resp.json
            exit 1
          fi
          echo "uuid=$UUID" >> "$GITHUB_OUTPUT"
          echo "Created FreeScout compose stack: $UUID"

      - name: Set FreeScout environment variables
        run: |
          UUID="${{ steps.freescout.outputs.uuid }}"
          [ -n "$FREESCOUT_ADMIN_PASS" ] && echo "::add-mask::$FREESCOUT_ADMIN_PASS"

          # Fetch assigned FQDN for SITE_URL (required by SETUP_TYPE=AUTO first-run installer)
          APP_HTTP=$(curl -s --max-time 30 -o /tmp/app_fqdn.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID") || true
          APP_URL=$(jq -r '.fqdn // empty' /tmp/app_fqdn.json 2>/dev/null | sed 's|/$||' || true)
          [ -z "$APP_URL" ] && APP_URL="http://$UUID.187.124.76.235.sslip.io"
          echo "SITE_URL: $APP_URL"

          # Fresh compose stack — simple POST for each env var; no 409 conflicts possible.
          # Coolify substitutes ${FREESCOUT_DB_PASS}, ${SITE_URL}, ${ADMIN_PASS} in the
          # compose YAML when starting the stack.
          set_env() {
            local KEY="$1" VAL="$2"
            local PAYLOAD HTTP
            PAYLOAD=$(jq -n --arg k "$KEY" --arg v "$VAL" '{key: $k, value: $v}')
            HTTP=$(curl -s --max-time 30 -o /tmp/env_resp.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              "$COOLIFY_BASE/applications/$UUID/envs" \
              -d "$PAYLOAD") || true
            echo "  $KEY → HTTP $HTTP"
            [ "$HTTP" != "201" ] && cat /tmp/env_resp.json 2>/dev/null || true
          }

          set_env "FREESCOUT_DB_PASS" "$FREESCOUT_ADMIN_PASS"
          set_env "SITE_URL"          "$APP_URL"
          set_env "ADMIN_PASS"        "$FREESCOUT_ADMIN_PASS"

      - name: Deploy (start) FreeScout
        run: |
          UUID="${{ steps.freescout.outputs.uuid }}"
          echo "Starting FreeScout $UUID (Docker Compose: freescout + postgres)..."
          HTTP_CODE=$(curl -s --max-time 30 -o /tmp/fs_start_resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID/start")
          echo "Start HTTP $HTTP_CODE"
          jq . /tmp/fs_start_resp.json 2>/dev/null || cat /tmp/fs_start_resp.json

      - name: Verify FreeScout health
        run: |
          echo "Waiting 180s for FreeScout to initialize (postgres healthcheck + SETUP_TYPE=AUTO first-run)..."
          sleep 180
          UUID="${{ steps.freescout.outputs.uuid }}"
          HTTP_CODE=$(curl -s --max-time 30 -o /tmp/fs_state.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID")
          echo "=== FreeScout state (HTTP $HTTP_CODE) ==="
          jq '{name, status, fqdn}' /tmp/fs_state.json 2>/dev/null || cat /tmp/fs_state.json

          FQDN=$(jq -r '.fqdn // empty' /tmp/fs_state.json 2>/dev/null | sed 's|/$||')
          if [ -n "$FQDN" ] && [ "$FQDN" != "null" ]; then
            echo "Checking $FQDN/"
            set +e
            HTTP=$(curl -o /dev/null -s -w "%{http_code}" --max-time 30 "$FQDN/")
            CURL_RC=$?
            set -e
            [ "$CURL_RC" != "0" ] && HTTP="000"
            echo "HTTP status: $HTTP"
            [ "$HTTP" = "200" ] && echo "✅ FreeScout healthy" \
              || echo "⚠️  Not yet 200 (may still be starting — check Coolify logs)"
          else
            echo "⚠️  No FQDN assigned yet. FreeScout UUID: $UUID"
          fi

      - name: Fetch FreeScout container logs (diagnostic)
        if: always()
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          UUID="${{ steps.freescout.outputs.uuid }}"
          LOG_HTTP=$(curl -s --max-time 30 -o /tmp/fs_logs.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$UUID/logs") || true
          echo "=== FreeScout container logs (API HTTP $LOG_HTTP) ==="
          if [ "$LOG_HTTP" = "200" ]; then
            cat /tmp/fs_logs.json | tail -c 8000
          else
            echo "Logs endpoint returned HTTP $LOG_HTTP"
            cat /tmp/fs_logs.json 2>/dev/null || true
          fi
