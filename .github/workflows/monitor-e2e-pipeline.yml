name: Monitor — Synthetic-ticket downstream E2E pipeline (T-98)

# Sprint 10 anchor. Closes the gap T-97 (monitor-litellm-internal-auth.yml)
# deliberately does NOT cover: T-97 proves the internal LiteLLM auth *hop* is
# healthy; it says nothing about whether an actual ticket event, dispatched
# through the REAL Inngest pipeline, makes it all the way through
# classify -> triage DB update -> respond draft -> FreeScout delivery ->
# DB state='responded' -> a LangFuse trace. Three prior incidents (T-71,
# FQ-69, FQ-70) were all "a green health signal while the real path was 100%
# broken" — this monitor exists to catch the fourth one before a founder
# notices missing replies, not after.
#
# HONEST SCOPE NOTE (SC10 / Ruling 2e of the design review — read this before
# assuming this monitor covers "the pipeline"): this monitor does NOT and
# CANNOT exercise the FreeScout-polling/intake stage. freescout-poller.ts
# stamps POLLING_TENANT_ID on every conversation it matches (status=1,
# state=2) with no mailbox filter — so ANY poller-visible synthetic
# conversation would land in the REAL prod tenant by construction, not the
# synthetic one. Coverage here starts at Inngest event dispatch (the same
# point sweepNewTickets/the poller would normally hand off to) and runs
# through triage -> respond -> DB state -> LangFuse trace. Intake stays
# covered by T-97 (the auth hop) + the FQ-69-era manual diagnostics. Do not
# describe this monitor as "full pipeline coverage" — it is downstream-of-
# intake coverage, which is the real gap T-98 was scoped to close.
#
# DESIGN OF RECORD: DECISIONS.md, "2026-07-12 — T-98 Security Lead design
# review: synthetic-ticket downstream E2E monitor — APPROVED WITH CONDITIONS"
# (2 amendments + SC1-SC10). This workflow implements that spec; deviate only
# after a re-review.
#
# TEST SCOPE (Ruling 1, review-approved): project 00000000-0000-0000-0000-
# 000000000001 / tenant 00000000-0000-0000-0000-000000000010 — the existing
# "ops-hub"/"staging-support" placeholder, structurally invisible to every
# prod sweep/cron/dashboard via RLS (fail-closed, tenant_id = current_tenant_id()).
# NAMED OPERATING ASSUMPTION (SC7): this tenant is inert ONLY because
# ops-hub-staging stays STOPPED (it is staging's own home scope — if staging
# is ever restarted, its sweepNewTickets/sweepRespondedTickets/sla-monitor
# crons run GUC'd to this same tenant and would double-process this monitor's
# synthetic tickets). Restarting ops-hub-staging requires a T-98 re-review
# FIRST. It also means this monitor's synthetic tickets WILL render on the
# STAGING ops dashboard (provisioned onto this exact tenant/project pair) —
# expected, documented, not a leak (Ruling 1b/SC6).
#
# SENTINEL-TICKET PATTERN (Amendment A1 — replaces the original "insert +
# null-cleanup" design the review REJECTED as reopening a real hole, see
# Ruling 2 below): ONE permanent ticket row (its id lives in the repo variable
# E2E_SENTINEL_TICKET_ID, set once during SC9 provisioning) permanently holds
# the FK to ONE permanent, Closed FreeScout test conversation. Every run of
# this workflow UPDATEs that SAME row back to state='new' and re-dispatches —
# it never INSERTs a new ticket row. Because the sentinel permanently holds
# the conversation id, `tickets.freescout_conversation_id bigint UNIQUE` +
# freescout-poller.ts's `ON CONFLICT (freescout_conversation_id) DO NOTHING`
# make a manual reopen of the test conversation STRUCTURALLY HARMLESS forever
# — the poller's insert simply no-ops. (Ruling 2 rejected the original
# proposal's cleanup step — `UPDATE ... SET freescout_conversation_id = NULL`
# — because nulling the FK re-opens exactly this hole: a reopened test
# conversation would then mint a REAL prod-tenant ticket on the next poller
# pass.)
#
# CREDENTIAL (SC1 / Amendment A2): E2E_MONITOR_DB_URL, a role
# (`e2e_monitor`, supabase/migrations/20260712000000_t98_e2e_monitor_role.sql)
# with SELECT/INSERT/UPDATE on `tickets` ONLY, gated by RLS policies that
# HARDCODE this tenant/project pair — NOT `OPS_HUB_APP_LOGIN_URL` (REJECTED by
# the review: that credential's tenant scoping is CLIENT-ASSERTED via a GUC,
# which in this unattended 24/7 scheduled context means unbounded prod
# customer-ticket access the moment it leaks — non-negotiable #10). Dormant
# (job guards and exits clean) until a founder applies the migration + sets
# the password — see FOUNDER_QUEUE.md FQ-75. A T-90-style dispositive
# negative-test proof (verify-e2e-monitor-role.yml) must pass BEFORE this
# schedule is trusted (SC1).
#
# CREDENTIAL (SC2): E2E_MONITOR_INNGEST_KEY, a NEW, dedicated Inngest event
# key minted for this monitor only — never the production app's own event
# key. Independently revocable (Inngest supports multiple named keys per
# environment, each individually deletable — verified against Inngest's own
# docs, not assumed; see DECISIONS.md). Also pending founder/console
# provisioning — see FQ-75. Blast radius if leaked (accepted, per the review):
# event injection into the prod Inngest env, bounded to legal state
# transitions + LLM spend + FreeScout note spam on whatever tenant the event
# payload names — NOT bounded by the key itself (Inngest's per-key event-name
# filtering could not be confirmed as an access-control feature, only as a
# dashboard search/monitoring filter — see DECISIONS.md; the REAL safety
# boundary here is the DB-role-level tenant hardcoding above and the pipeline
# functions' own state-machine idempotency guards, not the event key).
#
# CADENCE (SC5): every 6 hours. Per-run cost: ~2 prod LLM calls
# (classifyTicket + the draft in ticket-respond) + 1 real FreeScout internal
# note (raw INSERT into threads, type=3 — never emailed; Ruling 2d already
# priced this at ~4 notes/day on ONE closed conversation, prune
# opportunistically/quarterly via the existing founder/Production Manager
# channel).
#
# FAILURE PATH (SC8): mirrors monitor-litellm-internal-auth.yml exactly —
# opens/resolves a status-page incident via status-incident.yml's
# workflow_dispatch path (the free channel that already works; UptimeRobot's
# webhook integration needs a paid tier the founder declined, FQ-47 action
# 4b). DISTINCT incident title from T-97's so the two are never confused.
#
# BC1 FIX (Security Lead sign-off, DECISIONS.md 2026-07-12, "T-98 Security
# Lead sign-off... APPROVED WITH ONE BLOCKING CONDITION"): the "On failure —
# open a status-page incident" step's `if:` used to be a bare
# `steps.<x>.outcome == 'failure'` OR-chain with NO failure()/always()/
# cancelled() status function. GitHub Actions implicitly ANDs a bare `if:`
# with success(), so once reset/dispatch/poll/langfuse actually failed, the
# job's own success() went false and the incident step was SKIPPED, not run
# — the status-page paging half of SC8 was dead code. Fixed by adding
# `failure()` to the condition (the review's "more standard" option;
# rejected restructuring to T-97's set+e/output shape as unnecessary
# rewrite-risk on already-approved logic — see PART 2/BC1 discussion).
#
# mode=live (default, used by the schedule): real behavior, unchanged.
# mode=simulate-failure (manual verification only — never on the schedule;
#   `schedule` events carry no workflow_dispatch inputs, so MODE always
#   resolves to 'live' on cron): forces the "Reset sentinel ticket" step to
#   target a deliberately-nonexistent ticket id against the REAL,
#   already-signed-off, RLS-scoped E2E_MONITOR_DB_URL — a genuine 0-row
#   UPDATE failure — WITHOUT touching the real sentinel row, the real
#   Inngest key, or requiring SC9/FQ-75 to be fully provisioned. Proves the
#   BC1-fixed incident-opening wiring the same way T-97 proved its own
#   failure path (a deliberately-wrong value in a manual test invocation,
#   never the real credential's real scope). See DECISIONS.md for the run
#   that used this to verify.
#
# T-111 / SC7 OPTION (ii) — STAGING-STOPPED GUARD (added 2026-07-13, DECISIONS.md):
# closes the residual timing race T-108's own SC7 re-review named but did not
# close (docs/adr/0010-staging-deploy-trigger-sc7.md lines ~122-126): T-108's
# start-then-stop (option i) restores ops-hub-staging to STOPPED after every
# main-deploy.yml run, but staging can be TRANSIENTLY running (mid start-then-
# stop, or from a manual/other trigger) exactly when this monitor's scheduled
# run fires — and staging's OWN 5-minute sweepNewTickets/sweepRespondedTickets/
# sla-monitor crons are GUC'd to this monitor's SAME synthetic tenant/project
# (SC7's named operating assumption, header above), so they'd double-process
# the sentinel ticket ahead of or alongside this run's own dispatch, corrupting
# the read. New first-class step "Guard — ops-hub-staging must be STOPPED
# before this run proceeds (SC7 option ii, T-111)" (id: staging_guard) queries
# ops-hub-staging's ACTUAL container state via SSH `docker ps` (authoritative —
# not the Coolify status field; same technique t107-check-staging-status.yml
# already proved) BEFORE "Reset sentinel ticket" runs. Reuses EXISTING repo
# secrets only (VPS_HOST, SSH_PRIVATE_KEY — already used by
# t107-check-staging-status.yml and a dozen other diagnose-*/fix-*.yml
# workflows for this exact SSH-to-Coolify-VPS pattern); no new credential.
# Strictly READ-ONLY — this guard never stops/starts/mutates anything; it only
# decides whether THIS run may proceed.
#
# DESIGN DECISION (three sub-cases, each considered deliberately, not defaulted
# into — see DECISIONS.md 2026-07-13 "T-111" entry for the full option
# comparison):
#   1. staging confirmed STOPPED → proceed=true, the run continues exactly as
#      before this guard existed.
#   2. staging confirmed RUNNING → proceed=false, `::warning::` annotated,
#      SKIP CLEANLY (exit 0, job stays GREEN) — deliberately mirrors this
#      file's own existing "monitor dormant" idiom (missing-secrets guard,
#      above) rather than failing the job red. Rationale: this monitor's own
#      header states its purpose is catching "a green health signal while the
#      real path is broken" — a transiently-running staging (most likely mid a
#      legitimate main-deploy.yml start-then-stop window, which self-resolves
#      within minutes) is NOT that; it is "this run can't take a clean
#      measurement right now," the same semantic class as the pre-existing
#      dormant/missing-secrets case, not a downstream-pipeline failure. Making
#      a benign, self-healing, infrequent deploy-overlap go RED would train
#      watchers to discount this monitor's red runs — exactly the signal this
#      monitor cannot afford to be noisy about. NO status-page incident is
#      opened for this case (SC8 stays reserved for a confirmed downstream-
#      chain break via reset/dispatch/poll/langfuse failure, not an internal
#      precondition miss) — this falls out for free, untouched: the "On
#      failure" step's existing `steps.guard.outputs.ready == 'true'`
#      condition is never true when "Guard — required credentials" itself
#      never runs (see gating below), so no code in that step needed
#      touching. Detecting staging left running across MANY consecutive
#      cycles (a real operational problem, distinct from one benign overlap)
#      is the STILL-UNDECIDED T-98 consecutive-fail-threshold carry
#      (WORK.md Sprint 15 "Explicitly deferred" list) — deliberately NOT
#      rebuilt here; this guard is a single-run precondition check only.
#   3. the SSH check ITSELF fails (VPS/SSH unreachable, can't confirm either
#      way) → proceed=false, FAIL THE JOB (exit 1, job goes RED) — the one
#      deliberate asymmetry from case 2. Fail-closed: never proceed on an
#      unconfirmed state. Red (not a quiet skip) because, unlike a
#      transiently-running staging, an unreachable VPS/SSH path does NOT
#      self-heal — if it silently skip-clean-green'd like case 2, a rotated
#      key or VPS network change could persist unnoticed for cycle after
#      cycle, silently zeroing out this monitor's downstream-chain coverage
#      while it kept reporting green — precisely the "green while the real
#      path is broken" failure mode this monitor exists to catch, this time
#      in its own precondition check. Still no status-page incident (SC8
#      stays reserved for a confirmed downstream-pipeline break, not an
#      SSH/VPS-reachability problem outside this monitor's own scope) — but a
#      genuinely red, notification-generating CI run, which case 2
#      deliberately is not.
#
# GATING: only ONE existing line changes — "Guard — required credentials +
# sentinel ticket id all present" (id: guard) gets `if:
# steps.staging_guard.outputs.proceed == 'true'` added. When staging_guard
# sets proceed=false (either exit path), the credentials-guard step does not
# run, so `steps.guard.outputs.ready` is never set — every existing
# downstream step (already gated on `steps.guard.outputs.ready == 'true'`)
# cascades to skipped without any of their own conditions needing to change,
# and the already-BC1-fixed incident-open/resolve steps' existing conditions
# are untouched and correctly stay skipped. No grace/polling window: the
# guard makes one authoritative read and decides — proceeding is unsafe for
# the SAME correctness reason (sentinel-ticket sweep collision) regardless of
# WHY staging is running, so waiting to distinguish "legitimate deploy" from
# "left running by mistake" would add latency and its own race without
# changing what this run should do either way.
#
# mode=simulate-failure is DELIBERATELY UNCHANGED by this guard — its "Reset
# sentinel ticket" target is always a guaranteed-nonexistent id, never the
# SC7-protected sentinel row, so it is unaffected by staging's cron activity
# either way; gating it behind staging_guard would only add friction to an
# already-independent, already-proven failure-path test. staging_guard exits
# proceed=true immediately (untouched) when MODE=simulate-failure.
#
# mode=simulate-staging-running (NEW, manual verification only — never on the
#   schedule): forces staging_guard to treat ops-hub-staging as RUNNING
#   WITHOUT querying real SSH/Coolify state at all — proves the case-2
#   skip-clean abort branch fires for real (Reset/Dispatch/Poll/LangFuse and
#   the incident-open step all stay skipped, job stays green) without
#   requiring staging to actually be left running or touching any live
#   infrastructure. Same "extend the existing mode input, don't invent a
#   second one" pattern as mode=simulate-failure. See DECISIONS.md for the
#   run that used this to verify.
#
# T-113 (Sprint 16 Track B) — CONSECUTIVE-FAIL THRESHOLD, gating the
# CUSTOMER-FACING page ONLY: this monitor used to open a status-page incident
# on a SINGLE failed run. Flagged as an undecided carry since Sprint 12
# (T-102's own header explicitly deferred it, warning that copying its
# FAIL_THRESHOLD=3 onto this file's 6-hourly cadence would push detection to
# 12-18+ hours — working against the whole reason T-98 exists). This is NOT a
# copy-paste of T-102: it is its own calibration, grounded in this file's own
# real run history, not a guess.
#
# EVIDENCE CHECKED (`gh run list --workflow=monitor-e2e-pipeline.yml`, full
# history at decision time, 2026-07-14): 7 of 7 `event=schedule` runs are
# `conclusion=success` — ZERO observed transient/self-healing failures on the
# real cron cadence, unlike T-102's monitor (whose threshold was justified
# REACTIVELY by two OBSERVED self-healing hiccups, 07-10/07-11). The only
# `conclusion=failure` runs in this file's entire history (3 of 3) are
# `event=workflow_dispatch` and independently confirmed, step-by-step, to be
# deliberate `mode=simulate-failure` verification dispatches — not real noise.
# On that evidence alone, "no threshold" would be a defensible read. It is
# NOT what was chosen, for the reason below.
#
# WHY N=2, NOT "NONE": the no-noise evidence is thin (7 runs over ~2 days) and
# is not symmetric proof that no future single-shot blip will ever occur.
# Critically, `reset` / `dispatch` / `langfuse` are each a SINGLE HTTP or DB
# round-trip with NO internal retry (unlike `poll`, which already tolerates
# transient blips via its own 30x20s loop) — a single transient Inngest 503,
# LangFuse rate-limit, or DB connection hiccup fails the run immediately and,
# under the OLD single-failure-pages behavior, would have immediately opened
# a customer-facing "Ops Hub Production disrupted" notice for what is
# ops-tooling noise, not a broken pipeline. That is the real, symmetric risk
# a threshold buys down, even with zero observed history of it firing yet.
#
# THE KEY DESIGN CHOICE THAT MAKES N=2 CHEAP: the threshold gates ONLY the
# status-page incident-open call below — it does NOT touch this Actions run's
# own red/green conclusion, and does NOT touch the existing GitHub
# failed-run-notification email backstop (fires to repo watchers on ANY
# single failed run, unchanged, same backstop T-102's header already relies
# on). So:
#   - TEAM-facing detection latency: UNCHANGED. A single failure still shows
#     red at T+0 and still emails watchers at T+0.
#   - CUSTOMER-facing page latency: was T+0 (single fail), now T+6h (2nd
#     CONSECUTIVE fail) for a genuine sustained break.
# N=2 filters exactly the single-shot-blip risk above at effectively zero
# added cost to the team's own detection speed, for +6h before a REAL
# sustained break reaches the customer-facing status page — comfortably
# inside "catch it before a founder notices missing replies" for a
# 6-hourly-cadence system. N=3 (a literal T-102 copy) would double that to
# +12h, which is exactly the outcome T-102's own header, and this sprint's
# scoping (WORK.md), explicitly named as working against T-98's purpose.
#
# MECHANISM: reuses T-102's PROVEN `gh run list` lookback technique exactly
# (see monitor-litellm-internal-auth.yml's "Determine consecutive-fail
# streak" step) — same event-name scoping (a manual `mode=simulate-failure`
# verification dispatch, event=workflow_dispatch, can never count towards or
# be counted by the real event=schedule prod streak, and vice versa) — with
# ONE recalibration: STREAK_LOOKBACK_HOURS=10 instead of T-102's 2h. Sized
# from first principles for THIS file's 6-hourly cadence: comfortably above
# 6h to absorb GitHub Actions scheduler jitter, comfortably below 12h (two
# full cycles) so a run from two cycles ago can never be mistaken for "the
# immediately-prior run" in the NEED=1 (FAIL_THRESHOLD-1) lookback.
#
# CLEAN-SKIP EXCLUSION — VERIFIED AGAINST REAL DATA, NOT ASSUMED: does a
# `staging_guard`/`guard` clean skip (T-111's case 2, or the pre-existing
# missing-secrets dormant guard) ever land in `gh run list` as
# `conclusion=failure`? Checked against real history: run 29284121758 (T-111's
# own `mode=simulate-staging-running` proof run) concluded `success` even
# though `staging_guard` tripped and every downstream step (reset/dispatch/
# poll/langfuse/incident-open) was skipped. The missing-secrets dormant guard
# shares the exact same shape (the guard step itself always exits 0; every
# downstream step cascades to `skipped`, not `failure`, via its own `if:`
# condition; no step ever exits non-zero) so it reports `success` for the
# identical reason. **T-102's `conclusion == 'failure'` filter therefore
# already excludes BOTH clean-skip classes for free — no special-casing was
# added for this.**
#
# KNOWN LIMITATION (T-102-style — noted, not fixed): the lookback inspects
# only the immediately-prior COMPLETED same-event run. If a clean skip (guard
# trips) lands between two real downstream failures, that skip's `success`
# conclusion breaks the "previous run was ALSO a failure" check, resetting
# the streak to 0 even though the two real failures are only one skipped
# cycle apart. Considered rare (skips are themselves an infrequent deploy-
# overlap condition) and self-correcting (the next cycle's failure re-starts
# the count and can still reach threshold one cycle later) — not fixed here,
# same posture as T-102's own "flaky status-incident.yml dispatch could nudge
# the streak" known limitation.
#
# FAILURE-PATH PROOF (Sprint 10 §5.1 norm — required before this is trusted
# live): two chained `mode=simulate-failure` dispatches, same technique T-102
# used to prove its own threshold. Run links + outcomes in DECISIONS.md's
# 2026-07-14 "T-113" entry.

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours (SC5) — do not shorten without a fresh review.
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        options: [live, simulate-failure, simulate-staging-running]
        description: "live = real scheduled behavior; simulate-failure = verification-only, forces the 'reset' step to fail via a guaranteed-nonexistent ticket id against the real (already-signed-off) DB credential, without touching the real sentinel row or the real Inngest key; simulate-staging-running = verification-only, forces the SC7 staging-guard to treat ops-hub-staging as RUNNING without querying real infra, proving the guard's skip-clean abort branch (T-111)"
        default: live

permissions:
  contents: read
  actions: write

concurrency:
  group: monitor-e2e-pipeline
  cancel-in-progress: false

env:
  SYN_PROJECT_ID: "00000000-0000-0000-0000-000000000001"
  SYN_TENANT_ID: "00000000-0000-0000-0000-000000000010"
  INCIDENT_TITLE: "Synthetic E2E pipeline monitor failing — downstream chain broken (T-98)"
  # 10-minute post-dispatch window (SC8's suggested default). QA Manager owns
  # refining this threshold once real run-time data exists; not tuned here.
  POLL_MAX_ATTEMPTS: "30"
  POLL_INTERVAL_SECONDS: "20"
  # T-113: consecutive-fail threshold before this monitor opens a
  # CUSTOMER-FACING status-page incident. Does NOT gate this Actions run's
  # own red/green conclusion or the GitHub failed-run-notification email —
  # both fire on a SINGLE failure, unchanged. See the header comment block
  # above for the full rationale (deliberately NOT a copy of T-102's
  # FAIL_THRESHOLD=3 — that value was calibrated for a 15-minute cadence).
  FAIL_THRESHOLD: "2"
  # Lookback window for the streak check, recalibrated from T-102's 2h (sized
  # for 15-min cadence) to this file's 6-hourly cadence: above 6h for
  # scheduler-jitter headroom, below 12h (two cycles) so a run from two
  # cycles back can't be mistaken for "the immediately-prior run."
  STREAK_LOOKBACK_HOURS: "10"
  # T-111 / SC7 option (ii): same pinned Coolify app UUID main-deploy.yml uses
  # (that file's own comment, T-54/WORK.md: pinned by UUID, not name, because
  # ops-hub-prod's app happens to share the display name "ops-hub-app" in a
  # different Coolify project — a name lookup would match both).
  OPS_HUB_STAGING_UUID: "ajqplom2mghf5a8h6vf1q6xg"

jobs:
  monitor:
    name: Inject synthetic ticket + assert downstream chain
    runs-on: ubuntu-latest
    env:
      MODE: ${{ inputs.mode || 'live' }}
      E2E_MONITOR_DB_URL: ${{ secrets.E2E_MONITOR_DB_URL }}
      E2E_MONITOR_INNGEST_KEY: ${{ secrets.E2E_MONITOR_INNGEST_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      SENTINEL_TICKET_ID: ${{ vars.E2E_SENTINEL_TICKET_ID }}
    steps:
      # ── T-111 / SC7 option (ii): staging-stopped guard ─────────────────────
      # Must run before anything else in this job (including "Install psql") —
      # see the header comment block above for the full design rationale.
      - name: Setup SSH key (SC7 staging-guard)
        if: env.MODE == 'live'
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Guard — ops-hub-staging must be STOPPED before this run proceeds (SC7 option ii, T-111)
        id: staging_guard
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ "$MODE" = "simulate-failure" ]; then
            echo "::notice title=T-111 SC7 guard N/A in simulate-failure mode::mode=simulate-failure always targets a guaranteed-nonexistent ticket id in the 'Reset sentinel ticket' step, never the SC7-protected sentinel row, so it is unaffected by staging's cron activity either way. Not gating that independent, already-proven failure-path test behind this guard."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$MODE" = "simulate-staging-running" ]; then
            echo "::notice title=T-111 monitor SIMULATE-STAGING-RUNNING mode::Manual verification-only run (never scheduled). Forces this guard to treat ops-hub-staging as RUNNING WITHOUT querying real SSH/Coolify state, proving that Reset/Dispatch/Poll/LangFuse and the incident-open step all correctly stay skipped when the guard trips — without needing to actually leave staging running (this guard is read-only and never starts/stops anything itself)."
            echo "::warning title=T-111 SC7 guard SIMULATED — treating ops-hub-staging as RUNNING::This is a forced verification run (mode=simulate-staging-running), not a real reading of infrastructure state. See DECISIONS.md for the run that used this to prove the guard's abort branch."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Checking ops-hub-staging's ACTUAL container state via SSH (authoritative — not the Coolify status field; same technique as t107-check-staging-status.yml's 'AUTHORITATIVE container state' step)..."
          OUT=$(ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            "haytham@${VPS_HOST}" \
            "docker ps --filter name=${OPS_HUB_STAGING_UUID} --format '{{.Names}}'" 2>&1) && RC=0 || RC=$?
          if [ "$RC" -ne 0 ]; then
            echo "$OUT"
            echo "::error title=T-111 SC7 guard: could not verify ops-hub-staging's state::SSH check failed (exit $RC). Fail-closed: this run cannot confirm ops-hub-staging is stopped, so it will NOT touch the sentinel ticket — proceeding blind would defeat the point of this guard. Deliberately a genuine job failure (not a quiet skip): unlike a transiently-running staging (self-resolving within minutes via main-deploy.yml's start-then-stop), an unreachable VPS/SSH path does not self-heal and could otherwise persist unnoticed, silently removing this monitor's downstream-chain coverage every 6 hours. No status-page incident opened by this step (SC8 is reserved for a confirmed downstream-chain break, not an SSH/VPS-reachability problem)."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ -n "$OUT" ]; then
            echo "::warning title=T-111 SC7 guard: ops-hub-staging is RUNNING ($OUT) — skipping this cycle::SC7's named operating assumption (this file's header) is that ops-hub-staging stays STOPPED between deploys; it is running right now. Could be main-deploy.yml's legitimate start-then-stop window still in flight, or staging left running by mistake — either way, staging's own sweepNewTickets/sweepRespondedTickets/sla-monitor crons are GUC'd to this monitor's SAME synthetic tenant/project and would double-process the sentinel ticket if this run proceeded (synthetic-tenant LiteLLM spend, duplicate FreeScout notes, KB pollution, and a corrupted read on this monitor's own signal). Skipping this run's downstream-chain assertion cleanly rather than risk that — not a job failure, not a status-page incident. The next scheduled run (6h) or a manual dispatch will re-check. A staging left running across MANY consecutive cycles is a real operational problem, but detecting that pattern is the still-undecided T-98 consecutive-fail-threshold carry (WORK.md) — deliberately not rebuilt here."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Confirmed: no running ops-hub-staging container. SC7 default state intact — proceeding."
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Cleanup SSH key (SC7 staging-guard)
        if: always()
        run: rm -f ~/.ssh/id_ed25519
      # ── end T-111 / SC7 option (ii) guard ──────────────────────────────────

      - name: Install psql
        run: sudo apt-get install -y postgresql-client

      - name: Guard — required credentials + sentinel ticket id all present
        id: guard
        if: steps.staging_guard.outputs.proceed == 'true'
        run: |
          if [ "$MODE" = "simulate-failure" ]; then
            echo "::notice title=T-98 monitor SIMULATE-FAILURE mode::Manual verification-only run (never scheduled). Forces the 'reset' step to fail for real against the already-signed-off, RLS-scoped E2E_MONITOR_DB_URL by targeting a guaranteed-nonexistent ticket id — proving the BC1-fixed incident-opening wiring without touching the real sentinel row, the real Inngest key, or requiring E2E_SENTINEL_TICKET_ID/FQ-75 to be fully provisioned."
            if [ -z "${E2E_MONITOR_DB_URL:-}" ]; then
              echo "::error::simulate-failure mode still requires E2E_MONITOR_DB_URL (the real, RLS-scoped, already-signed-off credential) so the forced failure is a genuine DB round-trip, not a mock."
              exit 1
            fi
            echo "::add-mask::$E2E_MONITOR_DB_URL"
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          MISSING=""
          [ -n "${E2E_MONITOR_DB_URL:-}" ]      || MISSING="$MISSING E2E_MONITOR_DB_URL"
          [ -n "${E2E_MONITOR_INNGEST_KEY:-}" ]  || MISSING="$MISSING E2E_MONITOR_INNGEST_KEY"
          [ -n "${SENTINEL_TICKET_ID:-}" ]       || MISSING="$MISSING E2E_SENTINEL_TICKET_ID(vars)"
          if [ -n "$MISSING" ]; then
            echo "::notice title=T-98 monitor dormant::Missing:$MISSING. This is the expected pre-provisioning state (FQ-75 pending founder action + SC9 sentinel-ticket setup), not a failure. Exiting clean — no incident opened, nothing dispatched."
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$E2E_MONITOR_DB_URL"
          echo "::add-mask::$E2E_MONITOR_INNGEST_KEY"
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Reset sentinel ticket to state='new' (Amendment A1 — same row, every run)
        if: steps.guard.outputs.ready == 'true'
        id: reset
        run: |
          echo "::add-mask::$E2E_MONITOR_DB_URL"
          if [ "$MODE" = "simulate-failure" ]; then
            # Guaranteed-nonexistent — never the real sentinel row. Matches 0
            # rows against the real, RLS-scoped E2E_MONITOR_DB_URL, producing a
            # genuine (safe) failure to prove the BC1-fixed incident wiring.
            TARGET_ID="00000000-0000-0000-0000-0000000000ff"
            echo "SIMULATE-FAILURE: targeting deliberately-nonexistent ticket id $TARGET_ID."
          else
            TARGET_ID="$SENTINEL_TICKET_ID"
          fi
          OUT=$(printf '%s\n' "update tickets set state = 'new' where id = :'id'::uuid returning id" \
            | psql "$E2E_MONITOR_DB_URL" -v id="$TARGET_ID" -v ON_ERROR_STOP=1 -tA -f - 2>&1) && RC=0 || RC=$?
          echo "$OUT"
          # Check for the literal "UPDATE 1" command tag (the same
          # distinguishing-string technique verify-e2e-monitor-role.yml check
          # (d) already uses) -- NOT emptiness. psql -tA still prints the
          # command tag even on a 0-row match ("UPDATE 0" is non-empty text),
          # so an emptiness check alone silently false-passes a no-op update.
          # This matters beyond correctness: simulate-failure mode relies on
          # this exact detection to fail HERE (not cascade into a real
          # Inngest dispatch with the real sentinel id once fully
          # provisioned) -- see the header's mode=simulate-failure note.
          if [ "$RC" -ne 0 ] || ! printf '%s\n' "$OUT" | grep -qx 'UPDATE 1'; then
            echo "::error::Could not reset the sentinel ticket ($TARGET_ID) to state='new' (expected exactly one 'UPDATE 1'). Either the row doesn't exist yet (SC9 provisioning incomplete, or this is a deliberate simulate-failure run) or the RLS-hardcoded scope rejected it (E2E_SENTINEL_TICKET_ID pointing at the wrong tenant/project?)."
            exit 1
          fi
          echo "Sentinel ticket $TARGET_ID reset to state='new'."

      - name: Dispatch ops-hub/ticket.triage via Inngest's Event API
        if: steps.guard.outputs.ready == 'true' && steps.reset.outcome == 'success'
        id: dispatch
        run: |
          echo "::add-mask::$E2E_MONITOR_INNGEST_KEY"
          PAYLOAD=$(jq -n \
            --arg name "ops-hub/ticket.triage" \
            --arg ticket_id "$SENTINEL_TICKET_ID" \
            --arg project_id "$SYN_PROJECT_ID" \
            --arg tenant_id "$SYN_TENANT_ID" \
            '{name: $name, data: {ticket_id: $ticket_id, project_id: $project_id, tenant_id: $tenant_id}}')
          HTTP=$(curl -s --max-time 20 -o /tmp/dispatch.json -w "%{http_code}" \
            -X POST "https://inn.gs/e/${E2E_MONITOR_INNGEST_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          echo "Inngest Event API -> HTTP $HTTP"
          cat /tmp/dispatch.json 2>/dev/null || true
          echo ""
          if [ "$HTTP" != "200" ]; then
            echo "::error::Inngest Event API rejected the dispatch (HTTP $HTTP). Never a downstream-pipeline symptom — this is the event-ingestion hop itself failing (bad/revoked key, or Inngest outage)."
            exit 1
          fi

      - name: Poll for the downstream chain to complete (state='responded')
        if: steps.guard.outputs.ready == 'true' && steps.dispatch.outcome == 'success'
        id: poll
        run: |
          echo "::add-mask::$E2E_MONITOR_DB_URL"
          FINAL_STATE=""
          for i in $(seq 1 "$POLL_MAX_ATTEMPTS"); do
            STATE=$(printf '%s\n' "select state from tickets where id = :'id'::uuid" \
              | psql "$E2E_MONITOR_DB_URL" -v id="$SENTINEL_TICKET_ID" -tA -f - 2>&1)
            echo "Attempt $i/$POLL_MAX_ATTEMPTS: state=$STATE"
            if [ "$STATE" = "responded" ]; then
              FINAL_STATE="responded"
              break
            fi
            sleep "$POLL_INTERVAL_SECONDS"
          done
          echo "final_state=$FINAL_STATE" >> "$GITHUB_OUTPUT"
          if [ "$FINAL_STATE" != "responded" ]; then
            echo "::error::Sentinel ticket did not reach state='responded' within $((POLL_MAX_ATTEMPTS * POLL_INTERVAL_SECONDS))s of dispatch. The downstream chain (triage -> respond -> DB state) is broken or degraded — this is exactly the class of failure T-71/FQ-69/FQ-70 all shared."
            exit 1
          fi
          echo "Sentinel ticket reached state='responded' — triage + respond + DB-state hops all completed."

      - name: Assert a LangFuse trace exists for this run
        if: steps.guard.outputs.ready == 'true' && steps.poll.outcome == 'success'
        id: langfuse
        run: |
          python3 - <<'PYEOF'
          import base64, json, os, sys, urllib.request, urllib.error, urllib.parse
          from datetime import datetime, timedelta, timezone

          public_key = os.environ["LANGFUSE_PUBLIC_KEY"]
          secret_key = os.environ["LANGFUSE_SECRET_KEY"]
          tenant_id = os.environ["SYN_TENANT_ID"]
          ticket_id = os.environ["SENTINEL_TICKET_ID"]

          base_url = "https://us.cloud.langfuse.com"
          # Reuses the exact auth/pagination/fields contract verify-agent-cost-feed.yml
          # (T-58) already proved against real LangFuse Cloud data. Scoped to a tight
          # lookback (this run's own dispatch) so a stale trace from a prior run can't
          # produce a false pass.
          from_ts = (datetime.now(timezone.utc) - timedelta(minutes=20)).isoformat()
          auth = base64.b64encode(f"{public_key}:{secret_key}".encode()).decode()

          found = None
          for trace_name in ("ticket-triage", "ticket-respond"):
              params = {"name": trace_name, "fromTimestamp": from_ts, "page": "1", "limit": "20", "fields": "core,io,metrics"}
              url = f"{base_url}/api/public/traces?{urllib.parse.urlencode(params)}"
              req = urllib.request.Request(url, headers={"Authorization": f"Basic {auth}"})
              try:
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      body = json.loads(resp.read().decode())
              except urllib.error.HTTPError as e:
                  print(f"::error::LangFuse API returned HTTP {e.code} for {trace_name}: {e.read().decode()[:300]}")
                  sys.exit(1)
              except Exception as e:
                  print(f"::error::Request to LangFuse failed for {trace_name}: {e}")
                  sys.exit(1)

              for t in body.get("data", []):
                  md = t.get("metadata") or {}
                  if isinstance(md, dict) and md.get("tenant_id") == tenant_id and str(md.get("ticket_id")) == ticket_id:
                      found = (trace_name, t.get("id"), t.get("timestamp"))
                      break
              if found:
                  break

          if not found:
              print("::error::No ticket-triage/ticket-respond LangFuse trace found for this run's sentinel ticket in the last 20 minutes. The DB state advanced, but observability/tracing may be broken — investigate before treating this run as fully healthy.")
              sys.exit(1)

          name, trace_id, ts = found
          # Print nothing but id/timestamps (R3c) — never ticket/draft content.
          print(f"LangFuse trace confirmed: name={name} id={trace_id} timestamp={ts}")
          PYEOF

      - name: Determine consecutive-fail streak (read-only run-history lookback, T-113)
        id: streak
        # Same trigger condition as the old single "On failure" step (BC1's
        # `failure()` requirement carried forward — a bare if-expression is
        # implicitly ANDed with success() by GitHub Actions).
        if: failure() && steps.guard.outputs.ready == 'true' && (steps.reset.outcome == 'failure' || steps.dispatch.outcome == 'failure' || steps.poll.outcome == 'failure' || steps.langfuse.outcome == 'failure')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEED=$((FAIL_THRESHOLD - 1))
          EVENT="${{ github.event_name }}"
          RUN_ID="${{ github.run_id }}"
          CUTOFF=$(date -u -d "-${STREAK_LOOKBACK_HOURS} hours" +%Y-%m-%dT%H:%M:%SZ)
          echo "This run's downstream chain failed. A CUSTOMER-FACING incident only opens once this is the ${FAIL_THRESHOLD}th CONSECUTIVE failure (T-113) — this Actions run itself still fails red and GitHub's own failed-run-notification email still fires regardless (team-facing detection is unchanged by this threshold). Checking whether the previous $NEED completed run(s) of this workflow (same trigger event=$EVENT, created since $CUTOFF, excluding this in-progress run $RUN_ID) were ALSO failures."
          echo "Same event-scoping + recency-window technique as monitor-litellm-internal-auth.yml's T-102 (see this file's header for the full rationale) — recalibrated to STREAK_LOOKBACK_HOURS=${STREAK_LOOKBACK_HOURS}h for this file's 6-hourly cadence (T-102 used 2h for a 15-minute cadence)."

          RUNS_JSON=$(gh run list --repo "${{ github.repository }}" --workflow monitor-e2e-pipeline.yml \
            --json databaseId,conclusion,status,createdAt,event --limit 30)

          PREV=$(echo "$RUNS_JSON" | jq --arg cur "$RUN_ID" --arg ev "$EVENT" --arg cutoff "$CUTOFF" \
            '[.[] | select((.databaseId|tostring) != $cur and .status == "completed" and .event == $ev and .createdAt >= $cutoff)] | sort_by(.createdAt) | reverse | .[0:'"$NEED"']')
          PREV_COUNT=$(echo "$PREV" | jq 'length')
          FAIL_COUNT=$(echo "$PREV" | jq '[.[] | select(.conclusion == "failure")] | length')

          echo "Previous completed same-event runs considered (need $NEED): $PREV_COUNT. Of those, $FAIL_COUNT were failures."
          echo "$PREV" | jq -r '.[] | "  run \(.databaseId): conclusion=\(.conclusion) createdAt=\(.createdAt)"'

          if [ "$PREV_COUNT" -ge "$NEED" ] && [ "$FAIL_COUNT" -eq "$NEED" ]; then
            echo "threshold_met=true" >> "$GITHUB_OUTPUT"
            echo "Streak confirmed: this is consecutive failure #$FAIL_THRESHOLD — opening a real status-page incident."
          else
            echo "threshold_met=false" >> "$GITHUB_OUTPUT"
            echo "Sub-threshold: only $((FAIL_COUNT + 1))/$FAIL_THRESHOLD consecutive failures so far (or insufficient recent same-event run history) — self-clearing on the CUSTOMER-FACING page only. No incident opened."
          fi

      - name: On failure (threshold met) — open a status-page incident + fail the run
        # BC1 fix carried forward: `failure()` is required here — see the
        # streak step's comment above for why a bare if-expression is not
        # enough.
        if: failure() && steps.guard.outputs.ready == 'true' && (steps.reset.outcome == 'failure' || steps.dispatch.outcome == 'failure' || steps.poll.outcome == 'failure' || steps.langfuse.outcome == 'failure') && steps.streak.outputs.threshold_met == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::error::T-98 downstream E2E monitor failed on consecutive failure #$FAIL_THRESHOLD (T-113 threshold reached) — opening a status-page incident."
          gh workflow run status-incident.yml --repo "${{ github.repository }}" --ref main \
            -f action=open \
            -f title="$INCIDENT_TITLE" \
            -f affected="Ops Hub Production,LiteLLM Production" \
            -f severity=disrupted
          exit 1

      - name: On failure (sub-threshold) — self-clear silently, no customer-facing page
        # threshold_met defaults to unset (not 'true') if the streak step
        # itself never ran or errored before writing its output — fail-safe:
        # an unset/'' value takes this branch, never the incident-open one.
        if: failure() && steps.guard.outputs.ready == 'true' && (steps.reset.outcome == 'failure' || steps.dispatch.outcome == 'failure' || steps.poll.outcome == 'failure' || steps.langfuse.outcome == 'failure') && steps.streak.outputs.threshold_met != 'true'
        run: |
          echo "::warning::T-98 downstream E2E monitor failed but the T-113 consecutive-fail threshold (FAIL_THRESHOLD=$FAIL_THRESHOLD) has not been met yet — self-clearing on the CUSTOMER-FACING status page only (no incident opened). This Actions run still fails red and GitHub's own failed-run-notification email still fires — team-facing detection is unchanged. If this repeats until $FAIL_THRESHOLD consecutive failures, the next run's run-history lookback will open a real incident."
          exit 1

      - name: On success — resolve any open incident from this monitor
        if: steps.guard.outputs.ready == 'true' && steps.langfuse.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downstream chain confirmed healthy end-to-end — resolving any open incident opened by this monitor."
          gh workflow run status-incident.yml --repo "${{ github.repository }}" --ref main \
            -f action=resolve \
            -f title="$INCIDENT_TITLE"
