name: Apply FQ-59 Basic Auth to Ops Dashboard staging + verify (401/200)

# FQ-59 Action 2 + Action 3 (BLOCKING verification), applied to the T-59
# Ops Dashboard staging app created by provision-ops-dashboard-staging.yml
# (FQ-60). Do NOT dispatch this until the founder has attached a domain to
# that app in the Coolify UI (Coolify rejects `fqdn` via API for
# docker-image apps -- see that workflow's header and FOUNDER_QUEUE.md
# FQ-60) -- there is no Traefik router to attach a basicauth middleware to
# until Coolify generates host-routing labels for a real FQDN.
#
# Credential: the SAME user:hash generated by Tech Lead for T-57 (apr1/MD5,
# Traefik-compatible) -- read from repo secrets, never regenerated, never
# printed. Two secrets are required (set via `gh secret set`, never pasted
# in a PR or in chat):
#   DASHBOARD_BASIC_AUTH_USERHASH -- the label value, escaped for a raw
#     Traefik docker-compose label ($ -> $$), e.g. opsadmin:$$apr1$$...
#   DASHBOARD_BASIC_AUTH_PASSWORD -- the plaintext password, used ONLY for
#     this workflow's own verification curl (-u opsadmin:$PASSWORD);
#     GitHub auto-masks it in logs.
#
# Approach mirrors fix-litellm-traefik-label.yml (the only prior precedent
# in this repo for editing an app's Traefik labels via the Coolify API):
# GET custom_labels (base64) -> decode -> find EVERY router Coolify
# generated for the FQDN (typically an http redirect router AND a separate
# https content router) -> merge a basicauth middleware into each router's
# existing middlewares (not clobber -- Coolify may already set one, e.g. a
# redirect-to-https middleware) -> re-encode -> PATCH -> stop/start to force
# the container to pick up the new labels -> verify.

on:
  workflow_dispatch: {}
  # Fallback trigger: this repo has a documented, unresolved GitHub-side quirk
  # where a freshly-added workflow's workflow_dispatch trigger sometimes can't
  # actually be invoked via API/CLI (HTTP 422 "Workflow does not have
  # 'workflow_dispatch' trigger", even though the committed YAML plainly has
  # one) -- see FOUNDER_QUEUE.md FQ-48 (backup-verification.yml hit the same
  # thing; a full rename didn't fix it there either). repository_dispatch is
  # a different API path (POST /repos/{owner}/{repo}/dispatches with an
  # event_type, not tied to a specific workflow's cached trigger metadata),
  # so it is used here as the reliable way to fire this workflow on demand.
  repository_dispatch:
    types: [apply-dashboard-basic-auth]

permissions:
  contents: read

env:
  COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"
  # Stable Coolify app UUID for ops-hub-dashboard-staging, pinned after
  # provision-ops-dashboard-staging.yml created it -- do NOT resolve by name.
  DASHBOARD_UUID: "r14c3p7jzwo4wxyprd4yxyev"

jobs:
  apply-and-verify:
    name: Apply Traefik basic-auth label + blocking 401/200 verification
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      USERHASH: ${{ secrets.DASHBOARD_BASIC_AUTH_USERHASH }}
      DASH_PASSWORD: ${{ secrets.DASHBOARD_BASIC_AUTH_PASSWORD }}

    steps:
      - name: Guard -- required secrets present
        run: |
          [ -n "$TOKEN" ] || { echo "::error::COOLIFY_API_TOKEN not set"; exit 1; }
          [ -n "$USERHASH" ] || { echo "::error::DASHBOARD_BASIC_AUTH_USERHASH not set"; exit 1; }
          [ -n "$DASH_PASSWORD" ] || { echo "::error::DASHBOARD_BASIC_AUTH_PASSWORD not set"; exit 1; }
          [ "$DASHBOARD_UUID" != "__DASHBOARD_UUID__" ] || { echo "::error::DASHBOARD_UUID placeholder was never filled in"; exit 1; }

      - name: Confirm the app has a domain
        id: fqdn
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/app.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$DASHBOARD_UUID")
          [ "$HTTP" = "200" ] || { echo "::error::GET /applications/$DASHBOARD_UUID HTTP $HTTP"; cat /tmp/app.json; exit 1; }
          FQDN=$(jq -r '.fqdn // empty' /tmp/app.json | sed 's#,.*##; s#/$##')
          if [ -z "$FQDN" ]; then
            echo "::error::No FQDN set on this app yet. Founder must attach a domain in the Coolify UI first (see FOUNDER_QUEUE.md FQ-60) -- stopping, nothing changed."
            exit 1
          fi
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"
          echo "Domain confirmed: $FQDN"

      - name: Get current custom_labels and merge basicauth into every router
        id: labels
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/app.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$DASHBOARD_UUID")
          [ "$HTTP" = "200" ] || { echo "::error::GET HTTP $HTTP"; exit 1; }

          CURRENT_B64=$(jq -r '.custom_labels // ""' /tmp/app.json)
          if [ -z "$CURRENT_B64" ]; then
            echo "::error::custom_labels is empty -- Coolify has not generated routing labels yet. Redeploy the app once after setting the domain, then re-run this workflow."
            exit 1
          fi
          DECODED=$(echo "$CURRENT_B64" | base64 -d)
          echo "=== Current labels ==="
          echo "$DECODED"

          # Coolify emits one router per scheme (http-0-<uuid>, https-0-<uuid> --
          # typically an http->https redirect router PLUS the content-serving
          # https router). Gate ALL of them found, not just one, so neither an
          # unexpected direct-http path nor the redirect router is left open.
          ROUTERS=$(echo "$DECODED" | grep -oE 'traefik\.http\.routers\.[a-zA-Z0-9_-]+\.rule=' \
            | sed -E 's/traefik\.http\.routers\.([a-zA-Z0-9_-]+)\.rule=/\1/' | sort -u)
          [ -n "$ROUTERS" ] || { echo "::error::no routers found in custom_labels"; exit 1; }
          echo "Routers found: $(echo "$ROUTERS" | tr '\n' ' ')"

          # Strip any prior dashauth artifacts (idempotent re-run) -- the
          # middleware definition line, and each router's OWN middlewares=
          # line (rebuilt below, MERGING in any pre-existing middlewares
          # rather than clobbering them).
          WORK=$(echo "$DECODED" | grep -v "middlewares\.dashauth\.basicauth\.users")
          NEW_MW_LINES=""
          for R in $ROUTERS; do
            EXISTING_LINE=$(echo "$WORK" | grep -E "^traefik\.http\.routers\.${R}\.middlewares=" || true)
            EXISTING_MW=$(echo "$EXISTING_LINE" | sed -E "s/^traefik\.http\.routers\.${R}\.middlewares=//" \
              | sed -E 's/(^|,)dashauth(,|$)/\1/' | sed -E 's/^,//; s/,$//')
            # Defensive: a valid middlewares value is a bare comma-separated
            # list of names -- it can never legitimately contain "=" or a
            # second "traefik.http.routers." key. If it does, this line is
            # corrupted (e.g. a prior run hit the newline-concatenation bug
            # above and glued two routers' lines into one) -- discard it
            # entirely rather than propagate/compound the corruption. Falls
            # back to "no prior middleware for this router", which is safe:
            # worst case we lose a cosmetic extra (e.g. gzip) that a later
            # manual pass can restore, never worse than what was already broken.
            if echo "$EXISTING_MW" | grep -qE '=|traefik\.http\.routers\.'; then
              echo "::warning::Discarding corrupted existing middlewares value for router ${R}: ${EXISTING_MW}"
              EXISTING_MW=""
            fi
            if [ -n "$EXISTING_MW" ]; then
              MW_VALUE="${EXISTING_MW},dashauth"
            else
              MW_VALUE="dashauth"
            fi
            WORK=$(echo "$WORK" | grep -vE "^traefik\.http\.routers\.${R}\.middlewares=")
            # NOTE: $(...) command substitution strips the trailing newline
            # printf emits, so concatenating substitution output directly
            # across loop iterations silently joins lines with no separator
            # once there is more than one router (never triggered before --
            # the old sslip.io preview only ever had a single router; a real
            # custom domain gets both an http redirect router AND an https
            # content router, exposing this on the very first two-router
            # run). Fix: append a LITERAL newline ($'\n', not inside the
            # substitution) after each line so it survives concatenation.
            NEW_MW_LINES="${NEW_MW_LINES}$(printf 'traefik.http.routers.%s.middlewares=%s' "$R" "$MW_VALUE")"$'\n'
          done

          NEW_LABELS=$(printf '%s\ntraefik.http.middlewares.dashauth.basicauth.users=%s\n%s' "$WORK" "$USERHASH" "$NEW_MW_LINES")
          echo "=== New router/middleware wiring (basicauth.users value withheld) ==="
          echo "$NEW_LABELS" | grep -v "basicauth.users"
          NEW_B64=$(printf '%s' "$NEW_LABELS" | base64 -w 0)
          echo "new_b64=$NEW_B64" >> "$GITHUB_OUTPUT"

      - name: PATCH custom_labels (adds Basic Auth middleware to every router)
        run: |
          PAYLOAD=$(jq -n --arg labels "${{ steps.labels.outputs.new_b64 }}" '{custom_labels:$labels}')
          HTTP=$(curl -s --max-time 30 -o /tmp/patch.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$DASHBOARD_UUID" -d "$PAYLOAD")
          echo "PATCH custom_labels -> HTTP $HTTP"
          [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ] || { echo "::error::PATCH failed"; cat /tmp/patch.json; exit 1; }

      - name: Stop then start (force container recreation with new labels)
        run: |
          curl -s --max-time 30 -o /dev/null -X POST \
            -H "Authorization: Bearer $TOKEN" "$COOLIFY_BASE/applications/$DASHBOARD_UUID/stop" || true
          sleep 10
          HTTP=$(curl -s --max-time 60 -o /tmp/start.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" "$COOLIFY_BASE/applications/$DASHBOARD_UUID/start")
          echo "Start HTTP $HTTP"
          echo "Waiting 45s for container + Traefik route to come up..."
          sleep 45

      - name: BLOCKING verification -- unauthenticated request must be 401
        id: verify401
        run: |
          FQDN="${{ steps.fqdn.outputs.fqdn }}"
          HTTP=000
          for i in $(seq 1 10); do
            HTTP=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "$FQDN/") || true
            echo "Attempt $i: $FQDN/ (no credentials) -> HTTP $HTTP"
            [ "$HTTP" = "401" ] && break
            sleep 15
          done
          echo "code=$HTTP" >> "$GITHUB_OUTPUT"
          if [ "$HTTP" != "401" ]; then
            echo "::error::Expected 401, got $HTTP. Label/hash is mis-applied (commonly the \$ -> \$\$ escaping) or Traefik hasn't picked up the new labels yet -- fix before treating the dashboard as gated."
            exit 1
          fi
          echo "401 confirmed -- dashboard is NOT publicly reachable without credentials."

      - name: BLOCKING verification -- authenticated request must be 200 and render real data
        run: |
          FQDN="${{ steps.fqdn.outputs.fqdn }}"
          HTTP=$(curl -sS -o /tmp/authed.html -w '%{http_code}' --max-time 15 -u "opsadmin:$DASH_PASSWORD" "$FQDN/")
          echo "Authenticated $FQDN/ -> HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "::error::Expected 200 with credentials, got $HTTP. Password/hash pair may not match -- regenerate both together if lost."
            exit 1
          fi
          BYTES=$(wc -c < /tmp/authed.html)
          echo "Response body: $BYTES bytes"
          echo "--- First 40 lines (structure only, no secrets expected in dashboard HTML) ---"
          head -40 /tmp/authed.html || true
          echo ""
          echo "200 confirmed. Manually re-check in a browser that all 4 pillars (queue, pipeline,"
          echo "system health, incidents) render real numbers, not just that the page loads --"
          echo "this step only proves the HTTP layer, not the data layer."

      - name: Summary
        if: always()
        run: |
          echo "FQ-59 gate applied to $DASHBOARD_UUID."
          echo "401 (unauthenticated): ${{ steps.verify401.outputs.code }}"
          echo "Notify Tech Lead + Production Manager -- T-59 is cleared to be considered live behind the gate."
