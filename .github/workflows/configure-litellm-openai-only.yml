name: Configure LiteLLM — OpenAI gpt-4o-mini as sole triage-model provider

# Registers model aliases on the target LiteLLM instance (staging or prod):
#   triage-model   → gpt-4o-mini      (primary triage path)
#   fallback-model → anthropic/claude-haiku-4-5-20251001 (fallback, via ANTHROPIC_API_KEY)
#   meta/llama-3.3-70b-instruct → gpt-4o-mini (legacy alias, kept for backwards compat)
#
# Run order:
#   1. Verify litellm health
#   2. Purge all existing model registrations
#   3. Register triage-model   → gpt-4o-mini
#   4. Register fallback-model → anthropic/claude-haiku-4-5-20251001
#   5. Register legacy alias   → gpt-4o-mini
#   6. Verify /model/info shows 3 entries
#   7. Smoke test triage-model (assert HTTP 200)
#   8. Summary
#
# Prerequisites:
#   LITELLM_MASTER_KEY (GitHub secret) — staging LiteLLM admin key.
#   Prod's admin key is fetched fresh from litellm-prod's own Coolify env vars
#   each run (masked, never stored as a secret) -- LITELLM_MASTER_KEY_PROD was
#   never actually created as a GitHub secret despite this file previously
#   claiming otherwise (confirmed via `gh secret list`, 2026-07-08).
#
# OPENAI_API_KEY and ANTHROPIC_API_KEY must be set in the target Coolify env vars
# and the container must have been redeployed (vars injected on redeploy, not restart).
# This workflow never receives or logs raw API key values.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target LiteLLM instance"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

permissions:
  contents: read

env:
  TRIAGE_ALIAS: "triage-model"
  FALLBACK_ALIAS: "fallback-model"
  LEGACY_ALIAS: "meta/llama-3.3-70b-instruct"
  COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"
  LITELLM_STAGING_UUID: "h12xz8887fxvbvjts2hac8if"
  LITELLM_PROD_UUID: "hlik1d96uvkkjzpbxa3azhcv"

jobs:
  configure-openai-only:
    name: Register OpenAI gpt-4o-mini as sole triage-model provider
    runs-on: ubuntu-latest
    env:
      LITELLM_EXTERNAL_URL: ${{ inputs.environment == 'prod' && 'https://litellm-prod.inatechshell.ca' || 'https://litellm-staging.inatechshell.ca' }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}

    steps:
      # LITELLM_MASTER_KEY_PROD does not exist as a GitHub secret (confirmed
      # via `gh secret list`, 2026-07-08, despite this file's own header
      # comment and WORK.md's T-48 entry both claiming it was created).
      # Fetch each environment's master key fresh from that instance's own
      # Coolify env vars instead -- masked immediately, never stored as a
      # new secret, never printed. Staging's LITELLM_MASTER_KEY secret does
      # exist and still works, so only prod needs the Coolify fetch, but
      # both paths are handled uniformly here for consistency.
      - name: Resolve LiteLLM master key (masked)
        id: key
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            HTTP=$(curl -s --max-time 30 -o /tmp/envs.json -w "%{http_code}" \
              -H "Authorization: Bearer $COOLIFY_TOKEN" -H "Accept: application/json" \
              "$COOLIFY_BASE/applications/$LITELLM_PROD_UUID/envs")
            [ "$HTTP" = "200" ] || { echo "::error::cannot read litellm-prod envs (HTTP $HTTP)"; exit 1; }
            KEY=$(jq -r '.[] | select(.key=="LITELLM_MASTER_KEY") | .value' /tmp/envs.json | head -1)
          else
            KEY="${{ secrets.LITELLM_MASTER_KEY }}"
          fi
          [ -n "$KEY" ] && [ "$KEY" != "null" ] || { echo "::error::LiteLLM master key not found for ${{ inputs.environment }}"; exit 1; }
          echo "::add-mask::$KEY"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      # ── 1. Health check ───────────────────────────────────────────────────────
      - name: Verify litellm health
        id: health
        env:
          LITELLM_KEY: ${{ steps.key.outputs.key }}
        run: |
          echo "::add-mask::$LITELLM_KEY"
          echo "target: ${{ inputs.environment }} — $LITELLM_EXTERNAL_URL"

          HEALTH=$(curl -s --max-time 20 -o /dev/null -w "%{http_code}" \
            "$LITELLM_EXTERNAL_URL/health/readiness" || echo "000")
          echo "Health check: HTTP $HEALTH"

          # LiteLLM returns 200 (healthy) or 401 (auth required — also means it's up)
          if [ "$HEALTH" = "200" ] || [ "$HEALTH" = "401" ]; then
            echo "litellm-staging is healthy (HTTP $HEALTH)"
          else
            echo "ERROR: litellm-staging not healthy (HTTP $HEALTH). Check Coolify."
            exit 1
          fi

      # ── 2. Purge all existing model registrations ─────────────────────────────
      - name: Purge all existing model registrations
        env:
          LITELLM_KEY: ${{ steps.key.outputs.key }}
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/model_info_pre.json -w "%{http_code}" \
            -H "Authorization: Bearer $LITELLM_KEY" \
            -H "Accept: application/json" \
            "$LITELLM_EXTERNAL_URL/model/info")
          echo "GET /model/info -> HTTP $HTTP"

          if [ "$HTTP" != "200" ]; then
            echo "WARNING: /model/info returned HTTP $HTTP — treating as empty, proceeding"
          else
            IDS=$(jq -r '.data[].model_info.id // empty' /tmp/model_info_pre.json 2>/dev/null || true)
            if [ -z "$IDS" ]; then
              echo "No existing model registrations to purge"
            else
              echo "Models to purge: $IDS"
              while IFS= read -r id; do
                [ -z "$id" ] && continue
                PDEL=$(curl -s --max-time 20 -o /tmp/del_${id}.json -w "%{http_code}" -X POST \
                  -H "Authorization: Bearer $LITELLM_KEY" \
                  -H "Content-Type: application/json" \
                  "$LITELLM_EXTERNAL_URL/model/delete" \
                  -d "{\"id\": \"$id\"}")
                echo "DELETE id=$id -> HTTP $PDEL"
              done <<< "$IDS"
              echo "Purge complete"
            fi
          fi

      # ── 3. Register triage-model → gpt-4o-mini ───────────────────────────────
      - name: Register triage-model → gpt-4o-mini
        id: reg-triage
        env:
          LITELLM_KEY: ${{ steps.key.outputs.key }}
        run: |
          PAYLOAD=$(jq -n --arg alias "$TRIAGE_ALIAS" '{
            model_name: $alias,
            litellm_params: { model: "gpt-4o-mini" },
            model_info: { id: "openai-primary" }
          }')
          HTTP=$(curl -s --max-time 30 -o /tmp/reg_triage.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $LITELLM_KEY" \
            -H "Content-Type: application/json" \
            "$LITELLM_EXTERNAL_URL/model/new" -d "$PAYLOAD")
          echo "POST /model/new ($TRIAGE_ALIAS) -> HTTP $HTTP"
          jq . /tmp/reg_triage.json 2>/dev/null || cat /tmp/reg_triage.json | head -5 || true
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
            echo "ERROR: registration failed (HTTP $HTTP)"
            exit 1
          fi
          echo "Registered: $TRIAGE_ALIAS -> gpt-4o-mini"

      # ── 4. Register fallback-model → anthropic/claude-haiku-4-5-20251001 ─────
      - name: Register fallback-model → anthropic/claude-haiku-4-5-20251001
        id: reg-fallback
        env:
          LITELLM_KEY: ${{ steps.key.outputs.key }}
        run: |
          PAYLOAD=$(jq -n --arg alias "$FALLBACK_ALIAS" '{
            model_name: $alias,
            litellm_params: { model: "anthropic/claude-haiku-4-5-20251001" },
            model_info: { id: "anthropic-fallback" }
          }')
          HTTP=$(curl -s --max-time 30 -o /tmp/reg_fallback.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $LITELLM_KEY" \
            -H "Content-Type: application/json" \
            "$LITELLM_EXTERNAL_URL/model/new" -d "$PAYLOAD")
          echo "POST /model/new ($FALLBACK_ALIAS) -> HTTP $HTTP"
          jq . /tmp/reg_fallback.json 2>/dev/null || cat /tmp/reg_fallback.json | head -5 || true
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
            echo "ERROR: registration failed (HTTP $HTTP)"
            exit 1
          fi
          echo "Registered: $FALLBACK_ALIAS -> anthropic/claude-haiku-4-5-20251001"

      # ── 5. Register legacy alias → gpt-4o-mini ───────────────────────────────
      - name: Register legacy alias → gpt-4o-mini
        id: reg-legacy
        env:
          LITELLM_KEY: ${{ steps.key.outputs.key }}
        run: |
          PAYLOAD=$(jq -n --arg alias "$LEGACY_ALIAS" '{
            model_name: $alias,
            litellm_params: { model: "gpt-4o-mini" },
            model_info: { id: "openai-legacy-primary" }
          }')
          HTTP=$(curl -s --max-time 30 -o /tmp/reg_legacy.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $LITELLM_KEY" \
            -H "Content-Type: application/json" \
            "$LITELLM_EXTERNAL_URL/model/new" -d "$PAYLOAD")
          echo "POST /model/new ($LEGACY_ALIAS) -> HTTP $HTTP"
          jq . /tmp/reg_legacy.json 2>/dev/null || cat /tmp/reg_legacy.json | head -5 || true
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
            echo "ERROR: registration failed (HTTP $HTTP)"
            exit 1
          fi
          echo "Registered: $LEGACY_ALIAS -> gpt-4o-mini"

      # ── 6. Verify /model/info shows 3 entries ────────────────────────────────
      - name: Verify model registrations (expect 3 aliases)
        env:
          LITELLM_KEY: ${{ steps.key.outputs.key }}
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/model_info_post.json -w "%{http_code}" \
            -H "Authorization: Bearer $LITELLM_KEY" \
            "$LITELLM_EXTERNAL_URL/model/info")
          echo "GET /model/info -> HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "ERROR: /model/info HTTP $HTTP"
            exit 1
          fi

          TOTAL=$(jq '.data | length' /tmp/model_info_post.json 2>/dev/null || echo 0)
          echo "Total model entries: $TOTAL (expected 3)"
          jq -r '.data[] | "  alias=\(.model_name)  id=\(.model_info.id // "none")  model=\(.litellm_params.model // "?")"' \
            /tmp/model_info_post.json 2>/dev/null || true

          TRIAGE_COUNT=$(jq '[.data[] | select(.model_name == "'"$TRIAGE_ALIAS"'")] | length' /tmp/model_info_post.json 2>/dev/null || echo 0)
          FALLBACK_COUNT=$(jq '[.data[] | select(.model_name == "'"$FALLBACK_ALIAS"'")] | length' /tmp/model_info_post.json 2>/dev/null || echo 0)

          PASS=true
          [ "$TRIAGE_COUNT" -eq 1 ] && echo "triage-model: OK" || { echo "ERROR: triage-model has $TRIAGE_COUNT entries"; PASS=false; }
          [ "$FALLBACK_COUNT" -eq 1 ] && echo "fallback-model: OK" || { echo "ERROR: fallback-model has $FALLBACK_COUNT entries"; PASS=false; }
          [ "$PASS" = "false" ] && exit 1 || true

      # ── 7. Smoke test — triage-model ─────────────────────────────────────────
      - name: Smoke test — triage-model (assert HTTP 200)
        env:
          LITELLM_KEY: ${{ steps.key.outputs.key }}
        run: |
          TEST_PAYLOAD=$(jq -n --arg alias "$TRIAGE_ALIAS" '{
            model: $alias, max_tokens: 20, temperature: 0,
            messages: [{role: "user", content: "Reply with the single word: ok"}]
          }')
          HTTP=$(curl -s --max-time 60 -o /tmp/smoke_triage.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $LITELLM_KEY" \
            -H "Content-Type: application/json" \
            "$LITELLM_EXTERNAL_URL/chat/completions" -d "$TEST_PAYLOAD")
          echo "POST /chat/completions (model=$TRIAGE_ALIAS) -> HTTP $HTTP"
          if [ "$HTTP" = "200" ]; then
            CONTENT=$(jq -r '.choices[0].message.content // empty' /tmp/smoke_triage.json 2>/dev/null || true)
            MODEL=$(jq -r '.model // empty' /tmp/smoke_triage.json 2>/dev/null || true)
            echo "SMOKE TEST: PASS — content=$CONTENT model=$MODEL"
          else
            jq . /tmp/smoke_triage.json 2>/dev/null || cat /tmp/smoke_triage.json | head -5 || true
            echo "ERROR: smoke test failed (HTTP $HTTP)"
            exit 1
          fi

      # ── 8. Summary ────────────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "============================================================"
          echo " LITELLM — model alias configuration (${{ inputs.environment }})"
          echo "============================================================"
          echo "  target: $LITELLM_EXTERNAL_URL"
          echo "  triage-model   → gpt-4o-mini"
          echo "  fallback-model → anthropic/claude-haiku-4-5-20251001"
          echo "  meta/llama-3.3-70b-instruct → gpt-4o-mini (legacy)"
          echo ""
          echo "  ops-hub LITELLM_FALLBACK_MODEL must be set to: fallback-model"
          echo "============================================================"
