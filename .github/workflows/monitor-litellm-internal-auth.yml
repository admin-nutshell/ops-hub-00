name: Monitor — LiteLLM internal-auth path (T-97 / FQ-69 follow-up)

# Closes the monitoring blind spot FQ-69's 3.6-day incident exposed:
# `/health/litellm` probes LITELLM_EXTERNAL_URL without ever sending the app's
# own key, so it stays green even when ops-hub-prod's real LITELLM_MASTER_KEY
# is rejected by LiteLLM (exactly what happened — 70% of prod tickets stuck in
# state='new' for 3.6 days while /health/litellm reported "ok"). This is the
# SECOND incident from this same blind spot class (T-71 was the URL-layer
# version), which is why T-97 is committed, not flagged.
#
# The real check lives IN the app: src/healthLitellmInternal.ts
# (GET /health/litellm-internal) runs inside the ops-hub-prod process, reads
# LITELLM_URL / LITELLM_MASTER_KEY / LITELLM_TRIAGE_MODEL via the SAME
# resolveLitellmTarget() helper classifyTicket() calls, and makes a real,
# minimal completion call over the INTERNAL LITELLM_URL — the exact hop
# ticket-triage.ts/ticket-respond.ts use. This workflow's only job is to curl
# that endpoint on a schedule and alert when it's not 200. It holds ZERO
# copy of LITELLM_MASTER_KEY — the credential never leaves the app process.
#
# ALERTING: UptimeRobot's webhook alert contact (the "designed for this"
# integration point in src/statusWebhook.ts + status-incident.yml's
# repository_dispatch listener) requires a paid UptimeRobot tier the founder
# declined for FQ-47 action 4b (free-tier-first). So this workflow uses the
# channel that's actually live and free: `status-incident.yml`'s own
# workflow_dispatch open/resolve actions (the same ones an agent or the
# founder already uses manually) plus GitHub's built-in failed-run
# notification email to repo watchers (the same backstop
# backup-verification.yml already relies on). No new paid service.
#
# mode=live (default, used by the schedule): curls the real endpoint on
#   ops-hub-prod.
# mode=simulate-failure (manual verification only — never on the schedule):
#   curls a path guaranteed to 404, to prove the open/resolve dispatch logic
#   itself fires correctly WITHOUT touching prod's real credential or state.
#   See DECISIONS.md T-97 entry for the run that used this to verify.
#
# T-102 (Sprint 11, FQ-76 follow-up #2 — docs/retros/sprint-10.md §4.2/§7):
# this workflow used to page on a SINGLE failed poll. The 07-10/07-11
# self-healing hiccups churned open/resolve noise on every transient blip,
# which is exactly what made FQ-76's real 3-day sustained break harder to
# read at a glance against the noise. Fix: a consecutive-fail threshold
# (FAIL_THRESHOLD below) — the first (FAIL_THRESHOLD - 1) consecutive fails
# self-clear silently (no incident opened, no page); only the Nth CONSECUTIVE
# fail opens a real incident; a subsequent 200 still auto-resolves
# immediately (that half was never the problem). Chose N=3 over N=2: at this
# workflow's 15-minute cron cadence, 3 consecutive fails (T+0, T+15, T+30)
# opens the incident at T+30 — inside the ~30-45 minute SLA this task set,
# whereas N=2 (pages at T+15) undershoots that range.
#
# MECHANISM — deliberately no new secret/var/state file (this change touches
# neither credentials nor secrets, so the Sprint 9 §5.1 Security Lead gate
# does not apply): a read-only GitHub Actions run-history lookback via
# `gh run list` (the "Determine consecutive-fail streak" step below), reusing
# the SAME `actions: write` permission + GH_TOKEN this job already holds for
# its status-incident.yml dispatches. Scoped two ways so it can't misfire or
# cross-contaminate real prod paging with manual verification runs:
#   - same `github.event_name` as the current run (schedule vs
#     workflow_dispatch) — a manual mode=simulate-failure verification
#     dispatch can never count towards, or be counted by, the real
#     prod schedule-driven streak, and vice versa.
#   - createdAt within the last 2 hours — old/unrelated dispatch runs (e.g.
#     T-97's original verification runs from 07-10) never bleed into
#     "consecutive" math that is only meaningful over a short recent window.
# The job's own exit code still reflects the true probe result on every run —
# sub-threshold fails still show as a failed Action run, preserving the
# existing GitHub failed-run-notification-email backstop this design already
# relied on. Only the INCIDENT-OPEN call is gated on the threshold.
#
# KNOWN LIMITATION (noted, not fixed — over-engineering for this task): the
# streak-counting signal is "did this run's conclusion come back failure",
# which conflates "the probe itself failed" with "the probe succeeded but the
# open/resolve dispatch step failed for an unrelated infra reason". A flaky
# `gh workflow run status-incident.yml` call could in theory nudge the streak
# count. Considered rare and not worth a dedicated fix here; flagging so it
# isn't a silent trap for a future reader.
#
# T-98's monitor-e2e-pipeline.yml runs 6-hourly, not every 15 minutes —
# mechanically copying this same threshold there would push detection to
# 12-18+ hours, working against the entire reason T-98 exists (catch a broken
# pipeline fast). Deliberately NOT touched by this change; see WORK.md's
# T-102 row / this change's PR description for the explicit carry-not-decided
# note — that is a separate decision for a future task, not a silent scope
# expansion.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        options: [live, simulate-failure]
        description: "live = real prod probe; simulate-failure = verification-only, forces a non-200 without touching prod"
        default: live

permissions:
  contents: read
  actions: write

concurrency:
  group: monitor-litellm-internal-auth
  cancel-in-progress: false

env:
  PROD_URL: "https://ops-hub-prod.inatechshell.ca"
  INCIDENT_TITLE: "LiteLLM internal-auth probe failing on ops-hub-prod"
  # T-102: consecutive-fail threshold before this monitor pages. See the
  # header comment block above for the full rationale and mechanism.
  FAIL_THRESHOLD: "3"

jobs:
  probe:
    name: Probe /health/litellm-internal
    runs-on: ubuntu-latest
    steps:
      - name: Determine probe URL for this mode
        id: target
        env:
          MODE: ${{ inputs.mode || 'live' }}
        run: |
          if [ "$MODE" = "simulate-failure" ]; then
            echo "This is a VERIFICATION-ONLY run — it deliberately probes a path"
            echo "guaranteed to fail so we can prove the open/resolve dispatch logic"
            echo "works, without ever touching ops-hub-prod's real credential or state."
            echo "url=$PROD_URL/health/litellm-internal-DOES-NOT-EXIST" >> "$GITHUB_OUTPUT"
          else
            echo "url=$PROD_URL/health/litellm-internal" >> "$GITHUB_OUTPUT"
          fi

      - name: Curl the probe endpoint (no secrets — the app holds the real key, not this job)
        id: probe
        run: |
          # 25s here vs. the handler's own internal 10s fetch budget
          # (AbortSignal.timeout(10_000) in healthLitellmInternal.ts) -- a real
          # completion call can occasionally run close to that internal budget
          # before it aborts; 25s leaves headroom for TLS/queueing overhead on
          # top so a slow-but-still-healthy response isn't mistaken for a
          # monitor failure. (Observed once during verification: a 15s
          # --max-time genuinely timed out against a real, otherwise-healthy
          # prod response -- see DECISIONS.md T-97 entry.)
          set +e
          HTTP=$(curl -s --max-time 25 -o /tmp/probe_body.json -w "%{http_code}" \
            "${{ steps.target.outputs.url }}")
          CURL_EXIT=$?
          set -e
          # Never string-concat a fallback onto curl's own -w output (curl can
          # print a partial/garbage code on timeout while still exiting
          # non-zero) -- only trust $HTTP when curl itself exited 0.
          if [ "$CURL_EXIT" -ne 0 ] || [ -z "$HTTP" ]; then
            HTTP="000"
          fi
          echo "http_status=$HTTP" >> "$GITHUB_OUTPUT"
          echo "Probed ${{ steps.target.outputs.url }} -> HTTP $HTTP (curl exit $CURL_EXIT)"
          cat /tmp/probe_body.json 2>/dev/null || true
          echo ""

      - name: Determine consecutive-fail streak (read-only run-history lookback)
        id: streak
        if: steps.probe.outputs.http_status != '200'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEED=$((FAIL_THRESHOLD - 1))
          EVENT="${{ github.event_name }}"
          RUN_ID="${{ github.run_id }}"
          CUTOFF=$(date -u -d '-2 hours' +%Y-%m-%dT%H:%M:%SZ)
          echo "This run's probe failed. A real incident only pages once this is the ${FAIL_THRESHOLD}th CONSECUTIVE failure. Checking whether the previous $NEED completed run(s) of this workflow (same trigger event=$EVENT, created since $CUTOFF, excluding this in-progress run $RUN_ID) were ALSO failures."
          echo "Scoping to the same event type keeps mode=simulate-failure verification dispatches (event=workflow_dispatch) from ever mixing with the real schedule-driven prod streak, and vice versa. Scoping to the last 2 hours keeps old/unrelated dispatch runs out of the 'consecutive' math."

          RUNS_JSON=$(gh run list --repo "${{ github.repository }}" --workflow monitor-litellm-internal-auth.yml \
            --json databaseId,conclusion,status,createdAt,event --limit 30)

          PREV=$(echo "$RUNS_JSON" | jq --arg cur "$RUN_ID" --arg ev "$EVENT" --arg cutoff "$CUTOFF" \
            '[.[] | select((.databaseId|tostring) != $cur and .status == "completed" and .event == $ev and .createdAt >= $cutoff)] | sort_by(.createdAt) | reverse | .[0:'"$NEED"']')
          PREV_COUNT=$(echo "$PREV" | jq 'length')
          FAIL_COUNT=$(echo "$PREV" | jq '[.[] | select(.conclusion == "failure")] | length')

          echo "Previous completed same-event runs considered (need $NEED): $PREV_COUNT. Of those, $FAIL_COUNT were failures."
          echo "$PREV" | jq -r '.[] | "  run \(.databaseId): conclusion=\(.conclusion) createdAt=\(.createdAt)"'

          if [ "$PREV_COUNT" -ge "$NEED" ] && [ "$FAIL_COUNT" -eq "$NEED" ]; then
            echo "threshold_met=true" >> "$GITHUB_OUTPUT"
            echo "Streak confirmed: this is consecutive failure #$FAIL_THRESHOLD — opening a real incident."
          else
            echo "threshold_met=false" >> "$GITHUB_OUTPUT"
            echo "Sub-threshold: only $((FAIL_COUNT + 1))/$FAIL_THRESHOLD consecutive failures so far (or insufficient recent same-event run history) — self-clearing silently. No incident opened, no page."
          fi

      - name: On failure (threshold met) — open a status-page incident + fail the run
        if: steps.probe.outputs.http_status != '200' && steps.streak.outputs.threshold_met == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::error::LiteLLM internal-auth probe returned HTTP ${{ steps.probe.outputs.http_status }} for the ${FAIL_THRESHOLD}th consecutive check — the app's real LITELLM_MASTER_KEY path may be failing (FQ-69 failure mode) or the endpoint is unreachable."
          # --repo is required: this job has no actions/checkout step (deliberately —
          # the probe itself needs no repo contents), so `gh` has no local git remote
          # to infer the target repo from and would otherwise fail with
          # "fatal: not a git repository".
          gh workflow run status-incident.yml --repo "${{ github.repository }}" --ref main \
            -f action=open \
            -f title="$INCIDENT_TITLE" \
            -f affected="Ops Hub Production,LiteLLM Production" \
            -f severity=down
          exit 1

      - name: On failure (sub-threshold) — self-clear silently, no page
        if: steps.probe.outputs.http_status != '200' && steps.streak.outputs.threshold_met != 'true'
        run: |
          echo "::warning::LiteLLM internal-auth probe returned HTTP ${{ steps.probe.outputs.http_status }} but the T-102 consecutive-fail threshold (FAIL_THRESHOLD=$FAIL_THRESHOLD) has not been met yet — self-clearing silently, no status-page incident opened, no page sent. If this repeats until $FAIL_THRESHOLD consecutive failures, the next run's run-history lookback will open a real incident."
          exit 1

      - name: On success — resolve any open incident from this monitor
        if: steps.probe.outputs.http_status == '200'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Probe healthy (HTTP 200) — resolving any open incident opened by this monitor."
          gh workflow run status-incident.yml --repo "${{ github.repository }}" --ref main \
            -f action=resolve \
            -f title="$INCIDENT_TITLE"
