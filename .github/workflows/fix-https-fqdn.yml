name: Fix ops-hub-app HTTPS FQDN

# Post-fix verifier: confirms ops-hub-app is live on HTTPS and /api/inngest
# is reachable. Run AFTER the founder sets https:// in Coolify dashboard (FQ-18).
#
# Root cause: Coolify FQDN was http:// → no HTTPS Traefik router → HTTPS:443
# routed to TTS catch-all → Inngest sync failed. Coolify PATCH API rejects fqdn
# for docker image apps (422). Fix requires Coolify UI change by founder (FQ-18).
# See DECISIONS.md 2026-06-22.
on:
  workflow_dispatch:
    inputs:
      restart_first:
        description: 'Restart app before polling (set true after saving new FQDN in Coolify)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: read

jobs:
  verify-https:
    name: Verify ops-hub-app HTTPS after founder domain change
    runs-on: ubuntu-latest
    env:
      COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"
      HTTPS_FQDN: "https://ajqplom2mghf5a8h6vf1q6xg.187.124.76.235.sslip.io"

    steps:
      - name: Get current FQDN from Coolify
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -euo pipefail
          echo "=== Checking current ops-hub-app FQDN ==="
          HTTP=$(curl -s --max-time 60 -o /tmp/apps.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications")
          echo "GET HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "ERROR: GET /applications failed (HTTP $HTTP)"; cat /tmp/apps.json; exit 1
          fi
          APP_DATA=$(jq -r '.[] | select(.name == "ops-hub-app")' /tmp/apps.json 2>/dev/null || true)
          UUID=$(echo "$APP_DATA" | jq -r '.uuid')
          CURRENT_FQDN=$(echo "$APP_DATA" | jq -r '.fqdn // "null"')
          STATUS=$(echo "$APP_DATA" | jq -r '.status // "unknown"')
          echo "UUID:         $UUID"
          echo "Current FQDN: $CURRENT_FQDN"
          echo "Status:       $STATUS"
          echo "$UUID" > /tmp/app_uuid.txt
          if echo "$CURRENT_FQDN" | grep -q "^http://"; then
            echo "WARNING: FQDN still uses http:// — founder must change it in Coolify UI first (FQ-18)."
            echo "Expected: https://ajqplom2mghf5a8h6vf1q6xg.187.124.76.235.sslip.io"
          fi

      - name: Restart app (triggers Traefik to reload routing rules)
        if: ${{ inputs.restart_first == 'true' }}
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -euo pipefail
          UUID=$(cat /tmp/app_uuid.txt)
          echo "=== Restarting ops-hub-app (UUID: $UUID) ==="
          RESTART_HTTP=$(curl -s --max-time 60 -o /tmp/restart.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "$COOLIFY_BASE/applications/$UUID/restart")
          echo "Restart HTTP $RESTART_HTTP"
          jq . /tmp/restart.json 2>/dev/null || cat /tmp/restart.json
          if [ "$RESTART_HTTP" != "200" ] && [ "$RESTART_HTTP" != "201" ]; then
            echo "WARNING: restart returned HTTP $RESTART_HTTP — proceeding to health poll anyway."
          else
            echo "Restart queued. Waiting 30s for container to come up..."
          fi
          sleep 30

      - name: Poll HTTPS health check (max 3 min)
        run: |
          set -euo pipefail
          echo "=== Polling $HTTPS_FQDN/health ==="
          echo "NOTE: Early attempts may fail while Traefik issues the Let's Encrypt cert (~30s)."
          for i in $(seq 1 18); do
            HTTP=$(curl -s --max-time 15 -o /tmp/health.json -w "%{http_code}" \
              "$HTTPS_FQDN/health" 2>/dev/null || echo "000")
            BODY=$(cat /tmp/health.json 2>/dev/null || echo "")
            echo "Attempt $i: HTTP $HTTP  body=$BODY"
            if [ "$HTTP" = "200" ]; then
              echo "HTTPS health check passed. ops-hub-app is live on HTTPS."
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: HTTPS health check timed out after 3 minutes."
          echo "Check: (a) founder changed FQDN to https:// in Coolify, (b) app restarted, (c) cert issued."
          exit 1

      - name: Verify /api/inngest reachable via HTTPS
        run: |
          set -euo pipefail
          echo "=== Verifying $HTTPS_FQDN/api/inngest ==="
          HTTP=$(curl -s --max-time 15 -o /tmp/inngest.json -w "%{http_code}" \
            "$HTTPS_FQDN/api/inngest" 2>/dev/null || echo "000")
          BODY=$(cat /tmp/inngest.json 2>/dev/null || echo "")
          echo "HTTP $HTTP  body=$BODY"
          # 401 = signing key active, endpoint reachable — correct expected response
          # 200 = introspection (no signing key — shouldn't happen but acceptable)
          if [ "$HTTP" = "401" ] || [ "$HTTP" = "200" ]; then
            echo "SUCCESS: /api/inngest reachable via HTTPS (HTTP $HTTP)."
            echo "Inngest Cloud can now sync. Founder: sync the app from Inngest dashboard."
          else
            echo "WARN: /api/inngest returned HTTP $HTTP — verify manually."
            echo "If HTTP is 302/301, FQDN in Coolify may still be http:// (not yet changed)."
          fi
