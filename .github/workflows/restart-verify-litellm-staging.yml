name: Restart + verify litellm-staging model persistence (FQ-53)

# Safe, narrow check for FQ-53: restarts litellm-staging (NOT a full redeploy --
# no DATABASE_URL change, no schema-update trigger; DISABLE_SCHEMA_UPDATE=true
# means no Prisma DDL runs regardless) and re-checks GET /model/info to prove
# the currently-registered model aliases survive a restart, not just a live
# in-memory state. Makes no other changes.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"
  LITELLM_UUID: "h12xz8887fxvbvjts2hac8if"
  LITELLM_EXTERNAL_URL: "https://litellm-staging.inatechshell.ca"

jobs:
  restart-verify:
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}

    steps:
      - name: Model registry BEFORE restart
        run: |
          HTTP=$(curl -s --max-time 20 -o /tmp/before.json -w "%{http_code}" \
            -H "Authorization: Bearer $MASTER_KEY" "$LITELLM_EXTERNAL_URL/model/info")
          echo "GET /model/info (before) -> HTTP $HTTP"
          jq -r '.data[] | "  " + .model_name' /tmp/before.json 2>/dev/null || cat /tmp/before.json | head -c 300

      - name: Restart litellm-staging
        id: restart
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/restart.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" "$COOLIFY_BASE/applications/$LITELLM_UUID/restart")
          echo "POST /restart -> HTTP $HTTP"
          DEP=$(jq -r '.deployment_uuid // empty' /tmp/restart.json 2>/dev/null || true)
          echo "dep_uuid=$DEP" >> "$GITHUB_OUTPUT"

      - name: Wait for restart + health
        run: |
          DEP="${{ steps.restart.outputs.dep_uuid }}"
          if [ -n "$DEP" ]; then
            for i in $(seq 1 30); do
              STATUS=$(curl -s --max-time 15 -H "Authorization: Bearer $TOKEN" \
                "$COOLIFY_BASE/deployments/$DEP" | jq -r '.status // empty' 2>/dev/null || true)
              echo "Attempt $i: status=$STATUS"
              case "$STATUS" in
                finished) break ;;
                failed|error) echo "ERROR: restart failed"; exit 1 ;;
              esac
              sleep 10
            done
          else
            sleep 45
          fi
          for i in $(seq 1 12); do
            HTTP=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" "$LITELLM_EXTERNAL_URL/health/readiness" || echo "000")
            echo "Attempt $i: /health/readiness -> HTTP $HTTP"
            [ "$HTTP" = "200" ] && break
            sleep 10
          done

      - name: Model registry AFTER restart
        run: |
          HTTP=$(curl -s --max-time 20 -o /tmp/after.json -w "%{http_code}" \
            -H "Authorization: Bearer $MASTER_KEY" "$LITELLM_EXTERNAL_URL/model/info")
          echo "GET /model/info (after) -> HTTP $HTTP"
          jq -r '.data[] | "  " + .model_name' /tmp/after.json 2>/dev/null || cat /tmp/after.json | head -c 300

      - name: Live triage-model completion smoke test
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/chat.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $MASTER_KEY" -H "Content-Type: application/json" \
            "$LITELLM_EXTERNAL_URL/chat/completions" \
            -d '{"model":"triage-model","messages":[{"role":"user","content":"reply with the single word OK"}],"max_tokens":5}')
          echo "POST /chat/completions (triage-model) -> HTTP $HTTP"
          jq -r '.choices[0].message.content // .error // .' /tmp/chat.json 2>/dev/null || cat /tmp/chat.json | head -c 300
