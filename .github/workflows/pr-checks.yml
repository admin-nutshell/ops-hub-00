name: PR Checks

on:
  pull_request:
    branches: [main]

# This workflow only reads the repo (checkout + scan); nothing is pushed back.
# Minimal least-privilege set per zizmor (chosen over `read-all`).
permissions:
  contents: read

# Cancel in-progress runs for the same PR when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # Setup is skipped until the app scaffold (package.json) lands in T-15
      - name: Set up pnpm
        if: hashFiles('package.json') != ''
        # Version is driven by the "packageManager" field in package.json (pnpm@10.28.2).
        # Do NOT also set `version:` here — pnpm/action-setup errors (ERR_PNPM_BAD_PM_VERSION)
        # when both the action `version` and package.json `packageManager` specify a version.
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js 20
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint + Prettier)
        run: |
          if [ ! -f package.json ]; then
            echo "No app code yet — lint placeholder pass (T-15 will wire pnpm lint)"
            exit 0
          fi
          pnpm lint

      - name: Type check (tsc --noEmit)
        run: |
          if [ ! -f package.json ]; then
            echo "No app code yet — typecheck placeholder pass (T-15 will wire pnpm typecheck)"
            exit 0
          fi
          pnpm typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up pnpm
        if: hashFiles('package.json') != ''
        # Version is driven by the "packageManager" field in package.json (pnpm@10.28.2).
        # Do NOT also set `version:` here — pnpm/action-setup errors (ERR_PNPM_BAD_PM_VERSION)
        # when both the action `version` and package.json `packageManager` specify a version.
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js 20
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: pnpm install --frozen-lockfile

      - name: Unit tests (Vitest)
        run: |
          if [ ! -f package.json ]; then
            echo "No app code yet — test placeholder pass (T-15 will wire pnpm test)"
            exit 0
          fi
          pnpm test

      # CI/CD spec §3 mandates both unit (pnpm test) and integration (pnpm test:integration).
      # Integration tests live under src/integration/ (T-19). The suite self-skips
      # when SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY are absent, so this step stays
      # green on PRs without staging secrets (Vitest exits 0 on a skipped suite).
      - name: Integration tests (Vitest)
        run: |
          if [ ! -f package.json ] || [ ! -d src/integration ]; then
            echo "No integration tests yet — placeholder pass (T-19 populates src/integration/)"
            exit 0
          fi
          pnpm test:integration

  evals:
    name: Eval Gate
    runs-on: ubuntu-latest
    env:
      # No telemetry calls out of CI; keeps the gate hermetic.
      PROMPTFOO_DISABLE_TELEMETRY: 1
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js 20
        # promptfoo (run via npx below) requires Node >= 20.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      # Sprint 1 gate: STRUCTURE-ONLY validation, no live LLM calls.
      #
      # `promptfoo validate` checks each eval YAML against the promptfoo config
      # schema and exits non-zero on a malformed/invalid file, so a broken eval
      # blocks merge. It is INTENDED to be schema-only (no `anthropic:` provider or
      # `llm-rubric` grader invocation, hence no API key required). This has NOT yet
      # been confirmed against these specific configs — the first CI run on this PR
      # is the verifier: the job MUST stay green with no API key in the environment,
      # AND go red when an eval YAML is malformed. If `validate` turns out to need a
      # key, fall back to a YAML-schema lint (see WORK.md Evals Lead note).
      #
      # We run promptfoo via `npx` (not a project devDependency) on purpose: it keeps
      # the eval toolchain out of the app's dependency closure, so `pnpm install
      # --frozen-lockfile` in the other jobs is unaffected. Version pinned to the
      # 0.121 series for reproducibility.
      #
      # To upgrade this to a REAL LLM-backed gate later: add the provider API key as
      # a repo secret (e.g. ANTHROPIC_API_KEY), expose it to this job's `env`, and
      # swap the loop for `pnpm eval` (promptfoo eval --config 'evals/*.yaml').
      - name: Validate eval suite (schema-only — no live LLM calls)
        run: |
          if [ -z "$(ls evals/*.yaml 2>/dev/null)" ]; then
            echo "No eval files found under evals/ — nothing to validate."
            exit 0
          fi
          status=0
          for f in evals/*.yaml; do
            echo "::group::Validating $f"
            if ! npx -y promptfoo@0.121 validate -c "$f"; then
              echo "::error file=$f::Eval config failed schema validation"
              status=1
            fi
            echo "::endgroup::"
          done
          exit $status

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history required for gitleaks to scan all commits
          fetch-depth: 0
          persist-credentials: false

      - name: Secret detection (gitleaks)
        # Running the gitleaks CLI directly via Docker to avoid the paid licence
        # required by gitleaks/gitleaks-action for org-owned private repos.
        # Image pinned to an immutable digest (not a mutable tag) per supply-chain review.
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/path" \
            ghcr.io/gitleaks/gitleaks@sha256:b109bc5f8f76a38196a3e413704fc5b9e3c32360bce4e4b603bd6f45b3721dbb \
            git \
            --no-banner \
            --redact \
            --verbose \
            --exit-code=1 \
            /path
