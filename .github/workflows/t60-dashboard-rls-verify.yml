name: T-60 dashboard RLS verify (live — real staging DB)

# T-60 (QA Manager): the LIVE half of the dashboard RLS/tenant-scoping sign-off.
# Runs src/integration/t60-dashboard-rls.test.ts against the REAL shared Supabase
# database, proving all 5 Security-Lead checks (per-widget fail-closed, agent_cost
# invoker, audit_log platform-row CONCERN, eval_gate_runs scoping).
#
# ASSERTIONS run as ops_hub_app_login (fetched from the ops-hub-STAGING Coolify
# app, non-superuser, RLS engaged). SETUP/TEARDOWN run as the superuser
# SUPABASE_STAGING_DB_URL. Fixtures are synthetic + torn down in reverse-FK order;
# it never reads or mutates the tts-prod / DNC-prod rows.
#
# Run t60-rls-probe.yml FIRST to confirm both roles are the right privilege level.
# NEVER prints a DSN password (masked; passed to the test step via $GITHUB_ENV).

on:
  workflow_dispatch: {}
  # TEMPORARY (removed before merge): lets this run on the QA branch without
  # first landing on the default branch (workflow_dispatch requires that).
  push:
    branches: [qa/t60-rls-verification]

permissions:
  contents: read

env:
  COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"
  STAGING_UUID: "ajqplom2mghf5a8h6vf1q6xg"

jobs:
  verify:
    name: Live RLS verification of dashboard queries
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
      SUPABASE_SETUP_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
    steps:
      - name: Guard — required secrets present
        run: |
          [ -n "$TOKEN" ] || { echo "::error::COOLIFY_API_TOKEN not set"; exit 1; }
          [ -n "$SUPABASE_SETUP_DB_URL" ] || { echo "::error::SUPABASE_STAGING_DB_URL not set"; exit 1; }
          echo "::add-mask::$SUPABASE_SETUP_DB_URL"

      - name: Fetch ops_hub_app_login DSN from staging Coolify (masked → $GITHUB_ENV)
        run: |
          HTTP=$(curl -s --max-time 30 -o /tmp/envs.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$STAGING_UUID/envs")
          echo "GET staging($STAGING_UUID)/envs -> HTTP $HTTP"
          [ "$HTTP" = "200" ] || { echo "::error::cannot read staging envs (HTTP $HTTP)"; head -c 300 /tmp/envs.json; exit 1; }
          LOGIN=$(jq -r '.[] | select(.key=="OPS_HUB_APP_LOGIN_URL") | .value' /tmp/envs.json | head -1)
          if [ -z "$LOGIN" ] || [ "$LOGIN" = "null" ]; then
            echo "::error::OPS_HUB_APP_LOGIN_URL absent on staging app"; exit 1
          fi
          echo "::add-mask::$LOGIN"
          # Redacted structural view only (password stripped).
          echo "Fetched ops_hub_app_login DSN: $(printf '%s' "$LOGIN" | sed -E 's#(://[^:]+):[^@]*@#\1:***@#')"
          # Pass to the test step without echoing the value (append redirect, masked).
          echo "OPS_HUB_APP_LOGIN_URL=$LOGIN" >> "$GITHUB_ENV"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Diagnose DSN parsing (safe — no passwords printed)
        run: |
          node -e '
            const { parse } = require("pg-connection-string");
            for (const k of ["SUPABASE_SETUP_DB_URL", "OPS_HUB_APP_LOGIN_URL"]) {
              const raw = process.env[k] || "";
              const scheme = raw.slice(0, raw.indexOf("://") + 3) || "(no ://)";
              try {
                const p = parse(raw);
                console.log(k, "scheme=" + scheme, JSON.stringify({ host: p.host, port: p.port, user: p.user, database: p.database, ssl: p.ssl, hasPassword: !!p.password }));
              } catch (e) { console.log(k, "PARSE ERROR", e.message); }
            }
          '

      - name: Run T-60 live RLS verification
        run: pnpm vitest run src/integration/t60-dashboard-rls.test.ts --reporter=verbose

      - name: Note
        if: always()
        run: |
          echo "If green: every dashboard widget is confirmed fail-closed and tenant-scoped against the real DB."
          echo "Record the T-60 sign-off in WORK.md / DECISIONS.md."
