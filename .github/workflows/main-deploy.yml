name: Deploy to Staging

# Auto-deploys the ops-hub application to Coolify staging on every push to main
# that genuinely changes the built application image.
# Prod promotion is manual-only via prod-promotion.yml (workflow_dispatch).
# CI/CD spec: docs/engineering/ci-cd-pipeline.md §5
#
# T-108 (2026-07-13, DECISIONS.md): this trigger was a `paths-ignore` DENYLIST
# (status/**, docs/**, WORK.md, DECISIONS.md, FOUNDER_QUEUE.md, CLAUDE.md) that
# omitted `.github/workflows/**` and every other non-product path — so ANY
# non-doc merge (workflow-file edits included) silently built+deployed+started
# staging, colliding with T-98 SC7 ("ops-hub-staging stays stopped"). It fired
# for real during T-107 (a workflow-file-only PR #444 started staging).
# Converted to a `paths` ALLOWLIST: only these paths can change what
# `docker build .` actually produces (cross-checked against Dockerfile's own
# COPY list + package.json's build script), so only they should trigger a
# rebuild+redeploy. An allowlist fails toward UNDER-deploying (an unlisted
# product path would silently miss staging) rather than the denylist's
# OVER-deploying failure mode — the safer direction for a staging environment
# whose default state should be stopped, and the gap is self-healing (any
# genuinely-missed path shows up as a staging drift, not a silent violation of
# a documented safety invariant).
#
# Deliberately excluded (verified, not assumed):
#   - .github/workflows/** — the T-107 trigger case itself; a workflow-file
#     edit cannot change the app image.
#   - docs/**, *.md (WORK.md, DECISIONS.md, FOUNDER_QUEUE.md, CLAUDE.md,
#     the numbered 0X_*.md charter files, docs/adr/**, docs/deploys/**,
#     docs/retros/**), status/** — no code, GitHub Pages status site only.
#   - supabase/migrations/** — confirmed against how the app actually consumes
#     the DB before excluding: migrations are applied by hand via the Supabase
#     SQL Editor (CLAUDE.md: "not tracked by Supabase CLI"), and src/index.ts
#     contains no migration-runner — the app only opens a `pg`/
#     `@supabase/supabase-js` connection to whatever schema already exists.
#     A migration file changing does not change dist/ or the image; it needs
#     its own manual apply step, not an app redeploy.
#   - web/** — the ops dashboard is a separate Next.js app with its own
#     Dockerfile/provisioning workflows (provision-ops-dashboard-staging.yml
#     etc.); the root Dockerfile here never COPYs web/, so it cannot affect
#     this image.
#   - scripts/**, evals/** — CI/eval tooling, not COPY'd into the runtime image.
#   - pnpm-workspace.yaml — declares workspace members ("." and "web") but is
#     not read at Docker build time (root Dockerfile COPYs package.json +
#     pnpm-lock.yaml directly, not the workspace file); included anyway below,
#     belt-and-suspenders, since it is cheap to and does genuinely gate what
#     `pnpm install` resolves for the root package outside Docker.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "tsconfig.build.json"
  # T-123: manual re-run capability (matches prod-deploy.yml / deploy-staging-
  # services.yml, both already dispatchable) — no inputs, always deploys
  # HEAD of whatever ref it's run against. Does not change the push trigger
  # above or its path filter in any way.
  workflow_dispatch: {}

# Least-privilege: needs packages:write for GHCR image push.
permissions:
  contents: read
  packages: write

# Never cancel a deploy in progress — let it finish or fail cleanly.
concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Coolify Staging
    runs-on: ubuntu-latest

    env:
      COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"
      IMAGE: "ghcr.io/${{ github.repository }}"
      # Stable Coolify app UUID for ops-hub-staging — does not change on redeploy.
      # Pinned (rather than looked up by name) because ops-hub-prod's app also
      # happens to be named "ops-hub-app" in a different Coolify project; a
      # name-based /applications lookup matches both and produces an unusable
      # multi-UUID result. See T-54 in WORK.md.
      OPS_HUB_STAGING_UUID: "ajqplom2mghf5a8h6vf1q6xg"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # ── Pre-deploy checks (fast fail before building image) ──────────────────
      - name: Set up pnpm
        if: hashFiles('package.json') != ''
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js 20
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: pnpm install --frozen-lockfile

      - name: Lint & type check
        run: |
          if [ ! -f package.json ]; then exit 0; fi
          pnpm lint
          pnpm typecheck

      - name: Unit tests
        run: |
          if [ ! -f package.json ]; then exit 0; fi
          pnpm test

      # ── Build & push image to GHCR ───────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --tag "$IMAGE:latest" \
            --tag "$IMAGE:${{ github.sha }}" \
            .

      - name: Push image to GHCR
        run: |
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          echo "Pushed $IMAGE:latest (${{ github.sha }})"

      # ── Deploy to Coolify staging ─────────────────────────────────────────────
      # Patches the image tag on the pinned ops-hub-staging app, then starts it.
      # NOTE: Coolify does not support per-app registry credentials via API.
      # GHCR auth is handled at the server level via ~/.docker/config.json.
      # Prerequisite: `docker login ghcr.io` must be run on the Coolify VPS once
      # (or the GHCR package must be public). See FOUNDER_QUEUE.md for status.
      - name: Patch and deploy ops-hub on Coolify
        id: coolify
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -euo pipefail

          # Coolify only supports docker_registry_image_name and docker_registry_image_tag
          # via PATCH (no per-app credential fields exist in the Coolify API).
          # The image name must NOT include a tag — Coolify appends docker_registry_image_tag
          # separately. Passing "repo:sha" as the name produces "repo:sha:old-tag" (invalid).
          echo "Patching ops-hub-app ($OPS_HUB_STAGING_UUID) image tag to ${{ github.sha }}..."
          PATCH_BODY=$(jq -n \
            --arg img "$IMAGE" \
            --arg tag "${{ github.sha }}" \
            '{docker_registry_image_name:$img, docker_registry_image_tag:$tag}')
          PATCH_HTTP=$(curl -s --max-time 30 -o /tmp/patch.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            "$COOLIFY_BASE/applications/$OPS_HUB_STAGING_UUID" -d "$PATCH_BODY")
          echo "PATCH HTTP $PATCH_HTTP"
          jq . /tmp/patch.json 2>/dev/null || cat /tmp/patch.json
          if [ "$PATCH_HTTP" != "200" ] && [ "$PATCH_HTTP" != "201" ]; then
            echo "ERROR: PATCH failed (HTTP $PATCH_HTTP)"; exit 1
          fi

          echo "Starting $OPS_HUB_STAGING_UUID..."
          START_HTTP=$(curl -s --max-time 180 -o /tmp/start.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "$COOLIFY_BASE/applications/$OPS_HUB_STAGING_UUID/start")
          echo "Start HTTP $START_HTTP"
          jq . /tmp/start.json 2>/dev/null || cat /tmp/start.json

          DEPLOYMENT_UUID=$(jq -r '.deployment_uuid // empty' /tmp/start.json 2>/dev/null || true)
          echo "app_uuid=$OPS_HUB_STAGING_UUID" >> "$GITHUB_OUTPUT"
          echo "deployment_uuid=$DEPLOYMENT_UUID" >> "$GITHUB_OUTPUT"
          echo "Deploy queued: app=$OPS_HUB_STAGING_UUID deployment=$DEPLOYMENT_UUID"

      # ── Deployment status + container logs ────────────────────────────────────
      # Poll Coolify deployment status before attempting the HTTP health check.
      # This surfaces image-pull errors and other Coolify-side failures early.
      - name: Wait for Coolify deployment to complete
        id: deploy_status
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          DEPLOYMENT_UUID: ${{ steps.coolify.outputs.deployment_uuid }}
          APP_UUID: ${{ steps.coolify.outputs.app_uuid }}
        run: |
          if [ -z "$DEPLOYMENT_UUID" ]; then
            echo "No deployment UUID — skipping deployment poll."
            exit 0
          fi
          echo "Polling deployment $DEPLOYMENT_UUID ..."
          for i in $(seq 1 30); do
            STATUS_HTTP=$(curl -s --max-time 15 -o /tmp/dep.json -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              "$COOLIFY_BASE/deployments/$DEPLOYMENT_UUID" 2>/dev/null || true)
            if [ "$STATUS_HTTP" = "200" ]; then
              STATUS=$(jq -r '.status // empty' /tmp/dep.json 2>/dev/null || true)
              echo "Attempt $i: deployment status=$STATUS"
              case "$STATUS" in
                finished) echo "Deployment finished."; exit 0 ;;
                failed|error)
                  echo "=== Deployment FAILED ==="
                  jq . /tmp/dep.json 2>/dev/null || cat /tmp/dep.json
                  echo "=== Container logs ==="
                  curl -s --max-time 30 \
                    -H "Authorization: Bearer $TOKEN" \
                    "$COOLIFY_BASE/applications/$APP_UUID/logs" \
                    2>/dev/null | tail -c 4000 || true
                  exit 1
                  ;;
              esac
            else
              echo "Attempt $i: deployment API HTTP $STATUS_HTTP — waiting 10s"
            fi
            sleep 10
          done
          echo "WARNING: deployment status poll timed out — proceeding to health check"

      # ── Staging health check ──────────────────────────────────────────────────
      - name: Wait for staging health check
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          STAGING_URL: ${{ secrets.COOLIFY_STAGING_APP_URL }}
          APP_UUID: ${{ steps.coolify.outputs.app_uuid }}
        run: |
          # Resolve FQDN: prefer the secret if set, else fetch from Coolify API
          if [ -z "$STAGING_URL" ] && [ -n "$APP_UUID" ]; then
            echo "COOLIFY_STAGING_APP_URL not set — fetching FQDN from Coolify API..."
            FQDN=$(curl -s --max-time 30 \
              -H "Authorization: Bearer $TOKEN" \
              "$COOLIFY_BASE/applications/$APP_UUID" \
              | jq -r '.fqdn // empty' | sed 's|/$||')
            [ -n "$FQDN" ] && STAGING_URL="$FQDN" \
              || echo "No FQDN assigned yet — Coolify may still be routing."
          fi
          if [ -z "$STAGING_URL" ]; then
            echo "FQDN not available — skipping health poll."
            echo "Set COOLIFY_STAGING_APP_URL secret to the ops-hub staging FQDN."
            exit 0
          fi
          echo "Polling $STAGING_URL/health ..."
          for i in $(seq 1 18); do
            HTTP=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" \
              "$STAGING_URL/health" || true)
            if [ "$HTTP" = "200" ]; then
              echo "Health check passed (attempt $i) — staging is live."
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP — waiting 10s"
            sleep 10
          done
          echo "ERROR: health check timed out after 3 minutes"
          exit 1

      # ── T-123: real deploy-health gate (Sprint 22, Phase 2 Track B) ──────────
      # The step above only proves the container is UP (a shallow /health 200,
      # which the app returns unconditionally the moment the process boots — it
      # cannot detect a deploy that starts fine but is actually broken). This
      # step proves the deploy is actually GOOD, reusing two already-built,
      # already-proven deep health endpoints rather than inventing new checks:
      #   /health/env              (T-63) — every required env var is present
      #                             on THIS process. Catches the T-47 class of
      #                             incident (env vars silently vanished from
      #                             Coolify; nothing caught it for 2 days).
      #   /health/litellm-internal (T-97) — a REAL authenticated completion
      #                             call over the app's own internal LiteLLM
      #                             URL/key. Catches the FQ-69 class of
      #                             incident (LiteLLM master key silently
      #                             rejected; /health/litellm stayed green
      #                             throughout because it never sends an
      #                             Authorization header).
      # On failure this step fails the job LOUDLY (see scripts/deploy-health-
      # gate.sh for the v1 no-auto-rollback scope decision and why). Because
      # this step has no `if:`, a failure here skips the Inngest sync step
      # below (default GitHub Actions behavior) but the SC7 "stop staging"
      # step further down still runs — it is `if: always()`.
      - name: Post-deploy health gate — deep checks (T-123)
        env:
          STAGING_URL: ${{ secrets.COOLIFY_STAGING_APP_URL }}
        run: |
          BASE="${STAGING_URL:-https://ops-hub-staging.inatechshell.ca}"
          bash scripts/deploy-health-gate.sh "$BASE" /health/env /health/litellm-internal

      # ── Inngest function sync (T-65: re-enabled 2026-07-07) ───────────────────
      # Removed 2026-07-04 because ops-hub-staging and ops-hub-prod shared the
      # same Inngest app id ("ops-hub"), so this sync repointed Inngest's cron
      # dispatch to staging — confirmed to have silently stopped prod from
      # processing tickets for ~7 hours on 2026-07-03/04 (T-54(B)).
      # Permanent fix (PR #239) landed the same day: INNGEST_APP_ID is now set
      # to "ops-hub-staging" on ops-hub-staging only (src/inngest/client.ts),
      # while prod keeps the default "ops-hub" id — confirmed live as two
      # distinct apps in the Inngest dashboard. This PUT targets staging's own
      # URL/app-id, so it can no longer touch prod's registration. Re-added
      # here for staging-only immediacy; prod-deploy.yml's own sync step is
      # untouched.
      - name: Sync Inngest functions
        run: |
          STAGING_URL="https://ops-hub-staging.inatechshell.ca"
          echo "Syncing Inngest at $STAGING_URL/api/inngest ..."
          HTTP=$(curl -s --max-time 30 -o /tmp/sync.json -w "%{http_code}" -X PUT \
            -H "Content-Type: application/json" \
            "$STAGING_URL/api/inngest")
          echo "Sync HTTP $HTTP"
          cat /tmp/sync.json
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
            echo "WARNING: Inngest sync returned HTTP $HTTP — functions may not be updated"
          fi

      # ── Restore T-98 SC7 default state: staging ends every run STOPPED ───────
      # T-108 SC7 re-review (DECISIONS.md 2026-07-13): the paths allowlist above
      # only stops NON-product merges from starting staging; a genuine src/**
      # (etc.) change still legitimately needs to build+boot the app — the one
      # canary pr-checks.yml does NOT have (it lints/typechecks/unit-tests/
      # eval-validates but never runs `docker build`, so a broken multi-stage
      # build would otherwise go undetected until someone manually deploys).
      # Chosen reconciliation: START-THEN-STOP (option (i) of the re-review) —
      # keep building+booting+health-checking on every qualifying merge (the
      # canary), then explicitly stop staging again so the space BETWEEN
      # deploys — which is effectively all the time in a repo with more merges
      # than deploys-in-flight — matches SC7's "stays stopped" default.
      #
      # `if: always()`: MUST run even when an earlier step in this job failed
      # (bad build, failed health check, timed-out deployment poll) — a failed
      # deploy that leaves the container running is exactly the SC7 violation
      # this step exists to prevent, just self-inflicted by this pipeline
      # instead of by a manual restart. Keyed off the job-level constant
      # $OPS_HUB_STAGING_UUID (NOT steps.coolify.outputs.app_uuid) so it stops
      # staging on every run that reached this job, not only ones where the
      # "Patch and deploy" step got far enough to record its output — that
      # output is written AFTER the START curl, so a hard failure of that
      # curl itself (network blip, timeout) under `set -euo pipefail` would
      # kill the step before recording it, and an output-keyed stop would
      # then skip while staging was, in fact, started. Stopping an
      # already-not-started/already-stopped app is a harmless no-op, so
      # unconditional-stop-by-constant is strictly safer.
      #
      # RESIDUAL — NOT fully closed by this step alone, named honestly rather
      # than papered over: while staging is transiently running during this
      # job (build+push+patch+start+poll+health-check+inngest-sync), its own
      # Inngest cron sweeps (sweepNewTickets, sweepRespondedTickets,
      # sla-monitor) are live like any other time it's up, and could in
      # principle interact with a T-98 monitor synthetic ticket if a run
      # overlapped this window. This restores the STOPPED STEADY STATE, not a
      # structural guarantee against every timing window — that structural
      # close is a monitor-side fix (re-review option (ii): the monitor itself
      # asserts/tolerates staging's state). **CORRECTED, verified against
      # `gh secret list`/`gh variable list`/`gh run list` before this ADR was
      # finalized: the T-98 monitor is LIVE today (scheduled 6-hourly, real
      # sentinel ticket, live since Sprint 10) — NOT dormant as an earlier
      # draft of this comment (and the joint review it followed) assumed.**
      # So the residual race above is real and current, not hypothetical.
      # (ii) is filed as an OVERDUE, IMMEDIATE fast-follow (its own PR, proven
      # on its failure path per the Sprint 10 §5.1 norm) rather than folded in
      # here under time pressure — see DECISIONS.md / WORK.md carries /
      # docs/adr/0010-staging-deploy-trigger-sc7.md for the full corrected
      # reasoning and why this doesn't change the chosen option.
      - name: Stop ops-hub-staging (restore T-98 SC7 default state)
        if: always()
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          echo "Stopping $OPS_HUB_STAGING_UUID to restore the T-98 SC7 default (stopped) state..."
          STOP_HTTP=$(curl -s --max-time 60 -o /tmp/stop.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "$COOLIFY_BASE/applications/$OPS_HUB_STAGING_UUID/stop")
          echo "Stop HTTP $STOP_HTTP"
          jq . /tmp/stop.json 2>/dev/null || cat /tmp/stop.json
          if [ "$STOP_HTTP" != "200" ] && [ "$STOP_HTTP" != "201" ]; then
            echo "ERROR: STOP failed (HTTP $STOP_HTTP) — staging may still be running; SC7 is violated until this is stopped manually. Treat as an incident, not a shrug."
            exit 1
          fi
          echo "Stopped. SC7 default state restored."
