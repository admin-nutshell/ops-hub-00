name: Deploy to Staging

# Auto-deploys the ops-hub application to Coolify staging on every push to main.
# Prod promotion is manual-only via prod-promotion.yml (workflow_dispatch).
# CI/CD spec: docs/engineering/ci-cd-pipeline.md §5
on:
  push:
    branches: [main]
    paths-ignore:
      - "status/**"
      - "docs/**"
      - "WORK.md"
      - "DECISIONS.md"
      - "FOUNDER_QUEUE.md"
      - "CLAUDE.md"

# Least-privilege: needs packages:write for GHCR image push.
permissions:
  contents: read
  packages: write

# Never cancel a deploy in progress — let it finish or fail cleanly.
concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy to Coolify Staging
    runs-on: ubuntu-latest

    env:
      COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"
      IMAGE: "ghcr.io/${{ github.repository }}"
      # Stable Coolify app UUID for ops-hub-staging — does not change on redeploy.
      # Pinned (rather than looked up by name) because ops-hub-prod's app also
      # happens to be named "ops-hub-app" in a different Coolify project; a
      # name-based /applications lookup matches both and produces an unusable
      # multi-UUID result. See T-54 in WORK.md.
      OPS_HUB_STAGING_UUID: "ajqplom2mghf5a8h6vf1q6xg"

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # ── Pre-deploy checks (fast fail before building image) ──────────────────
      - name: Set up pnpm
        if: hashFiles('package.json') != ''
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js 20
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: pnpm install --frozen-lockfile

      - name: Lint & type check
        run: |
          if [ ! -f package.json ]; then exit 0; fi
          pnpm lint
          pnpm typecheck

      - name: Unit tests
        run: |
          if [ ! -f package.json ]; then exit 0; fi
          pnpm test

      # ── Build & push image to GHCR ───────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            --tag "$IMAGE:latest" \
            --tag "$IMAGE:${{ github.sha }}" \
            .

      - name: Push image to GHCR
        run: |
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          echo "Pushed $IMAGE:latest (${{ github.sha }})"

      # ── Deploy to Coolify staging ─────────────────────────────────────────────
      # Patches the image tag on the pinned ops-hub-staging app, then starts it.
      # NOTE: Coolify does not support per-app registry credentials via API.
      # GHCR auth is handled at the server level via ~/.docker/config.json.
      # Prerequisite: `docker login ghcr.io` must be run on the Coolify VPS once
      # (or the GHCR package must be public). See FOUNDER_QUEUE.md for status.
      - name: Patch and deploy ops-hub on Coolify
        id: coolify
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -euo pipefail

          # Coolify only supports docker_registry_image_name and docker_registry_image_tag
          # via PATCH (no per-app credential fields exist in the Coolify API).
          # The image name must NOT include a tag — Coolify appends docker_registry_image_tag
          # separately. Passing "repo:sha" as the name produces "repo:sha:old-tag" (invalid).
          echo "Patching ops-hub-app ($OPS_HUB_STAGING_UUID) image tag to ${{ github.sha }}..."
          PATCH_BODY=$(jq -n \
            --arg img "$IMAGE" \
            --arg tag "${{ github.sha }}" \
            '{docker_registry_image_name:$img, docker_registry_image_tag:$tag}')
          PATCH_HTTP=$(curl -s --max-time 30 -o /tmp/patch.json -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            "$COOLIFY_BASE/applications/$OPS_HUB_STAGING_UUID" -d "$PATCH_BODY")
          echo "PATCH HTTP $PATCH_HTTP"
          jq . /tmp/patch.json 2>/dev/null || cat /tmp/patch.json
          if [ "$PATCH_HTTP" != "200" ] && [ "$PATCH_HTTP" != "201" ]; then
            echo "ERROR: PATCH failed (HTTP $PATCH_HTTP)"; exit 1
          fi

          echo "Starting $OPS_HUB_STAGING_UUID..."
          START_HTTP=$(curl -s --max-time 180 -o /tmp/start.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "$COOLIFY_BASE/applications/$OPS_HUB_STAGING_UUID/start")
          echo "Start HTTP $START_HTTP"
          jq . /tmp/start.json 2>/dev/null || cat /tmp/start.json

          DEPLOYMENT_UUID=$(jq -r '.deployment_uuid // empty' /tmp/start.json 2>/dev/null || true)
          echo "app_uuid=$OPS_HUB_STAGING_UUID" >> "$GITHUB_OUTPUT"
          echo "deployment_uuid=$DEPLOYMENT_UUID" >> "$GITHUB_OUTPUT"
          echo "Deploy queued: app=$OPS_HUB_STAGING_UUID deployment=$DEPLOYMENT_UUID"

      # ── Deployment status + container logs ────────────────────────────────────
      # Poll Coolify deployment status before attempting the HTTP health check.
      # This surfaces image-pull errors and other Coolify-side failures early.
      - name: Wait for Coolify deployment to complete
        id: deploy_status
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          DEPLOYMENT_UUID: ${{ steps.coolify.outputs.deployment_uuid }}
          APP_UUID: ${{ steps.coolify.outputs.app_uuid }}
        run: |
          if [ -z "$DEPLOYMENT_UUID" ]; then
            echo "No deployment UUID — skipping deployment poll."
            exit 0
          fi
          echo "Polling deployment $DEPLOYMENT_UUID ..."
          for i in $(seq 1 30); do
            STATUS_HTTP=$(curl -s --max-time 15 -o /tmp/dep.json -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" \
              "$COOLIFY_BASE/deployments/$DEPLOYMENT_UUID" 2>/dev/null || true)
            if [ "$STATUS_HTTP" = "200" ]; then
              STATUS=$(jq -r '.status // empty' /tmp/dep.json 2>/dev/null || true)
              echo "Attempt $i: deployment status=$STATUS"
              case "$STATUS" in
                finished) echo "Deployment finished."; exit 0 ;;
                failed|error)
                  echo "=== Deployment FAILED ==="
                  jq . /tmp/dep.json 2>/dev/null || cat /tmp/dep.json
                  echo "=== Container logs ==="
                  curl -s --max-time 30 \
                    -H "Authorization: Bearer $TOKEN" \
                    "$COOLIFY_BASE/applications/$APP_UUID/logs" \
                    2>/dev/null | tail -c 4000 || true
                  exit 1
                  ;;
              esac
            else
              echo "Attempt $i: deployment API HTTP $STATUS_HTTP — waiting 10s"
            fi
            sleep 10
          done
          echo "WARNING: deployment status poll timed out — proceeding to health check"

      # ── Staging health check ──────────────────────────────────────────────────
      - name: Wait for staging health check
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          STAGING_URL: ${{ secrets.COOLIFY_STAGING_APP_URL }}
          APP_UUID: ${{ steps.coolify.outputs.app_uuid }}
        run: |
          # Resolve FQDN: prefer the secret if set, else fetch from Coolify API
          if [ -z "$STAGING_URL" ] && [ -n "$APP_UUID" ]; then
            echo "COOLIFY_STAGING_APP_URL not set — fetching FQDN from Coolify API..."
            FQDN=$(curl -s --max-time 30 \
              -H "Authorization: Bearer $TOKEN" \
              "$COOLIFY_BASE/applications/$APP_UUID" \
              | jq -r '.fqdn // empty' | sed 's|/$||')
            [ -n "$FQDN" ] && STAGING_URL="$FQDN" \
              || echo "No FQDN assigned yet — Coolify may still be routing."
          fi
          if [ -z "$STAGING_URL" ]; then
            echo "FQDN not available — skipping health poll."
            echo "Set COOLIFY_STAGING_APP_URL secret to the ops-hub staging FQDN."
            exit 0
          fi
          echo "Polling $STAGING_URL/health ..."
          for i in $(seq 1 18); do
            HTTP=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" \
              "$STAGING_URL/health" || true)
            if [ "$HTTP" = "200" ]; then
              echo "Health check passed (attempt $i) — staging is live."
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP — waiting 10s"
            sleep 10
          done
          echo "ERROR: health check timed out after 3 minutes"
          exit 1

      # ── Inngest function sync — DISABLED, see T-54(B) ─────────────────────────
      # This step used to PUT /api/inngest against staging's URL to force an
      # immediate Inngest Cloud sync. Removed 2026-07-04: ops-hub-staging and
      # ops-hub-prod currently share the same Inngest app id ("ops-hub" in
      # src/inngest/client.ts), so this sync repoints Inngest's dispatch target
      # to staging — confirmed to have silently stopped prod from processing
      # tickets for ~7 hours on 2026-07-03/04 until manually caught and fixed
      # by re-running prod-deploy.yml. Do not re-add this step until T-54(B)
      # (distinct Inngest app id per environment) is fixed. Inngest Cloud still
      # picks up staging's functions on its own poll cycle without this step;
      # it only loses immediacy, not correctness.
