name: T-84/T-89 — run kb-learn eval against production model (triage-model via LiteLLM)

# T-84's exit criterion required a real pass-rate proof against KB Learn's actual
# production model (the triage-model alias, routed through LiteLLM staging), not the
# anthropic:claude-sonnet-4-6 prompt-contract reference evals/kb-learn.yaml's provider
# block uses for CI schema validation.
#
# T-89 UPDATE: the live-config generation this workflow originally inlined has been
# EXTRACTED into a shared, parameterised runner — scripts/eval/live-run.sh (which calls
# scripts/eval/gen-live-config.py). That runner is generic across all three product evals
# (kb-learn, ticket-triage, ticket-respond), parameterised by eval file + target alias +
# judge alias. This workflow is now the KB Learn *invocation* of that shared runner — it
# hardcodes KB Learn's args and is the manual-dispatch verification vehicle proving the
# extraction preserved T-88's behaviour (100% / 4/4). The T-93 sibling CI workflow will
# consume the SAME scripts/eval/live-run.sh; the generalized runner already lives there.
#
# No new credential: reuses the existing `LITELLM_MASTER_KEY` GitHub secret (same one
# configure-litellm-openai-only.yml already uses for staging) as the OpenAI-compatible API
# key against LiteLLM's own /v1 endpoint — both the target provider (triage-model) AND the
# grader run through the SAME LiteLLM staging instance/key, so no separate Anthropic/OpenAI
# key is needed. Key is never printed; only the pass/fail summary is surfaced.
#
# NB (ADR-0007 C1): keeping the master key here is acceptable because this is a
# MANUAL workflow_dispatch a maintainer decides to fire. The master key must NOT enter the
# T-93 AUTO `pull_request`-triggered gate — that job reads only the scoped LITELLM_EVAL_KEY
# (T-90). This workflow is not that gate.
#
# READ-ONLY from an infra standpoint: no Coolify mutation, no schema change.
# It DOES make real (metered) LLM calls against litellm-staging.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  eval:
    name: Run evals/kb-learn.yaml against triage-model (live, real pass rate)
    runs-on: ubuntu-latest
    env:
      LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
    steps:
      - name: Guard — required secret present
        run: |
          [ -n "$LITELLM_MASTER_KEY" ] || { echo "::error::LITELLM_MASTER_KEY not set"; exit 1; }

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Sanity-check LITELLM_MASTER_KEY against /health before spending eval calls on it
        run: |
          set -euo pipefail
          HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 15 \
            -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
            "https://litellm-staging.inatechshell.ca/health/readiness")
          echo "GET /health/readiness with LITELLM_MASTER_KEY -> HTTP $HTTP"
          cat /tmp/health.json 2>/dev/null || true
          echo ""
          MODELS_HTTP=$(curl -s -o /tmp/models.json -w "%{http_code}" --max-time 15 \
            -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
            "https://litellm-staging.inatechshell.ca/v1/models")
          echo "GET /v1/models with LITELLM_MASTER_KEY -> HTTP $MODELS_HTTP"
          if [ "$MODELS_HTTP" = "200" ]; then
            echo "Registered model ids:"
            jq -r '.data[]?.id' /tmp/models.json 2>/dev/null || cat /tmp/models.json
          else
            echo "::warning::LITELLM_MASTER_KEY appears invalid/stale against litellm-staging (HTTP $MODELS_HTTP on /v1/models) — the eval step below will fail identically. This is a credential problem, not an eval-file problem."
          fi

      - name: Run KB Learn eval via the shared live-run runner (scripts/eval/live-run.sh)
        # The runner generates a self-contained live config (provider swap ->
        # openai:chat:triage-model, system prompt as a real {role:'system'} message,
        # grader via LiteLLM on the judge alias), runs promptfoo eval --no-cache, and
        # prints the pass-rate summary. Judge == target here to reproduce T-88's 4/4
        # apples-to-apples (grader != target is a T-91 calibration guard, not enforced here).
        env:
          EVAL_FILE: evals/kb-learn.yaml
          TARGET_ALIAS: triage-model
          JUDGE_ALIAS: triage-model
          LITELLM_BASE: https://litellm-staging.inatechshell.ca/v1
          OUT_DIR: /tmp/eval-live
          OPENAI_API_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
        run: |
          echo "::add-mask::$OPENAI_API_KEY"
          bash scripts/eval/live-run.sh
