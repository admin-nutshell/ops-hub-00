name: T-84 — run kb-learn eval against production model (triage-model via LiteLLM)

# T-84's exit criterion requires a real pass-rate proof against KB Learn's
# actual production model (the triage-model alias, routed through LiteLLM
# staging), not the anthropic:claude-sonnet-4-6 prompt-contract reference
# evals/kb-learn.yaml's provider block uses for CI schema validation.
#
# No new credential: reuses the existing `LITELLM_MASTER_KEY` GitHub secret
# (same one configure-litellm-openai-only.yml already uses for staging) as
# the OpenAI-compatible API key against LiteLLM's own /v1 endpoint — both
# the target provider (triage-model) AND the grader run through the SAME
# LiteLLM staging instance/key, so no separate Anthropic/OpenAI key is
# needed. Key is never printed; only the pass/fail summary is surfaced.
#
# READ-ONLY from an infra standpoint: no Coolify mutation, no schema change.
# It DOES make real (metered) LLM calls against litellm-staging.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  eval:
    name: Run evals/kb-learn.yaml against triage-model (live, real pass rate)
    runs-on: ubuntu-latest
    env:
      LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
    steps:
      - name: Guard — required secret present
        run: |
          [ -n "$LITELLM_MASTER_KEY" ] || { echo "::error::LITELLM_MASTER_KEY not set"; exit 1; }

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Sanity-check LITELLM_MASTER_KEY against /health before spending eval calls on it
        run: |
          set -euo pipefail
          HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 15 \
            -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
            "https://litellm-staging.inatechshell.ca/health/readiness")
          echo "GET /health/readiness with LITELLM_MASTER_KEY -> HTTP $HTTP"
          cat /tmp/health.json 2>/dev/null || true
          echo ""
          MODELS_HTTP=$(curl -s -o /tmp/models.json -w "%{http_code}" --max-time 15 \
            -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
            "https://litellm-staging.inatechshell.ca/v1/models")
          echo "GET /v1/models with LITELLM_MASTER_KEY -> HTTP $MODELS_HTTP"
          if [ "$MODELS_HTTP" = "200" ]; then
            echo "Registered model ids:"
            jq -r '.data[]?.id' /tmp/models.json 2>/dev/null || cat /tmp/models.json
          else
            echo "::warning::LITELLM_MASTER_KEY appears invalid/stale against litellm-staging (HTTP $MODELS_HTTP on /v1/models) — the eval step below will fail identically. This is a credential problem, not an eval-file problem."
          fi

      - name: Generate a single self-contained live-run config (no CLI-flag overrides, no multi-config merge)
        run: |
          set -euo pipefail
          pip install --quiet pyyaml
          python3 <<'PYEOF'
          import yaml

          with open("evals/kb-learn.yaml") as f:
              cfg = yaml.safe_load(f)

          litellm_provider = {
              "id": "openai:chat:triage-model",
              "config": {"apiBaseUrl": "https://litellm-staging.inatechshell.ca/v1"},
          }

          # Replace the CI schema-validation reference provider (anthropic:claude-sonnet-4-6)
          # with the real production target (triage-model via LiteLLM staging) for this
          # live run only. The committed evals/kb-learn.yaml is untouched on disk.
          cfg["providers"] = [litellm_provider]

          # Same provider also grades the llm-rubric assertions — one LiteLLM key/base URL,
          # no separate Anthropic/OpenAI credential needed.
          cfg["defaultTest"] = {"options": {"provider": litellm_provider}}

          with open("/tmp/kb-learn-live.yaml", "w") as f:
              yaml.safe_dump(cfg, f, sort_keys=False)

          print("Generated /tmp/kb-learn-live.yaml — providers + defaultTest overridden:")
          print(yaml.safe_dump({"providers": cfg["providers"], "defaultTest": cfg["defaultTest"]}, sort_keys=False))
          PYEOF

      - name: Run promptfoo eval against triage-model (target + grader both via LiteLLM)
        env:
          OPENAI_API_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
        run: |
          set -euo pipefail
          echo "::add-mask::$OPENAI_API_KEY"
          npx -y promptfoo@0.121 eval -c /tmp/kb-learn-live.yaml --no-cache --verbose \
            -o /tmp/kb-learn-results.json \
            2>&1 | tee /tmp/kb-learn-eval.log

      - name: Summarize pass rate (JSON stats if available, else parsed from stdout)
        if: always()
        run: |
          echo "=== JSON stats (if promptfoo's output schema has them) ==="
          if [ -f /tmp/kb-learn-results.json ]; then
            jq '.results.stats // .results.table.stats // "no .stats key at this path — see log summary below"' /tmp/kb-learn-results.json 2>/dev/null || echo "(could not jq-parse results JSON — see log summary below)"
          else
            echo "(no results JSON produced)"
          fi
          echo ""
          echo "=== Tail of eval log (pass/fail summary line(s)) ==="
          tail -40 /tmp/kb-learn-eval.log || true
