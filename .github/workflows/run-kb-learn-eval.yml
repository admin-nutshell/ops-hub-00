name: T-84/T-89 — run kb-learn eval against production model (triage-model via LiteLLM)

# ============================================================================
# !!! TEMPORARY T-100 OVERRIDE (re-vet vs T-99 N=9) — DO NOT MERGE. REVERTED BEFORE PR. !!!
# ----------------------------------------------------------------------------
# Branch-only override of the already-on-main run-kb-learn-eval.yml workflow_dispatch
# vehicle (the T-96 mechanism). Re-runs the T-100 vetting of meta/llama-3.3-70b-instruct
# for `triage` + `respond` against the CURRENT N=9 eval files (T-99 grew each eval from
# N=4 to N=9, PR #402) so the (2b) allowlist claim matches what is actually on main —
# not the superseded N=4 version the first run (29199758667) used.
#
# CREDENTIAL: scoped LITELLM_EVAL_KEY (eval-gate-t96, scoped
# [triage-model, fallback-model, meta/llama-3.3-70b-instruct]) — NEVER the master key.
# target + judge are both already in scope, so NO re-scope is needed.
# ============================================================================

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  LITELLM_STAGING_ROOT: "https://litellm-staging.inatechshell.ca"
  LITELLM_BASE: "https://litellm-staging.inatechshell.ca/v1"
  TARGET_ALIAS: "meta/llama-3.3-70b-instruct"
  OUT_DIR: "/tmp/eval-live"

jobs:
  eval:
    name: T-100 — vet meta/llama for triage + respond (live, scoped key, N=9)
    runs-on: ubuntu-latest
    env:
      LITELLM_EVAL_KEY: ${{ secrets.LITELLM_EVAL_KEY }}
    steps:
      - name: Guard — scoped eval key present (NEVER the master key)
        run: |
          echo "::add-mask::$LITELLM_EVAL_KEY"
          [ -n "$LITELLM_EVAL_KEY" ] || { echo "::error::LITELLM_EVAL_KEY not set — the scoped eval key must be provisioned as a repo secret"; exit 1; }

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Health + enumerate key-visible aliases (read-only, scoped key)
        run: |
          set -uo pipefail
          echo "::add-mask::$LITELLM_EVAL_KEY"
          HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 20 \
            "$LITELLM_STAGING_ROOT/health/readiness" || echo "000")
          echo "GET /health/readiness -> HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "::error::litellm-staging not healthy (HTTP $HTTP)"; cat /tmp/health.json 2>/dev/null || true; exit 1
          fi
          MHTTP=$(curl -s -o /tmp/models.json -w "%{http_code}" --max-time 20 \
            -H "Authorization: Bearer $LITELLM_EVAL_KEY" "$LITELLM_BASE/models" || echo "000")
          echo "GET /v1/models (scoped key) -> HTTP $MHTTP"
          if [ "$MHTTP" = "200" ]; then
            echo "Aliases visible to the scoped eval key:"
            jq -r '.data[]?.id' /tmp/models.json 2>/dev/null | sort -u || cat /tmp/models.json
          fi

      - name: Preflight target + choose a healthy judge (fallback-model preferred, triage-model fallback)
        id: judge
        run: |
          set -uo pipefail
          echo "::add-mask::$LITELLM_EVAL_KEY"
          probe() {
            curl -s -o /tmp/probe.json -w "%{http_code}" --max-time 40 \
              -H "Authorization: Bearer $LITELLM_EVAL_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"model\":\"$1\",\"messages\":[{\"role\":\"user\",\"content\":\"ping\"}],\"max_tokens\":1}" \
              "$LITELLM_BASE/chat/completions" || echo "000"
          }
          T=$(probe "$TARGET_ALIAS"); echo "target $TARGET_ALIAS -> HTTP $T"; head -c 300 /tmp/probe.json; echo
          if [ "${T:0:1}" != "2" ]; then
            echo "::error::target $TARGET_ALIAS not reachable (HTTP $T) — cannot vet. NVIDIA-NIM upstream may be down/out-of-credit."
            exit 1
          fi
          FB=$(probe "fallback-model"); echo "fallback-model -> HTTP $FB"; head -c 300 /tmp/probe.json; echo
          if [ "${FB:0:1}" = "2" ]; then
            echo "judge=fallback-model" >> "$GITHUB_OUTPUT"
            echo "Judge = fallback-model (healthy — ADR §5.3 intended grader, provider-diverse from target)."
          else
            TM=$(probe "triage-model"); echo "triage-model -> HTTP $TM"; head -c 300 /tmp/probe.json; echo
            if [ "${TM:0:1}" != "2" ]; then
              echo "::error::neither fallback-model (HTTP $FB) nor triage-model (HTTP $TM) reachable as a judge"; exit 1
            fi
            echo "judge=triage-model" >> "$GITHUB_OUTPUT"
            echo "::warning::fallback-model unhealthy (HTTP $FB) — using triage-model as judge (T-96 precedent). grader != target still holds (target=meta/llama)."
          fi

      - name: Vet meta/llama on ticket-triage (live, scoped key, N=9)
        id: triage
        continue-on-error: true
        env:
          EVAL_FILE: evals/ticket-triage.yaml
          JUDGE_ALIAS: ${{ steps.judge.outputs.judge }}
          OPENAI_API_KEY: ${{ secrets.LITELLM_EVAL_KEY }}
        run: |
          echo "::add-mask::$OPENAI_API_KEY"
          bash scripts/eval/live-run.sh

      - name: Vet meta/llama on ticket-respond (live, scoped key, N=9)
        id: respond
        continue-on-error: true
        env:
          EVAL_FILE: evals/ticket-respond.yaml
          JUDGE_ALIAS: ${{ steps.judge.outputs.judge }}
          OPENAI_API_KEY: ${{ secrets.LITELLM_EVAL_KEY }}
        run: |
          echo "::add-mask::$OPENAI_API_KEY"
          bash scripts/eval/live-run.sh

      - name: T-100 vetting summary (N=9)
        if: always()
        run: |
          echo "============================================================"
          echo " T-100 — vet meta/llama-3.3-70b-instruct for triage + respond (N=9)"
          echo "============================================================"
          echo " judge alias        : ${{ steps.judge.outputs.judge }}"
          echo " ticket-triage step : ${{ steps.triage.outcome }}  (success = all 9 pass + guards green)"
          echo " ticket-respond step: ${{ steps.respond.outcome }}  (success = all 9 pass + guards green)"
          echo " NOTE: >95% with N=9 means 9/9 (8/9=88.9% is a FAIL). A step 'success'"
          echo "       = live-run.sh exit 0 = all product tests passed AND all T-91"
          echo "       guards green. Read each eval's .results.stats above for counts."
          echo "============================================================"
