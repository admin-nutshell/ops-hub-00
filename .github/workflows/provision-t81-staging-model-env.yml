name: Provision T-81 model-routing env vars on ops-hub-staging (one-shot)

# T-81 staging half: sets LITELLM_RESPOND_MODEL / LITELLM_KBLEARN_MODEL on
# ops-hub-staging so the dashboard's model-routing tile displays an explicit
# value instead of relying on the implicit literal fallback. NOT required for
# correctness — src/inngest/modelRouting.ts already falls back to the literal
# "triage-model" for both functions when these are unset, which is identical
# in effect (see T-73's own comment on FUNCTION_ROUTING). This just makes the
# config explicit ahead of the dashboard write-surface go-live.
#
# Anchored by UUID, NOT by app name — ops-hub-staging and ops-hub-prod both
# display as "ops-hub-app (localhost)" in the Coolify UI (T-54(A) precedent).
#
# STAGING ONLY. Do not repoint at ops-hub-prod (UUID sbke5gqru1n54rj7gssgca2y)
# — prod promotion is a separate, explicitly-authorized T-81 follow-up.
#
# Rollback: re-run with mode=delete to remove both vars and redeploy.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'set = provision vars + redeploy; delete = remove vars + redeploy'
        required: false
        default: 'set'
        type: choice
        options: ['set', 'delete']

permissions:
  contents: read

concurrency:
  group: ops-hub-staging-env
  cancel-in-progress: false

env:
  COOLIFY_BASE: "https://coolify.inatechshell.ca/api/v1"
  OPS_HUB_STAGING_UUID: "ajqplom2mghf5a8h6vf1q6xg"
  STAGING_URL: "https://ops-hub-staging.inatechshell.ca"

jobs:
  provision:
    name: Provision LITELLM_RESPOND_MODEL / LITELLM_KBLEARN_MODEL on ops-hub-staging
    runs-on: ubuntu-latest
    env:
      TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}

    steps:
      - name: Delete existing entries (idempotent, handles Coolify's append-not-upsert Save)
        run: |
          set -euo pipefail
          curl -s --max-time 30 -o /tmp/envs.json \
            -H "Authorization: Bearer $TOKEN" -H "Accept: application/json" \
            "$COOLIFY_BASE/applications/$OPS_HUB_STAGING_UUID/envs"
          for KEY in LITELLM_RESPOND_MODEL LITELLM_KBLEARN_MODEL; do
            COUNT=$(jq -r --arg k "$KEY" '[.[] | select(.key == $k)] | length' /tmp/envs.json 2>/dev/null || echo 0)
            echo "Existing $KEY entries: $COUNT"
            for eu in $(jq -r --arg k "$KEY" '.[] | select(.key == $k) | .uuid' /tmp/envs.json 2>/dev/null); do
              DEL=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" -X DELETE \
                -H "Authorization: Bearer $TOKEN" \
                "$COOLIFY_BASE/applications/$OPS_HUB_STAGING_UUID/envs/$eu")
              echo "  DELETE $KEY $eu -> HTTP $DEL"
            done
          done

      - name: Set LITELLM_RESPOND_MODEL=triage-model, LITELLM_KBLEARN_MODEL=triage-model
        if: inputs.mode == 'set'
        run: |
          set -euo pipefail
          for KEY in LITELLM_RESPOND_MODEL LITELLM_KBLEARN_MODEL; do
            HTTP=$(curl -s --max-time 30 -o /tmp/set-var.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" -H "Accept: application/json" \
              "$COOLIFY_BASE/applications/$OPS_HUB_STAGING_UUID/envs" \
              -d "$(jq -n --arg k "$KEY" --arg v "triage-model" '{key:$k,value:$v}')")
            echo "POST $KEY=triage-model -> HTTP $HTTP"
            if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
              echo "ERROR: failed to set $KEY (HTTP $HTTP)"; cat /tmp/set-var.json | head -5; exit 1
            fi
          done

      - name: Redeploy ops-hub-staging
        run: |
          set -euo pipefail
          echo "Redeploying ops-hub-staging ($OPS_HUB_STAGING_UUID) to apply env change..."
          HTTP=$(curl -s --max-time 180 -o /tmp/deploy.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "$COOLIFY_BASE/applications/$OPS_HUB_STAGING_UUID/restart")
          echo "Redeploy -> HTTP $HTTP"
          jq . /tmp/deploy.json 2>/dev/null || cat /tmp/deploy.json
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "201" ]; then
            echo "WARNING: redeploy returned HTTP $HTTP - verify manually in Coolify."
          else
            echo "Redeploy queued. Waiting 30s..."
            sleep 30
          fi

      - name: Verify ops-hub-staging health
        run: |
          set -euo pipefail
          MAX=6; WAIT=10; n=0
          until curl -sf --max-time 10 "$STAGING_URL/health" > /tmp/health.json 2>/dev/null; do
            n=$((n+1))
            if [ $n -ge $MAX ]; then
              echo "ERROR: health check failed after $((MAX*WAIT))s"
              cat /tmp/health.json 2>/dev/null || true
              exit 1
            fi
            echo "  [$n/$MAX] waiting ${WAIT}s..."
            sleep $WAIT
          done
          echo "ops-hub-staging healthy:"
          cat /tmp/health.json

      - name: Verify ops-hub-staging env presence
        run: |
          set -euo pipefail
          curl -sf --max-time 10 "$STAGING_URL/health/env" || true
