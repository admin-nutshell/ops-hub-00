# evals/production_manager.eval.yaml
# Why this eval exists: the Production Manager's defining discipline is "roll back at human
# pace before debugging live", and never deploying without a written rollback path. We test
# that a failing health check produces a diagnosis-plus-rollback plan, not a live-debug spiral.
#
# Cases: (a) failing post-deploy health check -> rollback plan; (b) catch a breaking config
# change BEFORE deploy; (c) sequence a coupled multi-step rollback in the right order. The
# fixed prompt sets the role; each case varies {{scenario}}.

description: "Production Manager — diagnose a failing post-deploy health check and propose a rollback plan"

prompts:
  - |
    You are the Production Manager agent for the Ops Hub.

    {{scenario}}

providers:
  - id: anthropic:claude-sonnet-4-6
    config:
      system: |
        You are the Production Manager agent for the In a Tech-Shell Ops Hub. You own Coolify
        deploys, canary rollouts, and rollback paths. You treat deploys as a procedure, not a
        gamble: you say "let's roll back and figure it out at human pace" before "let's debug
        it live", you never act without a written rollback path, and your mean rollback time
        target is under 15 minutes.

tests:
  # (a) The post-deploy failure: choose rollback over live-debug, pick a lever, define success.
  - description: "Chooses rollback over live-debug, picks a concrete lever, and defines post-rollback success criteria"
    vars:
      scenario: |
        Context:
        - You just deployed a new version of `ops-hub-app` to Coolify staging.
        - The canary health check at `/health` returned HTTP 502 on the last 3 polls.
        - The previous version was healthy (HTTP 200) for the prior 48 hours.
        - Sentry shows a spike in errors starting at the deploy timestamp.
        - You have: Coolify redeploy of the prior image, git revert, and a feature flag as
          possible rollback levers.

        Task: Diagnose the most likely situation and propose a concrete plan. Decide whether to
        roll back now or debug live, choose a rollback lever, and define the success criteria for
        a healthy post-rollback state.
    assert:
      - type: llm-rubric
        value: |
          The response should:
          - Prioritize rolling back to the known-good prior version over debugging the broken deploy live in staging, consistent with the "roll back at human pace" discipline.
          - Choose a specific, concrete rollback lever (e.g. Coolify redeploy of the prior image, or git revert) rather than vaguely suggesting "fix it".
          - Define explicit success criteria for confirming the rollback worked (e.g. `/health` returns 200 across consecutive polls and the Sentry error spike subsides).
          - Connect the evidence (502 + Sentry spike starting at the deploy timestamp) to the conclusion that the new deploy is the cause.
        threshold: 0.8

  # (b) Edge/failure mode: catch a breaking config change BEFORE shipping. Green CI is not
  #     sufficient because CI never exercises a live LiteLLM call.
  - description: "Catches a breaking LiteLLM config change before deploy instead of trusting green CI"
    vars:
      scenario: |
        You are reviewing a release before deploying it to Coolify staging.

        Context:
        - The PR changes the LiteLLM base URL the app uses. CLAUDE.md states the internal Docker URL
          (http://h12xz8887fxvbvjts2hac8if-074411057216:4000) is the standing config and that the
          suffix CHANGES on every LiteLLM redeploy.
        - The PR hardcodes a different internal suffix than the one currently running, and also flips
          the env var name from LITELLM_BASE_URL to LITELLM_URL without updating where the app reads it.
        - The deploy is otherwise green in CI (CI has no production LLM keys, so it never exercises a
          live LiteLLM call).

        Task: Decide whether this is safe to deploy. Identify any breaking configuration change BEFORE
        it ships, explain how it would fail in production, and state what must be verified first.
    assert:
      - type: llm-rubric
        value: |
          The response should:
          - Catch the breaking config change BEFORE deploy rather than shipping and reacting: the hardcoded LiteLLM suffix will be stale (it changes on every redeploy) and/or the renamed env var (LITELLM_BASE_URL -> LITELLM_URL) leaves the app reading an undefined value.
          - Explain the production failure mode: the app would be unable to reach LiteLLM (every triage call fails) even though CI was green, because CI never exercises a live LiteLLM call.
          - Refuse to deploy as-is / gate the deploy on verification rather than treating green CI as sufficient.
          - State the concrete pre-deploy check (e.g. confirm the live container suffix via `docker ps | grep h12xz8887fxvbvjts2hac8if`, and confirm the env var name matches what the code reads).
        threshold: 0.8

  # (c) Different decision: a coupled multi-change rollback. Tests ordering so the system is
  #     never left in a broken half-rolled-back state.
  - description: "Sequences a coupled multi-step rollback (image + migration + env var) in the correct order"
    vars:
      scenario: |
        A bad release reached Coolify staging and must be fully rolled back.

        Context:
        - The release shipped THREE coupled changes: (1) a new app image, (2) a forward-only
          Supabase migration that added a NOT NULL column to `tickets`, and (3) a renamed Coolify
          env var the new image depends on.
        - The app is now erroring; the previous image is known-good but expects the OLD schema and
          the OLD env var name.
        - You have: Coolify redeploy of the prior image, a down-migration, and the env var settings.

        Task: Lay out the rollback as an ordered, concrete sequence of steps. Make explicit what order
        things must happen in so you don't leave the system in a worse, half-rolled-back state, and
        define how you confirm the rollback is complete and healthy.
    assert:
      - type: llm-rubric
        value: |
          The response should:
          - Produce an ORDERED, multi-step rollback sequence (not a single "redeploy old image") and reason about the dependencies between the image, the schema migration, and the env var.
          - Get the ordering right so the system is never left in a broken half-state — e.g. recognize that restoring the old image (which expects the old schema/env) requires reverting the env var name and reconciling the NOT NULL migration (down-migration or backward-compatible handling) consistently, not redeploying the old image against the new schema.
          - Define explicit success criteria for a completed rollback (e.g. `/health` returns 200 across consecutive polls, the error spike subsides, schema and env match the restored image).
          - Reflect the "roll back at human pace, with a written path" discipline and a target rollback time, rather than improvising live.
        threshold: 0.8
